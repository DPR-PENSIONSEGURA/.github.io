<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría | Panel Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* FONDO MÁRMOL Y ESTILO DPR */
        body { 
            font-family: 'Inter', sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1533134486753-c833f074868f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            color: #1E293B; 
            scroll-behavior: smooth; 
        }
        .header-glass { background: rgba(255, 255, 255, 0.9); border-bottom: 2px solid #D4AF37; backdrop-filter: blur(10px); }
        .green-gradient { background: linear-gradient(135deg, #8FCE00 0%, #10B981 100%); }
        .category-card { background: white; border: 1px solid #D4AF37; transition: all 0.3s ease; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .category-card:hover { border-color: #8FCE00; transform: translateY(-3px); }
        .input-light { background: #FFFFFF; border: 2px solid #E2E8F0; padding: 12px; border-radius: 15px; width: 100%; outline: none; font-weight: 600; font-size: 11px; }
        .input-light:focus { border-color: #D4AF37; }
        
        /* WIDGET DE CHAT */
        #chat-window { 
            display: none; 
            width: 320px; 
            height: 450px; 
            background: white; 
            border-radius: 20px; 
            border: 2px solid #D4AF37; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); 
            margin-bottom: 15px;
        }
        .chat-header { background: #D4AF37; color: white; padding: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .msg-user { background: #8FCE00; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 85%; font-weight: 700; }
        .msg-support { background: #f1f1f1; color: #333; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 85%; font-weight: 700; }
        
        /* ESTILOS ORIGINALES REPETIDOS */
        .orange-btn { background: #F97316; color: white; transition: all 0.3s ease; cursor: pointer; }
        .expand-btn { display: flex; align-items: center; overflow: hidden; max-width: 45px; height: 45px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; cursor: pointer; border-radius: 50px; padding: 10px; }
        .expand-btn:hover { max-width: 250px; padding-right: 20px; }
        .expand-btn span.text { font-size: 9px; font-weight: 900; text-transform: uppercase; margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
        .expand-btn:hover span.text { opacity: 1; }
    </style>
</head>
<body>

    <div id="avisoBaneo" class="fixed inset-0 bg-red-900/90 backdrop-blur-md hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl border-4 border-red-600">
            <div class="text-5xl mb-4">⚠️</div>
            <h2 class="text-xl font-black text-red-600 mb-4 uppercase italic">Aviso de Seguridad</h2>
            <p class="text-[11px] font-bold text-slate-700 uppercase mb-6">Las cuentas que han subido recargas ficticias serán baneadas.</p>
            <button onclick="window.cerrarAvisoBaneo()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase italic">Entendido</button>
        </div>
    </div>

    <header class="sticky top-0 z-40 header-glass">
        <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="green-gradient w-9 h-9 rounded-xl flex items-center justify-center font-black text-white shadow-lg text-lg italic">DP</div>
                <h1 class="font-black uppercase tracking-tighter text-lg text-slate-800">DPR <span class="text-emerald-600 italic">Consultoría</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="abrirModal('modalSaldo')" class="bg-white px-4 py-2 rounded-full border-2 border-emerald-500 flex items-center gap-2 shadow-sm">
                    <span id="txtSaldoHeader" class="font-black text-emerald-600 text-xs">...</span>
                </button>
                <button onclick="window.cerrarSesion()" class="text-[9px] font-black uppercase text-slate-400">Salir</button>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="max-w-2xl mx-auto mb-10">
            <input type="text" id="inputBusqueda" onkeyup="window.buscarServicio()" placeholder="BUSCAR TRÁMITE O CURP..." class="w-full bg-white border-2 border-slate-200 rounded-3xl p-5 font-black uppercase text-xs outline-none focus:border-emerald-500 shadow-lg">
        </div>

        <div id="gridCategorias" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12">
            <button onclick="mostrarTramites('IMSS')" class="category-card p-5 rounded-3xl text-center">🏥 <span class="text-[9px] block font-black uppercase mt-2">IMSS</span></button>
            <button onclick="mostrarTramites('SAT')" class="category-card p-5 rounded-3xl text-center">⚖️ <span class="text-[9px] block font-black uppercase mt-2">SAT</span></button>
            <button onclick="mostrarTramites('DOC')" class="category-card p-5 rounded-3xl text-center">📄 <span class="text-[9px] block font-black uppercase mt-2">DOCUMENTOS</span></button>
            <button onclick="mostrarTramites('INF')" class="category-card p-5 rounded-3xl text-center">🏠 <span class="text-[9px] block font-black uppercase mt-2">INFONAVIT</span></button>
            <button onclick="mostrarTramites('PENSIONES')" class="category-card p-5 rounded-3xl text-center">📈 <span class="text-[9px] block font-black uppercase mt-2">PENSIONES</span></button>
            <button onclick="mostrarTramites('AFORE')" class="category-card p-5 rounded-3xl text-center">💰 <span class="text-[9px] block font-black uppercase mt-2">AFORE</span></button>
        </div>

        <div id="listaServicios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12 hidden"></div>

        <section class="bg-white/90 rounded-[2.5rem] border border-slate-200 p-6 shadow-xl mt-12">
            <h2 class="text-lg font-black text-slate-800 uppercase italic mb-6">Historial de Solicitudes</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="text-[9px] font-black uppercase text-slate-400 border-b"><th class="pb-4">Fecha</th><th class="pb-4">Información</th><th class="pb-4 text-center">Estatus</th><th class="pb-4 text-right">Acción</th></tr></thead>
                    <tbody id="listaHistorial" class="text-xs font-bold italic"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 100;">
        <div id="chat-window">
            <div class="chat-header flex justify-between items-center">
                <span>💬 Asistencia DPR</span>
                <button onclick="toggleChat()" class="text-xl">×</button>
            </div>
            <div id="chat-messages"></div>
            <div class="p-3 border-t bg-gray-50 flex gap-2">
                <input type="text" id="chat-input" placeholder="Escribe tu duda..." class="input-light flex-1">
                <button id="btn-send-chat" class="bg-emerald-500 text-white p-2 rounded-xl">➤</button>
            </div>
        </div>
        <button onclick="toggleChat()" class="green-gradient w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl animate-bounce">🎧</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, collection, query, where, serverTimestamp, increment, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // AQUÍ REINSTALÉ TODA TU DATA ORIGINAL DE TRÁMITES
        const TRAMITES = {
            'IMSS': [
                { nombre: 'SEMANAS COTIZADAS', precio: 25, nss: true, curp: true },
                { nombre: 'SINDO ULTIMO RETIRO', precio: 45, nss: true },
                { nombre: 'SINDO ALFANUMÉRICO', precio: 55, nss: true, pideExtras: true },
                { nombre: 'SINDO VIGENCIA', precio: 95, nss: true },
                { nombre: 'SINDO COMPLETO', precio: 135, nss: true },
                { nombre: 'Tarjeta NSS', precio: 20, nss: true, curp: true },
                { nombre: 'Inscripción Modalidad 10', precio: 200, special: 'MOD10', nss: true, rfc: true, pideIneFrente: true, pideNombre: true },
                { nombre: 'Alta Mensual', precio: 600, nss: true, curp: true, pideNombre: true },
                { nombre: 'Alta para Desempleo con aportaciones', precio: 650, nss: true, curp: true, pideNombre: true },
                { nombre: 'Alta para Desempleo con linea de captura', precio: 170, nss: true, curp: true, pideNombre: true }
            ],
            'SAT': [
                { nombre: 'RFC Clon', precio: 27, curp: true },
                { nombre: 'RFC Verificable', precio: 110, curp: true },
                { nombre: 'RFC Original', precio: 180, curp: true },
                { nombre: 'Localización de IDcif', precio: 60, rfc: true },
                { nombre: 'RFC con IDcif', precio: 27, rfc: true, idcif: true }
            ],
            'DOC': [
                { nombre: 'Recibo CFE', precio: 10, pideCFE: true },
                { nombre: 'Buró de Crédito', precio: 170, curp: true, pideIneFrente: true },
                { nombre: 'CURP Certificada', precio: 4, curp: true },
                { nombre: 'Acta de Nacimiento', precio: 11, curp: true },
                { nombre: 'Acta de Matrimonio', precio: 11, curp: true },
                { nombre: 'Acta de Divorcio', precio: 11, curp: true },
                { nombre: 'Acta de Defunción', precio: 11, curp: true },
                { nombre: 'Vigencia de Derechos', precio: 24, curp: true, nss: true }
            ],
            'INF': [
                { nombre: 'Localización de Contraseña', precio: 150, nss: true, pideFecha: true },
                { nombre: 'Reseteo Cuenta', precio: 150, nss: true, pideFecha: true },
                { nombre: 'Precalificación Mejoravit', precio: 100, nss: true, pideFecha: true, eligePlazo: true },
                { nombre: 'Precalificación Linea II', precio: 100, nss: true, pideFecha: true },
                { nombre: 'Histórico Infonavit', precio: 150, nss: true, pideFecha: true }
            ],
            'AFORE': [
                { nombre: 'Registro a Distancia', precio: 250, special: 'REGISTRO', pidePass: true },
                { nombre: 'Retiro Desempleo a Distancia', precio: 60, special: 'RETIRO', pidePass: true },
                { nombre: 'Cambiar Contraseña AFORE Web', precio: 30, curp: true, pidePass: true, pideFotoCli: true },
                { nombre: 'Resumen de Afore', precio: 10, curp: true },
                { nombre: 'ECTA: Sura', precio: 750, nss: true, curp: true },
                { nombre: 'ECTA: Profuturo', precio: 500, nss: true, curp: true },
                { nombre: 'ECTA: Banorte', precio: 600, nss: true, curp: true },
                { nombre: 'ECTA: Azteca', precio: 350, nss: true, curp: true },
                { nombre: 'ECTA: Coppel', precio: 350, nss: true, curp: true }
            ],
            'PENSIONES': [
                { nombre: 'Análisis rápido de pensión', precio: 200, curp: true, nss: true }
            ]
        };

        // LÓGICA DE USUARIO Y CHAT (NUEVA)
        let emailAsesor = "", userUID = "";
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                userUID = user.uid; emailAsesor = user.email; 
                escucharSaldo(); escucharHistorial(); escucharChatSoporte();
            } else { window.location.href = "login/index.html"; }
        });

        window.toggleChat = () => {
            const win = document.getElementById('chat-window');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        };

        const btnSendChat = document.getElementById('btn-send-chat');
        btnSendChat.onclick = async () => {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            const expira = new Date(); expira.setDate(expira.getDate() + 15);
            await addDoc(collection(db, "chat_soporte"), {
                texto: input.value, remitente: emailAsesor, asesor_uid: userUID,
                timestamp: serverTimestamp(), expiraEn: expira
            });
            input.value = "";
        };

        function escucharChatSoporte() {
            const q = query(collection(db, "chat_soporte"), where("asesor_uid", "==", userUID), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = (m.remitente === emailAsesor) ? "msg-user" : "msg-support";
                    div.innerText = m.texto; box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // TUS FUNCIONES DE SALDO E HISTORIAL (SIN CAMBIOS)
        function escucharSaldo() { onSnapshot(doc(db, "asesores", userUID), (d) => { if (d.exists()) { document.getElementById('txtSaldoHeader').innerText = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(d.data().saldo || 0); } }); }
        
        // ... (El resto de tus funciones: buscarServicio, mostrarTramites, confirmarCompra, etc., van aquí igual que las tenías)
        // Por espacio no las pego todas, pero asegúrate de pegarlas de tu archivo original.
    </script>
</body>
</html>
