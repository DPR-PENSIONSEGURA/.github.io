        .category-card:hover { border-color: #8FCE00; transform: translateY(-3px); }
        .input-light { background: #FFFFFF; border: 2px solid #E2E8F0; padding: 10px; border-radius: 12px; width: 100%; outline: none; font-weight: 600; font-size: 11px; }
        .orange-btn { background: #F97316; color: white; transition: all 0.3s ease; cursor: pointer; }
        #chat-window { display: none; width: 340px; height: 500px; background: white; border-radius: 20px; border: 2px solid #D4AF37; flex-direction: column; overflow: hidden; box-shadow: 0 20px 25px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .chat-header { background: #D4AF37; color: white; padding: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .msg-user { background: #8FCE00; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 85%; font-weight: 700; }
        .msg-support { background: #f1f1f1; color: #333; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 85%; font-weight: 700; }
        .help-menu { padding: 10px; display: flex; gap: 5px; overflow-x: auto; background: #f9f9f9; border-top: 1px solid #eee; }

</head>

                <button onclick="window.cerrarSesion()" class="text-[9px] font-black uppercase text-slate-400 hover:text-red-500">Salir</button>

    <main class="p-6 max-w-7xl mx-auto">

            <button id="btnVolver" onclick="window.resetearPanel()" class="hidden text-[9px] font-black uppercase bg-slate-800 text-white px-4 py-2 rounded-full">⬅️ Volver</button>

                { nombre: 'Cambiar Contraseña AFORE Web', precio: 30, curp: true, pidePassNueva: true, pideFotoCli: true },
                { nombre: 'Estado de cuenta Azteca', precio: 500, nss: true, curp: true },

                { nombre: 'Estado de cuenta Profuturo', precio: 500, nss: true, curp: true },
                { nombre: 'Estado de cuenta Invercap', precio: 1400, nss: true, curp: true },
                { nombre: 'Estado de cuenta SURA', precio: 800, nss: true, curp: true },
                { nombre: 'Estado de cuenta BANORTE', precio: 500, nss: true, curp: true },
                { nombre: 'Estado de cuenta Principal', precio: 500, nss: true, curp: true },
                { nombre: 'Estado de cuenta Banamex', precio: 1200, nss: true, curp: true }
            ],

                { nombre: 'Análisis Detallado de pensión', precio: 3000, pideCuestionarioPension: true }
            ]
        };

        const FLUJO_AYUDA = {
            "inicio": { texto: "Hola, ¿en qué puedo ayudarte?", opciones: ["💰 Pagos", "📋 Trámites"] },
            "💰 Pagos": { texto: "Transfiere a Banorte y sube captura en el botón de saldo.", opciones: ["¿Cuánto tarda?", "Volver al inicio"] },
            "¿Cuánto tarda?": { texto: "Máximo 10 minutos.", opciones: ["Volver al inicio"] },
            "📋 Trámites": { texto: "Semanas: 10min. RFC: 1h-3h. Altas: 2-3 días.", opciones: ["Volver al inicio"] }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                emailAsesor = user.email;
                escucharSaldo();
                escucharHistorial();
                escucharChat();
            } else {
                window.location.href = "login/index.html";
            }
        });

        window.toggleChat = () => {
            const w = document.getElementById('chat-window');
            w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
        };

        window.abrirModal = (id) => document.getElementById(id).classList.remove('hidden');

        window.cerrarModal = () => {
            document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));
        };

        window.mostrarTramites = (cat) => {
            document.getElementById('gridCategorias').classList.add('hidden');
            document.getElementById('listaServicios').classList.remove('hidden');
            document.getElementById('btnVolver').classList.remove('hidden');
            document.getElementById('tituloSeccion').innerText = "Servicios: " + cat;
            const lista = document.getElementById('listaServicios');
            let html = '';

            TRAMITES[cat].forEach(t => {
                const conf = JSON.stringify(t).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                html += `<div onclick="window.prepararTramite(JSON.parse('${conf}'))" class="category-card p-5 text-center">
                    <p class="font-black text-[9px] uppercase">${t.nombre}</p>
                    <p class="text-emerald-600 font-black text-[8px]">$${t.precio}.00</p>
                </div>`;
            });

            lista.innerHTML = html;
        };

        window.resetearPanel = () => {
            document.getElementById('gridCategorias').classList.remove('hidden');
            document.getElementById('listaServicios').classList.add('hidden');
            document.getElementById('btnVolver').classList.add('hidden');
            document.getElementById('tituloSeccion').innerText = "Panel de Servicios";
        };

        window.prepararTramite = (t) => {
            const content = document.getElementById('formContent');
            let pFinal = t.precio;

            const vips = [
                "prestamoefectivo.tramites@gmail.com",
                "kingmc019@gmail.com",
                "symconsultoria2.2024@gmail.com",
                "symconsultoria3.2024@gmail.com",
                "symconsultoria2024@gmail.com",
                "ompesa86@gmail.com",
                "symconsultoria4.2024@gmail.com",
                "cris19330@outlook.com",
                "draperrapmorelia@gmail.com",
                "gestoriayserviciosgonzalez@gmail.com",
                "inburpriego@gmail.com"
            ];

            if ((t.nombre === 'SEMANAS COTIZADAS' || t.nombre === 'Tarjeta NSS') && vips.includes(emailAsesor)) pFinal = 19;

            let fields = '';

            if (t.extraMsg) fields += `<p class="text-[9px] font-bold text-red-600 mb-4 bg-red-50 p-2 border border-red-100 uppercase">${t.extraMsg}</p>`;
            if (t.pideNombre) fields += `<input type="text" id="nombre_p" placeholder="NOMBRE COMPLETO" class="input-light mb-4 uppercase">`;
            if (t.curp) fields += `<input type="text" id="curp_p" placeholder="CURP" class="input-light mb-4 uppercase">`;
            if (t.nss) fields += `<input type="text" id="nss_p" placeholder="NSS" class="input-light mb-4">`;
            if (t.rfc) fields += `<input type="text" id="rfc_p" placeholder="RFC" class="input-light mb-4 uppercase">`;
            if (t.idcif) fields += `<input type="text" id="idcif_p" placeholder="IDCIF" class="input-light mb-4 uppercase">`;
            if (t.pidePass) fields += `<input type="text" id="pass_p" placeholder="CONTRASEÑA" class="input-light mb-4">`;
            if (t.pidePassNueva) fields += `<input type="text" id="pass_nueva_p" placeholder="CONTRASEÑA NUEVA" class="input-light mb-4">`;
            if (t.pideNumServicio) fields += `<input type="text" id="num_servicio_p" placeholder="NÚMERO DE SERVICIO" class="input-light mb-4">`;
            if (t.pideFecha) fields += `<input type="date" id="fecha_p" class="input-light mb-4">`;
            if (t.pideTel) fields += `<input type="text" id="tel_p" placeholder="TELÉFONO" class="input-light mb-4">`;
            if (t.pideTelContacto) fields += `<input type="text" id="tel_contacto_p" placeholder="TELÉFONO DE CONTACTO" class="input-light mb-4">`;
            if (t.pideCorreo) fields += `<input type="email" id="correo_p" placeholder="CORREO" class="input-light mb-4">`;
            if (t.pideNota) fields += `<textarea id="nota_p" placeholder="NOTA" class="input-light mb-4"></textarea>`;

            if (t.pideCuestionarioPension) {
                fields += `<div class="bg-blue-50 p-4 rounded-2xl mb-4 text-[10px] font-bold uppercase">
                    <p class="mb-2">Análisis Detallado Activo</p>
                    <input type="number" id="q_semanas" placeholder="Semanas Cotizadas" class="input-light mb-2">
                    <textarea id="q_beneficiarios" placeholder="Beneficiarios" class="input-light"></textarea>
                </div>`;
            }

            if (t.pideIneFrente || t.pideIneReverso || t.pideFotoCli || t.pideCompDomicilio || t.pideEdoCta) {
                fields += `<div class="bg-slate-50 p-4 rounded-2xl border mb-4 space-y-2">`;
                if (t.pideIneFrente) fields += `<label class="text-[8px] font-black text-slate-400 block uppercase">INE FRENTE</label><input type="file" id="file_ine_f" class="w-full text-[10px]">`;
                if (t.pideIneReverso) fields += `<label class="text-[8px] font-black text-slate-400 block uppercase">INE REVERSO</label><input type="file" id="file_ine_r" class="w-full text-[10px]">`;
                if (t.pideFotoCli) fields += `<label class="text-[8px] font-black text-slate-400 block uppercase">FOTO CLIENTE</label><input type="file" id="file_selfie" class="w-full text-[10px]">`;

                if (t.pideEdoCta) fields += `<label class="text-[8px] font-black text-slate-400 block uppercase">ESTADO DE CUENTA</label><input type="file" id="file_edocta" class="w-full text-[10px]">`;

                <button onclick="window.confirmarCompra(JSON.parse('${JSON.stringify(t).replace(/'/g, "&apos;").replace(/"/g, "&quot;")}'), ${pFinal})" class="w-full orange-btn py-4 rounded-2xl font-black uppercase text-xs">

        let enviandoTramite = false;

        window.confirmarCompra = async (t, c) => {
            if (enviandoTramite) return;
            if (saldoGlobal < c) return alert("Saldo insuficiente.");

            const botonPago = document.querySelector('#modalTramite .orange-btn');
            const textoOriginal = botonPago ? botonPago.innerText : "";
            enviandoTramite = true;

            const subirArchivoCloudinary = async (inputId) => {
                const archivo = document.getElementById(inputId)?.files?.[0];
                if (!archivo) return "N/A";

                const fd = new FormData();
                fd.append('file', archivo);
                fd.append('upload_preset', UPLOAD_PRESET);

                const res = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: fd
                });

                const data = await res.json();
                return data.secure_url || "N/A";
            };

            try {
                if (botonPago) {
                    botonPago.disabled = true;
                    botonPago.innerText = "ENVIANDO...";
                    botonPago.style.opacity = "0.7";
                    botonPago.style.cursor = "not-allowed";
                }

                const val = (id) => document.getElementById(id) ? document.getElementById(id).value.trim() : "N/A";

                const extra = {
                    nombre_cliente: val('nombre_p'),
                    rfc: val('rfc_p'),
                    idcif: val('idcif_p'),
                    pass: val('pass_p'),
                    pass_nueva: val('pass_nueva_p'),
                    num_servicio: val('num_servicio_p'),
                    fecha: val('fecha_p'),
                    telefono: val('tel_p'),
                    telefono_contacto: val('tel_contacto_p'),
                    correo: val('correo_p'),
                    nota: val('nota_p')
                };

                let quest = "N/A";
                if (t.pideCuestionarioPension) {
                    quest = {
                        semanas: val('q_semanas'),
                        beneficiarios: val('q_beneficiarios')
                    };
                }

                let file_ine_f = "N/A";
                let file_ine_r = "N/A";
                let file_selfie = "N/A";
                let file_comp_domicilio = "N/A";
                let file_edocta = "N/A";

                if (t.pideIneFrente) file_ine_f = await subirArchivoCloudinary('file_ine_f');
                if (t.pideIneReverso) file_ine_r = await subirArchivoCloudinary('file_ine_r');
                if (t.pideFotoCli) file_selfie = await subirArchivoCloudinary('file_selfie');
                if (t.pideCompDomicilio) file_comp_domicilio = await subirArchivoCloudinary('file_comp_domicilio');
                if (t.pideEdoCta) file_edocta = await subirArchivoCloudinary('file_edocta');

                await updateDoc(doc(db, "asesores", userUID), {
                    saldo: increment(-c)
                });

                const docRef = await addDoc(collection(db, "solicitudes"), {
                    asesor_uid: userUID,
                    nombre_asesor: emailAsesor,
                    tipo: t.nombre,
                    costo: c,
                    estatus: "En Proceso",
                    finalizado: false,
                    fecha: serverTimestamp(),
                    curp: val('curp_p').toUpperCase(),
                    nss: val('nss_p'),
                    detalles_extra: extra,
                    cuestionario: quest,
                    file_ine_f,
                    file_ine_r,
                    file_selfie,
                    file_comp_domicilio,
                    file_edocta
                });

                await fetch("https://n8n.srv1567730.hstgr.cloud/webhook/Nueva_acta", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_solicitud: docRef.id,
                        asesor: emailAsesor,
                        tramite: t.nombre,
                        curp: val('curp_p'),
                        nss: val('nss_p'),
                        extra,
                        quest,
                        file_ine_f,
                        file_ine_r,
                        file_selfie,
                        file_comp_domicilio,
                        file_edocta
                    })
                }).catch(e => console.log("n8n log", e));

                alert("Enviado.");
                window.cerrarModal();

            } catch (e) {
                console.error(e);
                alert("Error.");
            } finally {
                enviandoTramite = false;
                if (botonPago) {
                    botonPago.disabled = false;
                    botonPago.innerText = textoOriginal || `Pagar $${c}.00`;
                    botonPago.style.opacity = "1";
                    botonPago.style.cursor = "pointer";
                }
            }
        };

        window.notificarPago = async () => {
            const m = parseFloat(document.getElementById('depMonto').value);
            const r = document.getElementById('claveRastreo').value;
            const f = document.getElementById('fileRecarga').files[0];

            if (!m || !r || !f) return alert("Completa datos.");

            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', UPLOAD_PRESET);

            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
            const d = await res.json();

            await addDoc(collection(db, "notificaciones_pago"), {
                uid: userUID,
                asesorEmail: emailAsesor,
                monto: m,
                rastreo: r.toUpperCase(),
                comprobante: d.secure_url,
                fecha: serverTimestamp(),
                estatus: "pendiente"
            });

            alert("Reportado.");
            window.cerrarModal();
        };

        window.enviarMensajeManual = async () => {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;

            await addDoc(collection(db, "chat_soporte"), {
                asesor_uid: userUID,
                remitente: emailAsesor,
                texto: input.value.trim(),
                timestamp: serverTimestamp(),
                respondido: false
            });

            input.value = "";
        };

        window.enviarPreguntaRapida = (pregunta) => {
            const paso = FLUJO_AYUDA[pregunta] || FLUJO_AYUDA["inicio"];
            const box = document.getElementById('chat-messages');
            const menu = document.querySelector('.help-menu');

            const dU = document.createElement('div');
            dU.className = "msg-user";
            dU.innerText = pregunta;
            box.appendChild(dU);

            setTimeout(() => {
                const dB = document.createElement('div');
                dB.className = "msg-support";
                dB.innerText = paso.texto;
                box.appendChild(dB);
                box.scrollTop = box.scrollHeight;

                menu.innerHTML = "";
                paso.opciones.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "btn-help";
                    b.innerText = o.toUpperCase();
                    b.onclick = () => window.enviarPreguntaRapida(o);
                    menu.appendChild(b);
                });
            }, 500);
        };

        function escucharSaldo() {
            onSnapshot(doc(db, "asesores", userUID), (d) => {
                if (d.exists()) {
                    saldoGlobal = d.data().saldo || 0;
                    document.getElementById('txtSaldoHeader').innerText = `$${saldoGlobal.toLocaleString('es-MX')}`;
                }
            });
        }

        function escucharHistorial() {
            onSnapshot(query(collection(db, "solicitudes"), where("asesor_uid", "==", userUID), orderBy("fecha", "desc"), limit(200)), (snap) => {
                const tbody = document.getElementById('listaHistorial');
                tbody.innerHTML = "";

                snap.forEach(d => {
                    const s = d.data();
                    const f = s.fecha ? s.fecha.toDate().toLocaleDateString() : '...';

                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td class="py-3 px-2">${f}</td>
                            <td class="py-3 px-4">${s.tipo}<br><small>${s.curp || ''}</small></td>
                            <td class="py-3 px-2 text-center font-black">${s.estatus}</td>
                            <td class="py-3 px-2 text-right">
                                ${s.archivoFinal ? `<a href="${s.archivoFinal}" target="_blank" class="bg-emerald-600 text-white p-1 rounded text-[9px]">BAJAR</a>` : '--'}
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function escucharChat() {
            onSnapshot(query(collection(db, "chat_soporte"), where("asesor_uid", "==", userUID), orderBy("timestamp", "asc")), (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";

                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = (m.remitente === emailAsesor) ? "msg-user" : "msg-support";
                    div.innerText = m.texto;
                    box.appendChild(div);
                });

                box.scrollTop = box.scrollHeight;
            });
        }

        window.cerrarSesion = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
