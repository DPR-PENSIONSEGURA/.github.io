<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control Maestro Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: none; }
        .card-stat { transition: all 0.3s ease; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .msg-alerta { border-left: 4px solid #ef4444; background: #fef2f2; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { background: #fef2f2; } 50% { background: #fee2e2; } 100% { background: #fef2f2; } }
        .solo-diana { display: none !important; }
        .btn-blue { background: #2563eb; color: white; padding: 8px 12px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-descarga { background: #9333ea; color: white; padding: 10px; border-radius: 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.2s ease; border: none; cursor: pointer; }
        .nav-pag { background: #1e293b; color: white; padding: 6px 14px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-white shadow-lg italic text-xl">DP</div>
                <div>
                    <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">CRM <span class="text-blue-600">Admin</span></h1>
                    <p id="txtRol" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">DPR Consultoría Executive</p>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full lg:w-auto">
                <div id="cardVentas" class="solo-diana card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-emerald-500 text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase">Ventas Hoy</p>
                    <p id="gananciaHoy" class="text-xl font-black text-emerald-600">$0.00</p>
                </div>
                <div class="card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-orange-500 text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase">Online</p>
                    <p id="txtVisitas" class="text-xl font-black text-orange-600">0</p>
                </div>
                <div id="cardRechazos" class="solo-diana card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-red-500 text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase">Rechazos</p>
                    <p id="txtRechazos" class="text-xl font-black text-red-600">0</p>
                </div>
                <button id="btnCorte" onclick="window.generarCorteMensual()" class="solo-diana bg-slate-800 text-white p-4 rounded-3xl shadow-lg hover:bg-slate-700 transition">
                    <p class="text-[10px] font-black uppercase">Corte PDF</p>
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <section class="lg:col-span-1">
                <h2 class="text-sm font-black uppercase italic text-slate-700 mb-4 border-l-4 border-blue-600 pl-4">Mensajería Soporte</h2>
                <div id="listaChat" class="bg-white rounded-[2rem] shadow-xl border overflow-y-auto h-[600px] p-4 space-y-4">
                    <p class="text-center text-[10px] text-slate-400 font-bold py-10 uppercase italic">Sincronizando...</p>
                </div>
            </section>

            <section class="lg:col-span-3">
                
                <div id="seccionAsesores" class="solo-diana bg-white rounded-[2rem] p-6 shadow-xl border mb-8">
                    <h2 class="text-[10px] font-black uppercase text-slate-700 mb-4 italic">Gestión de Apoyo (Asesores)</h2>
                    <div class="flex gap-2">
                        <input type="text" id="nuevoAsesorUser" placeholder="Nombre" class="bg-slate-100 p-3 rounded-xl flex-1 outline-none text-xs font-bold uppercase">
                        <input type="text" id="nuevoAsesorPass" placeholder="Clave" class="bg-slate-100 p-3 rounded-xl flex-1 outline-none text-xs font-bold">
                        <button onclick="window.agregarAsesor()" class="bg-emerald-500 text-white px-6 rounded-xl font-black text-xs uppercase transition hover:bg-emerald-600">Añadir</button>
                    </div>
                    <div id="listaAsesores" class="mt-4 space-y-2 max-h-32 overflow-y-auto"></div>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <div class="flex items-center gap-2">
                        <button class="nav-pag" onclick="window.cambiarPaginaPag(-1)"> < </button>
                        <select id="selectorPagina" onchange="window.cambiarPaginaDirecto(this.value)" class="bg-white border rounded p-1 font-black text-[10px]"></select>
                        <button class="nav-pag" onclick="window.cambiarPaginaPag(1)"> > </button>
                    </div>
                    <input type="text" id="buscador" onkeyup="window.buscarGlobal()" placeholder="BUSCAR TRÁMITE, NSS O CURP..." class="p-4 rounded-2xl border text-[10px] font-black uppercase w-full max-w-md shadow-lg outline-none focus:border-blue-600">
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-900 text-white text-[10px] uppercase font-black italic">
                                <tr><th class="p-4">Trámite / Fecha</th><th class="p-4">Información</th><th class="p-4 text-center">Estatus</th><th class="p-4 text-right">Acción</th></tr>
                            </thead>
                            <tbody id="tablaSolicitudes" class="text-[10px] font-bold italic"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modalDetalles" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <button onclick="window.cerrarModales()" class="absolute top-6 right-8 text-slate-400 text-3xl font-black">&times;</button>
            <h2 class="text-2xl font-black text-blue-600 uppercase mb-6 border-b pb-4 italic text-center">Expediente DPR</h2>
            <div id="contenedorDetalles" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"></div>
            <div id="contenedorCuestionario" class="bg-blue-50/50 p-5 rounded-2xl mb-6 border border-blue-200 hidden">
                <h3 class="text-xs font-black text-blue-800 uppercase mb-4 text-center border-b pb-2">Cuestionario Pensión</h3>
                <div id="gridCuestionario" class="grid grid-cols-1 md:grid-cols-2 gap-2 text-[10px]"></div>
            </div>
            <div class="border-t pt-6">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Documentos Adjuntos</h3>
                <div id="contenedorFotos" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            </div>
        </div>
    </div>

    <div id="modalChat" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl border-2 border-blue-500">
            <h2 id="chatTitle" class="text-xs font-black text-blue-600 uppercase mb-4 italic"></h2>
            <div id="chatHistory" class="bg-slate-50 h-72 overflow-y-auto p-4 rounded-2xl mb-4 space-y-2 flex flex-col"></div>
            <div class="flex gap-2">
                <input type="text" id="inputRespuesta" placeholder="Escribe..." class="flex-1 bg-slate-100 p-4 rounded-xl outline-none text-xs font-bold border focus:border-blue-500">
                <button id="btnEnviarRespuesta" class="bg-blue-600 text-white px-6 rounded-xl font-black">ENVIAR</button>
            </div>
            <button onclick="window.cerrarModales()" class="mt-4 text-[9px] font-black uppercase text-slate-300 w-full text-center tracking-widest">Cerrar</button>
        </div>
    </div>

    <div id="modalSubir" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-[150] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-4 uppercase italic text-blue-600">Subir Resultado</h2>
            <input type="file" id="inputArchivo" class="block w-full text-xs mb-6 border p-4 rounded-2xl bg-slate-50">
            <button id="btnGuardarFinal" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700 transition">Enviar a Cliente</button>
            <button onclick="window.cerrarModales()" class="mt-4 text-slate-400 font-black text-[10px] uppercase">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, increment, getDoc, limit, serverTimestamp, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PASS_DIANA = "Adiana.";
        const LISTA_ERRORES_DPR = {
            "ERR_NSS_CURP": "Error: el curp está mal / mal escrito etc",
            "ERR_INCONSISTENCIAS": "Error: Para inconsistencias puedes acudir a tu subdelegación del IMSS más cercana o hacer el trámite en línea...",
            "ERR_FOTOS": "Error: FOTOS ILEGIBLES",
            "ERR_INEXISTENTE": "Error: DOCUMENTO INEXISTENTE O NO ENCONTRADO",
            "ERR_PASS": "Error: CONTRASEÑA INCORRECTA",
            "ERR_LIMITE": "Error: alguien más las consultó intenta más tarde",
            "ERR_IMSS": "Error: ERROR EN IMSS"
        };

        let miRol = "asesor", currentPage = 1; const PAGE_SIZE = 30; let idTramiteActual = ""; let todasLasSoliCargadas = [];

        // --- SISTEMA DE LOGIN ---
        async function checkLogin() {
            const pass = prompt("DPR | Contraseña:");
            const asesoresSnap = await getDocs(collection(db, "accesos_crm"));
            let asesores = {};
            asesoresSnap.forEach(d => asesores[d.data().password] = d.data().nombre);

            if(pass === PASS_DIANA) {
                miRol = "diana";
                document.getElementById('txtRol').innerText = "ADMINISTRADORA MAESTRA";
                document.querySelectorAll('.solo-diana').forEach(el => el.style.display = 'block');
                document.body.style.display = "block";
                escucharGestion();
            } else if (asesores[pass]) {
                miRol = "asesor";
                document.getElementById('txtRol').innerText = "SOPORTE: " + asesores[pass].toUpperCase();
                document.body.style.display = "block";
            } else {
                alert("Incorrecto"); window.location.href = "https://pensionsegura.org";
            }
        }
        checkLogin();

        // --- UI HELPERS ---
        const selector = document.getElementById('selectorPagina');
        for(let i=1; i<=50; i++) selector.innerHTML += `<option value="${i}">Página ${i}</option>`;
        window.cambiarPaginaDirecto = (p) => { currentPage = parseInt(p); cargarSolicitudes(currentPage); };
        window.cambiarPaginaPag = (dir) => { let p = currentPage + dir; if(p > 0 && p <= 50) { currentPage = p; selector.value = p; cargarSolicitudes(p); } };
        window.cerrarModales = () => document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));

        // --- TRÁMITES Y ESTADÍSTICAS ---
        onSnapshot(query(collection(db, "solicitudes"), orderBy("fecha", "desc"), limit(1500)), (snap) => {
            todasLasSoliCargadas = [];
            let ganancia = 0, rechazos = 0, hoy = new Date().toLocaleDateString();
            snap.forEach(d => {
                const data = { id: d.id, ...d.data() };
                todasLasSoliCargadas.push(data);
                const fechaS = data.fecha?.toDate().toLocaleDateString();
                if(fechaS === hoy) {
                    if(data.estatus === "Terminado") ganancia += Number(data.costo || 0);
                    if(data.estatus.includes("Error") || data.estatus.includes("ERR_")) rechazos += 1;
                }
            });
            cargarSolicitudes(currentPage);
            document.getElementById('gananciaHoy').innerText = `$${ganancia.toFixed(2)}`;
            document.getElementById('txtRechazos').innerText = rechazos;
        });

        window.cargarSolicitudes = (pagina = 1) => {
            const inicio = (pagina - 1) * PAGE_SIZE;
            renderizarTablaPersonalizada(todasLasSoliCargadas.slice(inicio, inicio + PAGE_SIZE));
        };

        function renderizarTablaPersonalizada(docsArray) {
            const tabla = document.getElementById('tablaSolicitudes'); tabla.innerHTML = "";
            docsArray.forEach(s => {
                const fStr = s.fecha?.toDate().toLocaleString('es-MX', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) || '...';
                let info = `<div class="font-black text-slate-800 uppercase truncate w-48">${s.nombre_asesor || 'S/N'}</div>`;
                if(s.curp && s.curp !== "N/A") info += `<div class="text-[8px] text-blue-600 uppercase font-bold">CURP: ${s.curp}</div>`;

                tabla.innerHTML += `<tr class="border-b hover:bg-blue-50 transition">
                    <td class="p-4"><div>${s.tipo}</div><div class="text-[7px] text-slate-400">${fStr}</div></td>
                    <td class="p-4">${info}</td>
                    <td class="p-4 text-center">
                        <select onchange="window.cambiarEstatus('${s.id}', this.value)" class="border rounded p-1 text-[8px] uppercase bg-white outline-none">
                            <option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option>
                            <option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option>
                            <option value="ERR_NSS_CURP" ${s.estatus.includes('curp') ? 'selected' : ''}>❌ ERR: NSS/CURP</option>
                            <option value="ERR_INCONSISTENCIAS" ${s.estatus.includes('inconsistencias') ? 'selected' : ''}>❌ ERR: INCONSISTENCIAS</option>
                            <option value="ERR_FOTOS" ${s.estatus.includes('FOTOS') ? 'selected' : ''}>❌ ERR: FOTOS</option>
                            <option value="ERR_INEXISTENTE" ${s.estatus.includes('INEXISTENTE') ? 'selected' : ''}>❌ ERR: NO EXISTE</option>
                            <option value="ERR_PASS" ${s.estatus.includes('CONTRASEÑA') ? 'selected' : ''}>❌ ERR: PASS</option>
                            <option value="ERR_LIMITE" ${s.estatus.includes('límite') ? 'selected' : ''}>❌ ERR: LÍMITE</option>
                            <option value="ERR_IMSS" ${s.estatus.includes('IMSS') ? 'selected' : ''}>❌ ERR: IMSS</option>
                        </select>
                    </td>
                    <td class="p-4 text-right space-x-1">
                        <button onclick='window.verDetalles(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="bg-blue-100 text-blue-600 p-2 rounded-lg text-[10px] transition hover:scale-110">👁️</button>
                        <button onclick="window.abrirSubida('${s.id}')" class="btn-blue">SUBIR</button>
                    </td>
                </tr>`;
            });
        }

        // --- CÓDIGO CANDADO CONTRA N8N ---
        window.cambiarEstatus = async (id, val) => {
            const docRef = doc(db, "solicitudes", id);
            try {
                const snap = await getDoc(docRef), s = snap.data();
                let est = LISTA_ERRORES_DPR[val] || val;

                if (val.startsWith("ERR_")) {
                    if (!s.reembolsado) {
                        await updateDoc(doc(db, "asesores", s.asesor_uid), { saldo: increment(Number(s.costo)) });
                        await updateDoc(docRef, { 
                            estatus: est, 
                            reembolsado: true,
                            finalizado: true, // CANDADO PARA N8N
                            bloqueado: true 
                        });
                        alert("✅ Reembolso y CANDADO activado.");
                    } else {
                        await updateDoc(docRef, { estatus: est, finalizado: true });
                    }
                } else {
                    await updateDoc(docRef, { estatus: est });
                }
            } catch (e) { alert("Error al actualizar"); }
        };

        // --- VER EXPEDIENTE Y ARCHIVOS ---
        window.verDetalles = (data) => {
            const cont = document.getElementById('contenedorDetalles'); cont.innerHTML = "";
            const campos = [{l:"Asesor", v:data.nombre_asesor}, {l:"Trámite", v:data.tipo}, {l:"CURP", v:data.curp}, {l:"NSS", v:data.nss}];
            if(data.detalles_extra) {
                const e = data.detalles_extra;
                if(e.nombre_cliente && e.nombre_cliente !== "N/A") campos.push({l:"Cliente", v:e.nombre_cliente});
                if(e.telefono && e.telefono !== "N/A") campos.push({l:"Teléfono Cli.", v:e.telefono});
                if(e.correo && e.correo !== "N/A") campos.push({l:"Correo", v:e.correo, isPass:true});
                if(e.pass && e.pass !== "N/A") campos.push({l:"Pass Actual", v:e.pass, isPass:true});
                if(e.pass_nueva && e.pass_nueva !== "N/A") campos.push({l:"Pass Nueva", v:e.pass_nueva, isPass:true});
                if(e.num_servicio && e.num_servicio !== "N/A") campos.push({l:"Núm. Servicio CFE", v:e.num_servicio});
                if(e.nota && e.nota !== "N/A") campos.push({l:"Nota", v:e.nota});
            }
            campos.forEach(c => { if(c.v && c.v !== "N/A") cont.innerHTML += `<div class="bg-slate-50 p-3 rounded-xl border border-slate-200"><p class="text-[8px] text-slate-400 font-black uppercase">${c.l}</p><p class="text-[10px] font-bold text-slate-800 uppercase" style="${c.isPass ? 'text-transform:none;' : ''}">${c.v}</p></div>`; });

            const boxQ = document.getElementById('contenedorCuestionario'); const gridQ = document.getElementById('gridCuestionario');
            if(data.cuestionario && data.cuestionario !== "N/A") {
                boxQ.classList.remove('hidden'); gridQ.innerHTML = "";
                Object.entries(data.cuestionario).forEach(([key, val]) => { if(val && val !== "N/A") gridQ.innerHTML += `<div class="border-b py-1"><span class="text-blue-500 font-black text-[7px] uppercase block">${key.replace(/_/g, " ")}</span><span class="font-bold text-slate-700">${val}</span></div>`; });
            } else { boxQ.classList.add('hidden'); }

            const contFotos = document.getElementById('contenedorFotos'); contFotos.innerHTML = "";
            const f = data.detalles_extra || {};
            const fotos = [{l:"INE F", u:data.file_ine_f || f.file_ine_f}, {l:"INE R", u:data.file_ine_r || f.file_ine_r}, {l:"FOTO Cli.", u:data.file_selfie || f.file_selfie}, {l:"EDO CTA", u:data.file_edocta || f.file_edocta}, {l:"DOMICILIO", u:data.file_comp_domicilio || f.file_comp_domicilio}];
            fotos.forEach(foto => { if(foto.u && foto.u !== "N/A" && foto.u !== "") contFotos.innerHTML += `<button onclick="window.open('${foto.u}')" class="btn-descarga">📥 ${foto.l}</button>`; });

            document.getElementById('modalDetalles').classList.remove('hidden');
        };

        // --- GESTIÓN DE CHAT Y SOPORTE ---
        onSnapshot(query(collection(db, "chat_soporte"), orderBy("timestamp", "desc")), (snap) => {
            const cont = document.getElementById('listaChat'); cont.innerHTML = "";
            let chatGroups = {};
            snap.forEach(d => {
                const m = d.data();
                if(!chatGroups[m.asesor_uid]) {
                    chatGroups[m.asesor_uid] = true;
                    const alertClass = (m.respondido === false) ? "msg-alerta" : "bg-white";
                    cont.innerHTML += `<div onclick="window.abrirChat('${m.asesor_uid}', '${m.remitente}')" class="p-4 rounded-2xl border cursor-pointer hover:shadow-lg transition ${alertClass}"><span class="text-[9px] font-black uppercase text-blue-600">${m.remitente}</span><p class="text-[10px] font-bold text-slate-500 truncate">${m.texto}</p></div>`;
                }
            });
        });

        window.abrirChat = (uid, email) => {
            document.getElementById('chatTitle').innerText = "Chat: " + email;
            document.getElementById('modalChat').classList.remove('hidden');
            onSnapshot(query(collection(db, "chat_soporte"), where("asesor_uid", "==", uid), orderBy("timestamp", "asc")), (snap) => {
                const box = document.getElementById('chatHistory'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data(), align = (m.remitente === email) ? "self-start bg-white text-slate-800" : "self-end bg-blue-600 text-white";
                    box.innerHTML += `<div class="p-3 rounded-2xl text-[10px] font-bold shadow-sm max-w-[85%] ${align}">${m.texto}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
            document.getElementById('btnEnviarRespuesta').onclick = async () => {
                const input = document.getElementById('inputRespuesta'); if(!input.value) return;
                await addDoc(collection(db, "chat_soporte"), { asesor_uid: uid, remitente: "Soporte DPR", texto: input.value, timestamp: serverTimestamp(), respondido: true });
                const qMsg = await getDocs(query(collection(db, "chat_soporte"), where("asesor_uid", "==", uid)));
                qMsg.forEach(async (docChat) => { await updateDoc(doc(db, "chat_soporte", docChat.id), { respondido: true }); });
                input.value = "";
            };
        };

        // --- GESTIÓN DE ASESORES Y VISITAS ---
        function escucharGestion() {
            onSnapshot(collection(db, "accesos_crm"), (snap) => {
                const div = document.getElementById('listaAsesores'); div.innerHTML = "";
                snap.forEach(d => { div.innerHTML += `<div class="flex justify-between bg-slate-50 p-2 rounded-lg text-[9px] font-bold border"><span>👤 ${d.data().nombre}</span> <span class="text-blue-600">🔑 ${d.data().password}</span></div>`; });
            });
        }
        window.agregarAsesor = async () => {
            const n = document.getElementById('nuevoAsesorUser').value, p = document.getElementById('nuevoAsesorPass').value;
            if(!n || !p) return alert("Completa campos");
            await addDoc(collection(db, "accesos_crm"), { nombre: n, password: p });
            document.getElementById('nuevoAsesorUser').value = ""; document.getElementById('nuevoAsesorPass').value = "";
        };

        onSnapshot(doc(db, "visitas_diarias", new Date().toISOString().split('T')[0]), (d) => { if(d.exists()) document.getElementById('txtVisitas').innerText = d.data().contador; });

        window.abrirSubida = (id) => { idTramiteActual = id; document.getElementById('modalSubir').classList.remove('hidden'); };
        document.getElementById('btnGuardarFinal').onclick = async () => {
            const f = document.getElementById('inputArchivo').files[0];
            if(!f) return alert("Archivo?");
            const btn = document.getElementById('btnGuardarFinal'); btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', "dpr_uploads");
            const res = await fetch(`https://api.cloudinary.com/v1_1/de5abnhul/auto/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(data.secure_url) {
                await updateDoc(doc(db, "solicitudes", idTramiteActual), { archivoFinal: data.secure_url, estatus: "Terminado", finalizado: true });
                window.cerrarModales(); alert("✅ Terminado");
            }
            btn.innerText = "Enviar a Cliente"; btn.disabled = false;
        };

        window.buscarGlobal = () => {
            const bus = document.getElementById('buscador').value.toUpperCase();
            if (bus.length < 1) return cargarSolicitudes(currentPage);
            const filtrados = todasLasSoliCargadas.filter(s => (s.curp && s.curp.includes(bus)) || (s.nss && s.nss.includes(bus)) || (s.tipo.toUpperCase().includes(bus)) || (s.nombre_asesor && s.nombre_asesor.toUpperCase().includes(bus)));
            renderizarTablaPersonalizada(filtrados);
        };
    </script>
</body>
</html>
