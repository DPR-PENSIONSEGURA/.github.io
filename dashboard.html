<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría | Panel Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-image: url('https://images.unsplash.com/photo-1533134486753-c833f074868f?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; color: #1E293B; }
        .header-glass { background: rgba(255, 255, 255, 0.9); border-bottom: 2px solid #D4AF37; backdrop-filter: blur(10px); }
        .green-gradient { background: linear-gradient(135deg, #8FCE00 0%, #10B981 100%); }
        .category-card { background: white; border: 1px solid #D4AF37; cursor: pointer; transition: 0.3s; border-radius: 1.5rem; }
        .category-card:hover { border-color: #8FCE00; transform: translateY(-3px); }
        .input-light { border: 2px solid #E2E8F0; padding: 12px; border-radius: 15px; width: 100%; outline: none; font-size: 11px; font-weight: 600; }
        .input-light:focus { border-color: #D4AF37; }
        
        /* ESTILO DEL CHAT */
        #chat-window { display: none; width: 320px; height: 450px; background: white; border-radius: 20px; border: 2px solid #D4AF37; flex-direction: column; overflow: hidden; box-shadow: 0 20px 25px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .chat-header { background: #D4AF37; color: white; padding: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .msg-user { background: #8FCE00; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 85%; }
        .msg-support { background: #f1f1f1; color: #333; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 85%; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-40 header-glass">
        <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="green-gradient w-9 h-9 rounded-xl flex items-center justify-center font-black text-white shadow-lg italic">DP</div>
                <h1 class="font-black uppercase text-lg text-slate-800">DPR <span class="text-emerald-600 italic">Consultoría</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="window.abrirModal('modalSaldo')" class="bg-white px-4 py-2 rounded-full border-2 border-emerald-500 flex items-center gap-2">
                    <span id="txtSaldoHeader" class="font-black text-emerald-600 text-xs">$0.00</span>
                </button>
                <button onclick="window.cerrarSesion()" class="text-[9px] font-black uppercase text-slate-400">Salir</button>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 id="tituloSeccion" class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 italic">Panel de Servicios</h2>
            <button id="btnVolver" onclick="window.resetearPanel()" class="hidden text-[9px] font-black uppercase bg-slate-800 text-white px-4 py-2 rounded-full hover:bg-orange-600 transition">⬅️ Volver</button>
        </div>

        <div id="gridCategorias" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12">
            <button onclick="window.mostrarTramites('IMSS')" class="category-card p-5 text-center">🏥 <span class="text-[9px] block font-black uppercase mt-2">IMSS</span></button>
            <button onclick="window.mostrarTramites('SAT')" class="category-card p-5 text-center">⚖️ <span class="text-[9px] block font-black uppercase mt-2">SAT</span></button>
            <button onclick="window.mostrarTramites('DOC')" class="category-card p-5 text-center">📄 <span class="text-[9px] block font-black uppercase mt-2">DOCS</span></button>
            <button onclick="window.mostrarTramites('INF')" class="category-card p-5 text-center">🏠 <span class="text-[9px] block font-black uppercase mt-2">INFONAVIT</span></button>
            <button onclick="window.mostrarTramites('PENSIONES')" class="category-card p-5 text-center">📈 <span class="text-[9px] block font-black uppercase mt-2">PENSIONES</span></button>
            <button onclick="window.mostrarTramites('AFORE')" class="category-card p-5 text-center">💰 <span class="text-[9px] block font-black uppercase mt-2">AFORE</span></button>
        </div>

        <div id="listaServicios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12 hidden"></div>

        <section class="bg-white/90 rounded-[2.5rem] p-6 shadow-xl border border-slate-200">
            <h2 class="text-lg font-black text-slate-800 uppercase italic mb-6">Historial de Solicitudes</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="text-[9px] font-black uppercase text-slate-400 border-b italic"><th class="pb-4">Fecha</th><th class="pb-4">Tipo</th><th class="pb-4 text-center">Estatus</th><th class="pb-4 text-right">Acción</th></tr></thead>
                    <tbody id="listaHistorial" class="text-xs font-bold italic"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalTramite" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 relative overflow-y-auto max-h-[90vh]">
            <button onclick="window.cerrarModal()" class="absolute top-6 right-8 text-slate-400 text-2xl">×</button>
            <div id="formContent"></div>
        </div>
    </div>

    <div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 100;">
        <div id="chat-window">
            <div class="chat-header flex justify-between">
                <span>💬 Asistencia DPR</span>
                <button onclick="window.toggleChat()">×</button>
            </div>
            <div id="chat-messages"></div>
            <div class="p-3 border-t bg-gray-50 flex gap-2">
                <input type="text" id="chat-input" placeholder="Escribe..." class="input-light flex-1">
                <button id="btn-send-chat" class="bg-emerald-500 text-white p-2 rounded-xl">➤</button>
            </div>
        </div>
        <button onclick="window.toggleChat()" class="green-gradient w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl animate-bounce">🎧</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, setDoc, collection, query, where, serverTimestamp, increment, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUID = "", emailAsesor = "";

        const TRAMITES = {
            'IMSS': [
                { nombre: 'SEMANAS COTIZADAS', precio: 25 },
                { nombre: 'SINDO COMPLETO', precio: 135 }
            ],
            'SAT': [{ nombre: 'RFC Original', precio: 180 }],
            'DOC': [{ nombre: 'CURP Certificada', precio: 4 }],
            'INF': [{ nombre: 'Histórico Infonavit', precio: 150 }],
            'PENSIONES': [{ nombre: 'Análisis rápido', precio: 200 }],
            'AFORE': [{ nombre: 'Resumen de Afore', precio: 10 }]
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                userUID = user.uid; emailAsesor = user.email; 
                marcarPresencia("online"); escucharSaldo(); escucharHistorial(); escucharChat();
            } else { window.location.href = "login/index.html"; }
        });

        async function marcarPresencia(status) {
            await setDoc(doc(db, "usuarios", userUID), { nombre: emailAsesor, status: status, lastSeen: serverTimestamp() }, { merge: true });
        }

        // --- FUNCIONES DE NAVEGACIÓN ---
        window.mostrarTramites = (cat) => {
            document.getElementById('gridCategorias').classList.add('hidden');
            document.getElementById('listaServicios').classList.remove('hidden');
            document.getElementById('btnVolver').classList.remove('hidden'); // MOSTRAR BOTÓN
            document.getElementById('tituloSeccion').innerText = "Servicios: " + cat;

            const lista = document.getElementById('listaServicios');
            let html = '';
            TRAMITES[cat].forEach(t => {
                html += `<div onclick="window.prepararTramite('${t.nombre}', ${t.precio})" class="category-card p-5 text-center"><p class="font-black text-[9px] uppercase">${t.nombre}</p><p class="text-emerald-600 font-black text-[8px]">$${t.precio}.00</p></div>`;
            });
            lista.innerHTML = html;
        };

        window.resetearPanel = () => {
            document.getElementById('gridCategorias').classList.remove('hidden');
            document.getElementById('listaServicios').classList.add('hidden');
            document.getElementById('btnVolver').classList.add('hidden'); // OCULTAR BOTÓN
            document.getElementById('tituloSeccion').innerText = "Panel de Servicios";
        };

        // --- EL RESTO SIGUE IGUAL ---
        window.prepararTramite = (nombre, costo) => {
            document.getElementById('formContent').innerHTML = `<h2 class="text-lg font-black text-emerald-600 mb-6 uppercase italic">${nombre}</h2><input type="text" id="curp_p" placeholder="CURP" class="input-light mb-4 uppercase"><button onclick="window.confirmarCompra('${nombre}', ${costo})" class="w-full bg-orange-500 py-4 rounded-2xl font-black text-white uppercase text-xs">Pagar $${costo}.00</button>`;
            window.abrirModal('modalTramite');
        };

        window.confirmarCompra = async (n, c) => {
            const curp = document.getElementById('curp_p').value.trim();
            if (!curp) return alert("CURP obligatoria");
            await addDoc(collection(db, "solicitudes"), { asesor_uid: userUID, tipo: n, costo: c, estatus: "En Proceso", fecha: serverTimestamp(), curp: curp });
            alert("Enviado con éxito"); window.cerrarModal();
        };

        function escucharHistorial() {
            onSnapshot(query(collection(db, "solicitudes"), where("asesor_uid", "==", userUID), orderBy("fecha", "desc"), limit(50)), (snap) => {
                const lista = document.getElementById('listaHistorial');
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    const f = data.fecha ? data.fecha.toDate().toLocaleDateString() : '...';
                    html += `<tr class="border-b"><td class="py-3 px-2">${f}</td><td class="py-3 px-4">${data.tipo}</td><td class="py-3 px-2 text-center uppercase font-black">${data.estatus}</td><td class="py-3 px-2 text-right">--</td></tr>`;
                });
                lista.innerHTML = html || '<tr><td colspan="4" class="py-10 text-center">Sin registros</td></tr>';
            });
        }

        window.toggleChat = () => {
            const win = document.getElementById('chat-window');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        };

        document.getElementById('btn-send-chat').onclick = async () => {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            await addDoc(collection(db, "chat_soporte"), {
                texto: input.value, remitente: emailAsesor, asesor_uid: userUID, timestamp: serverTimestamp()
            });
            input.value = "";
        };

        function escucharChat() {
            const q = query(collection(db, "chat_soporte"), where("asesor_uid", "==", userUID), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = (m.remitente === emailAsesor) ? "msg-user" : "msg-support";
                    div.innerText = m.texto;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.abrirModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.cerrarModal = () => document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));
        window.cerrarSesion = () => signOut(auth).then(() => location.reload());
        function escucharSaldo() { onSnapshot(doc(db, "asesores", userUID), (d) => { if (d.exists()) { document.getElementById('txtSaldoHeader').innerText = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(d.data().saldo || 0); } }); }
    </script>
</body>
</html>
