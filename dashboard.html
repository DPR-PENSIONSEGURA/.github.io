<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control Maestro Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: none; }
        .card-stat { transition: all 0.3s ease; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .nav-pag { background: #1e293b; color: white; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .seccion-contenido { transition: max-height 0.4s ease-in-out; overflow: hidden; }
        .seccion-cerrada { max-height: 0 !important; }
        .seccion-abierta { max-height: 5000px; }
        table { width: 100%; border-collapse: collapse; }
        .btn-eye { background: #dbeafe; color: #2563eb; padding: 8px; border-radius: 10px; transition: all 0.2s; }
        .btn-eye:hover { background: #2563eb; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-white shadow-lg italic text-xl">DP</div>
                <div>
                    <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">Panel <span class="text-blue-600">Admin</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">DPR Consultoría Executive</p>
                </div>
            </div>
            <div class="flex gap-4 w-full lg:w-auto">
                <div class="card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-orange-500 text-center flex-1">
                    <p id="txtVisitas" class="text-xl font-black">0</p>
                </div>
                <div class="card-stat bg-blue-600 text-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-800 text-center flex-1">
                    <p id="contadorPendientes" class="text-xl font-black">0</p>
                </div>
                <button onclick="window.abrirCajaFuerte()" class="card-stat bg-slate-800 text-white p-4 rounded-3xl shadow-lg border-b-4 border-slate-900 text-center flex-1">
                    <p class="text-xl font-black">🔒</p>
                </button>
            </div>
        </header>

        <section class="mb-8">
            <div onclick="window.toggleSeccion('contenidoSaldo', 'icoSaldo')" class="flex justify-between items-center cursor-pointer bg-slate-200 p-4 rounded-2xl select-none">
                <h2 class="text-sm font-black uppercase italic text-slate-700 border-l-4 border-emerald-500 pl-4">Aprobación de Saldo</h2>
                <div id="icoSaldo" class="font-black text-slate-400">▼</div>
            </div>
            <div id="contenidoSaldo" class="seccion-contenido seccion-abierta mt-4">
                <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
                    <table class="text-left text-[10px]"><tbody id="tablaRecargas"></tbody></table>
                </div>
            </div>
        </section>
        
        <section>
            <div onclick="window.toggleSeccion('contenidoSolicitudes', 'icoSoli')" class="flex justify-between items-center cursor-pointer bg-slate-200 p-4 rounded-2xl mb-4 select-none">
                <h2 class="text-sm font-black uppercase italic text-slate-700 border-l-4 border-blue-600 pl-4">Solicitudes</h2>
                <div id="icoSoli" class="font-black text-slate-400">▼</div>
            </div>

            <div id="contenidoSolicitudes" class="seccion-contenido seccion-abierta">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border">
                        <button class="nav-pag" onclick="window.cambiarPag(-1)"> < </button>
                        <span id="txtPagina" class="text-[10px] font-black px-4">PÁGINA 1</span>
                        <button class="nav-pag" onclick="window.cambiarPag(1)"> > </button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="buscador" onkeyup="window.buscarGlobal()" placeholder="BUSCAR CURP, NSS O ASESOR..." class="p-3 rounded-2xl border text-[10px] font-black uppercase w-72 shadow-sm">
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="text-left">
                            <thead class="bg-slate-900 text-white text-[10px] uppercase font-black italic">
                                <tr><th class="p-4">Origen</th><th class="p-4">Trámite</th><th class="p-4">Datos Principales</th><th class="p-4 text-center">Estatus</th><th class="p-4 text-right">Acción</th></tr>
                            </thead>
                            <tbody id="tablaSolicitudes" class="text-[11px] font-medium">
                                <tr><td colspan="5" class="p-20 text-center font-black uppercase opacity-20">Cargando base de datos...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="modalDetalles" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <button onclick="window.cerrarModales()" class="absolute top-6 right-8 text-slate-400 text-3xl font-black">&times;</button>
            <h2 class="text-2xl font-black text-blue-600 uppercase italic mb-6 border-b pb-4 text-center">Expediente DPR</h2>
            <div id="contenedorDetalles" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <div id="modalSubir" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-center">
            <h2 class="text-xl font-black mb-6 uppercase italic">Subir Resultado</h2>
            <input type="file" id="inputArchivo" class="block w-full text-xs mb-6 border p-2 rounded-lg">
            <button id="btnGuardar" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase">Subir y Terminar</button>
            <button onclick="window.cerrarModales()" class="mt-4 text-slate-400 font-black text-[10px] uppercase">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, increment, getDoc, limit, serverTimestamp, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PASS_DIANA = "Sashimi$";
        const PASS_ASISTENTE = "DPR2026";
        const vPass = prompt("Contraseña de acceso:");
        if(vPass === PASS_DIANA || vPass === PASS_ASISTENTE) { document.body.style.display="block"; } else { window.location.href="https://pensionsegura.org"; }

        let paginaActual = 1; const LIMITE = 25; 
        let cacheSolicitudes = []; 
        let idTramiteActual = "";

        // --- FUNCIONES DE NAVEGACIÓN ---
        window.toggleSeccion = (id, ico) => {
            const c = document.getElementById(id);
            c.classList.toggle('seccion-cerrada');
            document.getElementById(ico).innerText = c.classList.contains('seccion-cerrada') ? "▶" : "▼";
        };

        window.cerrarModales = () => {
            document.getElementById('modalDetalles').classList.add('hidden');
            document.getElementById('modalSubir').classList.add('hidden');
        };

        // --- CARGAR DATOS ---
        const cargarDatos = () => {
            // Escuchar solicitudes en tiempo real (Optimizado)
            onSnapshot(query(collection(db, "solicitudes"), orderBy("fecha", "desc"), limit(200)), (snap) => {
                cacheSolicitudes = [];
                snap.forEach(d => cacheSolicitudes.push({ id: d.id, ...d.data() }));
                renderizarTabla();
                actualizarContadores();
            });

            // Escuchar recargas
            onSnapshot(query(collection(db, "notificaciones_pago"), orderBy("fecha", "desc"), limit(10)), (snap) => {
                const t = document.getElementById('tablaRecargas'); t.innerHTML = "";
                snap.forEach(docSnap => {
                    const r = docSnap.data(); const id = docSnap.id;
                    const statusColor = r.estatus === "pendiente" ? "text-orange-600 bg-orange-50" : "text-emerald-600 bg-emerald-50";
                    t.innerHTML += `<tr class="border-b"><td class="p-4"><b>${r.asesorEmail}</b><br><span class="text-blue-600 font-bold">RASTREO: ${r.rastreo || 'S/R'}</span></td><td class="p-4 text-center"><b>$${r.monto}</b><br><span class="px-2 py-0.5 rounded-full font-black ${statusColor}">${r.estatus.toUpperCase()}</span></td><td class="p-4 text-center"><button onclick="window.open('${r.comprobante}')" class="underline text-blue-600 font-bold italic">VER TICKET</button></td><td class="p-4 text-right">${r.estatus === 'pendiente' ? `<button onclick="window.validarRecarga('${id}', '${r.uid}', ${r.monto})" class="bg-emerald-500 text-white px-3 py-1 rounded-lg font-black">APROBAR</button>` : '✅'}</td></tr>`;
                });
            });
        };

        const renderizarTabla = () => {
            const tabla = document.getElementById('tablaSolicitudes');
            tabla.innerHTML = "";
            const inicio = (paginaActual - 1) * LIMITE;
            const final = inicio + LIMITE;
            const items = cacheSolicitudes.slice(inicio, final);

            if(items.length === 0) { tabla.innerHTML = "<tr><td colspan='5' class='p-10 text-center opacity-30'>No hay trámites para mostrar</td></tr>"; return; }

            items.forEach((s, index) => {
                const fecha = s.fecha?.toDate().toLocaleString('es-MX', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) || '...';
                
                // DATA DE MODALIDAD 10 Y OTROS
                let extraInfo = `<div class="font-black text-slate-800 uppercase">${s.nombre_asesor || 'S/N'}</div>`;
                if(s.curp) extraInfo += `<div class="text-[9px] text-blue-600 font-black">CURP: ${s.curp}</div>`;
                if(s.nss) extraInfo += `<div class="text-[9px] text-slate-500 font-black">NSS: ${s.nss}</div>`;
                if(s.sueldo_mensual) extraInfo += `<div class="text-[9px] text-orange-600 font-black">SUELDO: $${s.sueldo_mensual}</div>`;

                tabla.innerHTML += `<tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-4 text-center"><span class="bg-slate-100 px-2 py-1 rounded-full font-black text-[8px] uppercase">${s.origen || 'Portal'}</span></td>
                    <td class="p-4"><b>${s.tipo}</b><br><span class="text-[9px] text-slate-400 font-bold italic">${fecha}</span></td>
                    <td class="p-4">${extraInfo}</td>
                    <td class="p-4 text-center">
                        <select onchange="window.cambiarEstatus('${s.id}', this.value)" class="text-[9px] font-black border rounded p-1 outline-none uppercase bg-white">
                            <option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option>
                            <option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option>
                            <option value="Error: DATOS INCORRECTOS" ${s.estatus.includes('DATOS') ? 'selected' : ''}>❌ ERR: DATOS</option>
                            <option value="Error: FOTOS ILEGIBLES" ${s.estatus.includes('FOTOS') ? 'selected' : ''}>❌ ERR: FOTOS</option>
                            <option value="Error: ERROR FATAL EN IMSS" ${s.estatus.includes('FATAL') ? 'selected' : ''}>❌ ERR: IMSS</option>
                        </select>
                    </td>
                    <td class="p-4 text-right space-x-1">
                        <button onclick="window.verDetalles(${inicio + index})" class="btn-eye font-black text-[12px]">👁️</button>
                        <button onclick="window.abrirSubida('${s.id}')" class="bg-blue-600 text-white px-3 py-2 rounded-xl font-black text-[9px] uppercase">Subir</button>
                    </td>
                </tr>`;
            });
            document.getElementById('txtPagina').innerText = `PÁGINA ${paginaActual}`;
        };

        window.verDetalles = (indiceGlobal) => {
            const s = cacheSolicitudes[indiceGlobal];
            const cont = document.getElementById('contenedorDetalles');
            cont.innerHTML = "";
            const campos = [
                {l:"Asesor", v:s.nombre_asesor}, {l:"Cliente", v:s.cliente_nombre}, {l:"Trámite", v:s.tipo},
                {l:"CURP", v:s.curp}, {l:"NSS", v:s.nss}, {l:"RFC", v:s.rfc}, {l:"IDCIF", v:s.idcif},
                {l:"Sueldo", v:s.sueldo_mensual}, {l:"Ocupación", v:s.ocupacion}, {l:"Respaldo", v:s.correo_respaldo}, {l:"Notas", v:s.notas}
            ];
            campos.forEach(c => { if(c.v) cont.innerHTML += `<div class="bg-slate-50 p-3 rounded-2xl border"><p class="text-[8px] text-slate-400 font-black uppercase">${c.l}</p><p class="text-[11px] font-bold text-slate-800 uppercase">${c.v}</p></div>`; });
            
            const fotos = [{l:"INE F", u:s.file_ine_f}, {l:"INE R", u:s.file_ine_r}, {l:"FOTO", u:s.file_selfie}, {l:"DOMICILIO", u:s.file_comp_domicilio}, {l:"EDO CTA", u:s.file_edocta}];
            let fHtml = `<div class="col-span-full mt-4 flex flex-wrap gap-2">`;
            fotos.forEach(f => { if(f.u) fHtml += `<button onclick="window.open('${f.u}')" class="bg-purple-600 text-white px-4 py-2 rounded-xl font-black text-[9px] uppercase">📥 ${f.l}</button>`; });
            cont.innerHTML += fHtml + `</div>`;
            document.getElementById('modalDetalles').classList.remove('hidden');
        };

        window.cambiarPag = (dir) => { 
            let nueva = paginaActual + dir;
            if(nueva > 0 && nueva <= Math.ceil(cacheSolicitudes.length / LIMITE)) {
                paginaActual = nueva; renderizarTabla();
            }
        };

        window.cambiarEstatus = async (id, est) => {
            const ref = doc(db, "solicitudes", id);
            if(est.includes("Error")) {
                const s = (await getDoc(ref)).data();
                if(!s.reembolsado && s.costo > 0) {
                    await updateDoc(doc(db, "asesores", s.asesor_uid), { saldo: increment(Number(s.costo)) });
                    await updateDoc(ref, { estatus: est, reembolsado: true });
                    alert("Reembolso enviado.");
                }
            } else { await updateDoc(ref, { estatus: est }); }
        };

        window.validarRecarga = async (id, uid, monto) => {
            if(confirm("¿Aprobar saldo?")) {
                await updateDoc(doc(db, "asesores", uid), { saldo: increment(monto) });
                await updateDoc(doc(db, "notificaciones_pago", id), { estatus: "aprobado" });
            }
        };

        window.abrirSubida = (id) => { idTramiteActual = id; document.getElementById('modalSubir').classList.remove('hidden'); };

        document.getElementById('btnGuardar').onclick = async () => {
            const f = document.getElementById('inputArchivo').files[0];
            if(!f) return;
            const btn = document.getElementById('btnGuardar'); btn.innerText = "PROCESANDO..."; btn.disabled = true;
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', "dpr_uploads");
            const res = await fetch(`https://api.cloudinary.com/v1_1/de5abnhul/auto/upload`, { method: 'POST', body: fd });
            const d = await res.json();
            await updateDoc(doc(db, "solicitudes", idTramiteActual), { archivoFinal: d.secure_url, estatus: "Terminado" });
            window.cerrarModales(); btn.innerText = "Subir y Terminar"; btn.disabled = false;
        };

        window.buscarGlobal = () => {
            const b = document.getElementById('buscador').value.toUpperCase();
            if(!b) { renderizarTabla(); return; }
            const filtrados = cacheSolicitudes.filter(s => JSON.stringify(s).toUpperCase().includes(b));
            renderizarTablaFiltrada(filtrados);
        };

        function renderizarTablaFiltrada(docs) {
            const tabla = document.getElementById('tablaSolicitudes'); tabla.innerHTML = "";
            docs.forEach((s, index) => {
                tabla.innerHTML += `<tr class="border-b">
                    <td class="p-4 text-center text-[8px] uppercase font-black">${s.origen}</td>
                    <td class="p-4"><b>${s.tipo}</b></td>
                    <td class="p-4 font-bold text-blue-600">${s.curp || s.nss || s.nombre_asesor}</td>
                    <td class="p-4 text-center font-black uppercase text-orange-500">${s.estatus}</td>
                    <td class="p-4 text-right"><button onclick="window.open('${s.archivoFinal || '#'}')" class="bg-emerald-600 text-white p-2 rounded-lg font-black text-[9px] ${s.archivoFinal ? '' : 'hidden'}">VER</button></td>
                </tr>`;
            });
        }

        const actualizarContadores = () => {
            let p = 0; cacheSolicitudes.forEach(s => { if(s.estatus === "En Proceso") p++; });
            document.getElementById('contadorPendientes').innerText = p;
        };

        // --- BOTÓN CANCELACIÓN MASIVA ---
        window.ejecutarCancelacionMasiva = async () => {
            if(!confirm("⚠️ ¿CANCELAR TODAS LAS SEMANAS DESDE LAS 4PM?")) return;
            const hoy = new Date(); hoy.setHours(16,0,0,0);
            const ts = Timestamp.fromDate(hoy);
            const q = query(collection(db, "solicitudes"), where("tipo", "==", "Semanas Cotizadas"), where("estatus", "==", "En Proceso"), where("fecha", ">=", ts));
            const snap = await getDocs(q);
            if(snap.empty) return alert("Nada por cancelar.");
            for(const docSnap of snap.docs) {
                const data = docSnap.data();
                if(data.asesor_uid && !data.reembolsado) {
                    await updateDoc(doc(db, "asesores", data.asesor_uid), { saldo: increment(Number(data.costo)) });
                }
                await updateDoc(doc(db, "solicitudes", docSnap.id), { estatus: "Error: ERROR FATAL EN IMSS", reembolsado: true });
            }
            alert("✅ Reembolsos terminados.");
        };

        const btnM = document.createElement("button");
        btnM.innerHTML = "⚠️ CANCELAR 4PM";
        btnM.style = "position:fixed; bottom:20px; right:20px; background:red; color:white; font-weight:black; padding:15px; border-radius:15px; z-index:100; font-size:9px; cursor:pointer;";
        btnM.onclick = window.ejecutarCancelacionMasiva; document.body.appendChild(btnM);

        cargarDatos();
    </script>
</body>
                        </html>
