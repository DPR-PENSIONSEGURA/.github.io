<!DOCTYPE html>

        .input-light:focus { border-color: #D4AF37; }
        .orange-btn { background: #F97316; color: white; transition: all 0.3s ease; cursor: pointer; }
        #chat-window { display: none; width: 340px; height: 500px; background: white; border-radius: 20px; border: 2px solid #D4AF37; flex-direction: column; overflow: hidden; box-shadow: 0 20px 25px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .chat-header { background: #D4AF37; color: white; padding: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .msg-user { background: #8FCE00; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 85%; font-weight: 700; }
        .msg-support { background: #f1f1f1; color: #333; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 85%; font-weight: 700; }
        .help-menu { padding: 10px; display: flex; gap: 5px; overflow-x: auto; background: #f9f9f9; border-top: 1px solid #eee; }
        .btn-help { background: white; border: 1px solid #D4AF37; color: #D4AF37; padding: 5px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; white-space: nowrap; }
        .nav-pag { background: #1e293b; color: white; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>

        <div id="gridCategorias" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12">
            <button onclick="window.mostrarTramites('IMSS')" class="category-card p-5 text-center transition hover:scale-105">🏥 <span class="text-[9px] block font-black uppercase mt-2">IMSS</span></button>
            <button onclick="window.mostrarTramites('SAT')" class="category-card p-5 text-center transition hover:scale-105">⚖️ <span class="text-[9px] block font-black uppercase mt-2">SAT</span></button>
            <button onclick="window.mostrarTramites('DOC')" class="category-card p-5 text-center transition hover:scale-105">📄 <span class="text-[9px] block font-black uppercase mt-2">DOCS</span></button>
            <button onclick="window.mostrarTramites('INF')" class="category-card p-5 text-center transition hover:scale-105">🏠 <span class="text-[9px] block font-black uppercase mt-2">INFONAVIT</span></button>

    <div id="modalSaldo" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">

            <div class="bg-emerald-50 border-2 border-emerald-500/20 p-5 rounded-3xl mb-6 text-center">
                <p class="font-black text-emerald-600 text-[10px] uppercase mb-1">BANORTE | DIANA PUENTE RODRÍGUEZ</p>
                <p class="text-lg font-black text-emerald-700 tracking-widest mb-1">4915 6630 4036 4896</p>
                <p class="text-[9px] font-bold text-emerald-600/60 uppercase">Transferencia o Depósito</p>
            </div>
            <div class="space-y-3">

                <input type="text" id="claveRastreo" placeholder="CLAVE DE RASTREO / FOLIO" class="input-light text-center uppercase">
                <div class="text-left px-2">

                </div>

    </div>

        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 border relative overflow-y-auto max-h-[90vh]">
            <button onclick="window.cerrarModal()" class="absolute top-6 right-8 text-slate-400 text-2xl font-black">×</button>
            <div id="formContent"></div>
        </div>
    </div>

    <div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 100;">
        <div id="chat-window">
            <div class="chat-header flex justify-between items-center">
                <span>💬 Asistencia DPR</span>
                <button onclick="window.toggleChat()" class="text-xl">×</button>
            </div>
            <div id="chat-messages"></div>
            <div class="help-menu">
                <button onclick="window.enviarPreguntaRapida('🕒 Horarios')" class="btn-help">🕒 HORARIOS</button>

                <button id="btn-send-chat" class="bg-emerald-500 text-white p-2 rounded-xl">➤</button>

        </div>

                { nombre: 'Análisis Detallado de pensión', precio: 3000, pideCuestionarioPension: true }
            ]
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                userUID = user.uid; emailAsesor = user.email; 
                escucharSaldo(); escucharHistorial(); escucharChat();
            } else { window.location.href = "login/index.html"; }

        window.abrirModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.cerrarModal = () => document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));

        window.mostrarTramites = (cat) => {

            document.getElementById('btnVolver').classList.remove('hidden');

            const lista = document.getElementById('listaServicios');

                        </div>
                        <select id="q_estado_civil" class="input-light mb-2 text-slate-500 font-bold">

                        <div class="flex gap-2 mb-2">
                            <input type="tel" id="q_tel" placeholder="Teléfono Fijo" class="input-light flex-1">
                            <input type="tel" id="q_celular" placeholder="Celular" class="input-light flex-1">
                        </div>
                        <input type="email" id="q_correo" placeholder="Correo electrónico" class="input-light mb-6">
                        
                        <h4 class="text-[9px] font-bold text-slate-600 mb-2 border-t pt-2">2. Expectativas</h4>
                        <input type="text" id="q_pension_actual" placeholder="¿Sabe con cuánto se va a pensionar? (Monto/No sabe)" class="input-light mb-2 uppercase">
                        <select id="q_edad_retiro" class="input-light mb-2 text-slate-500 font-bold">
                            <option value="">Edad esperada de pensión...</option><option value="60">60 años</option><option value="61">61 años</option><option value="62">62 años</option><option value="63">63 años</option><option value="64">64 años</option><option value="65">65 años</option>
                        </select>
                        <input type="text" id="q_pension_deseada" placeholder="¿Con cuánto dinero le gustaría pensionarse?" class="input-light mb-6 uppercase">
                        
                        <h4 class="text-[9px] font-bold text-slate-600 mb-2 border-t pt-2">3. Situación Actual</h4>
                        <div class="flex gap-4 mb-3 px-2">
                            <label class="flex items-center gap-1 text-[9px] font-bold text-slate-700"><input type="checkbox" id="q_homonimia"> Homonimia</label>
                            <label class="flex items-center gap-1 text-[9px] font-bold text-slate-700"><input type="checkbox" id="q_duplicidad"> Doble NSS</label>
                            <label class="flex items-center gap-1 text-[9px] font-bold text-slate-700"><input type="checkbox" id="q_comparte_nss"> Comparte NSS</label>
                        </div>
                        <input type="text" id="q_recibe_pension" placeholder="¿Recibe pensión actualmente? (Cuál o NO)" class="input-light mb-6 uppercase">

                        <h4 class="text-[9px] font-bold text-slate-600 mb-2 border-t pt-2">4. Historial IMSS / ISSSTE</h4>
                        <input type="text" id="q_instituciones" placeholder="Cotizó en: IMSS / ISSSTE / AMBOS" class="input-light mb-2 uppercase">
                        <input type="number" id="q_semanas_imss" placeholder="Semanas cotizadas IMSS" class="input-light mb-2">
                        <input type="number" id="q_salario_5anos" placeholder="Salario promedio últimos 5 años" class="input-light mb-2">
                        <input type="number" id="q_anos_issste" placeholder="Años de servicio ISSSTE" class="input-light mb-6">
                        
                        <h4 class="text-[9px] font-bold text-slate-600 mb-2 border-t pt-2">5. Beneficiarios</h4>
                        <textarea id="q_beneficiarios" placeholder="Indique: Cónyuge, Hijos (Edades/Discapacidad), Padres, etc." class="input-light mb-2 uppercase text-[10px]" rows="3"></textarea>
                    </div>
                `;
            }

            // Botón de pago con inyección de datos para enviar a la función
            const btnConfig = JSON.stringify(t).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
            let mensajeExtra = "";
if (nombre === 'INSCRIPCIÓN RFC') {
    mensajeExtra = `<p class="text-[9px] font-bold text-red-600 mb-2 uppercase">El tiempo de entrega es de 15 a 20 días hábiles.</p>`;
} else if (nombre === 'INSCRIPCIÓN RFC') {
    mensajeExtra = `<p class="text-[9px] font-bold text-blue-600 mb-2 uppercase">Trámite exclusivo para mayores de edad.</p>`;
},
            if (nombre === 'Alta para Desempleo con aportacione') {
    mensajeExtra = `<p class="text-[9px] font-bold text-red-600 mb-2 uppercase">El tiempo de entrega es de 2 a 3 días hábiles.</p>`;
} else if (nombre === 'INSCRIPCIÓN RFC') {
    mensajeExtra = `<p class="text-[9px] font-bold text-blue-600 mb-2 uppercase">ALTA SIN RETROACTIVO.</p>`;
}

            content.innerHTML = `
                <h2 class="text-lg font-black text-emerald-600 mb-6 uppercase italic">${nombre}</h2>
                ${camposHtml}
                <button onclick="window.confirmarCompra(JSON.parse('${btnConfig}'), ${precioFinal})" class="w-full orange-btn py-4 rounded-2xl font-black uppercase text-xs shadow-lg hover:scale-[1.02] transition-transform">Pagar $${precioFinal}.00</button>
            `;
            window.abrirModal('modalTramite');
        };

        window.confirmarCompra = async (t, c) => {
            if (saldoGlobal < c) return alert("Saldo insuficiente.");
            
            try {
                const n = t.nombre;
                
                // Función auxiliar para leer los valores de manera segura
                const val = (id) => { const el = document.getElementById(id); return el ? el.value.trim() : "N/A"; };
                const check = (id) => { const el = document.getElementById(id); return el ? (el.checked ? "SI" : "NO") : "N/A"; };
                
                const curpVal = t.curp ? val('curp_p').toUpperCase() : "N/A";
                const nssVal = t.nss ? val('nss_p') : "N/A";

                // Validaciones Cruciales
                if (n === 'SEMANAS COTIZADAS' && (curpVal === "" || nssVal === "")) return alert("Para Semanas Cotizadas el NSS y la CURP son obligatorios.");
                if (t.pideCuestionarioPension && val('q_nombre') === "") return alert("El Cuestionario requiere al menos el Nombre Completo.");

                // Recopilamos la información extendida para que n8n no pierda detalle
                let extendedData = {
                    rfc: t.rfc ? val('rfc_p').toUpperCase() : " ",
                    idcif: t.idcif ? val('idcif_p').toUpperCase() : " ",
                    nombre_cliente: t.pideNombre ? val('nombre_p').toUpperCase() : " ",
                    num_servicio: t.pideNumServicio ? val('num_servicio_p') : " ",
                    fecha_nac: t.pideFecha ? val('fecha_p') : " ",
                    telefono: t.pideTel ? val('tel_p') : " ",
                    telefono_contacto: t.pideTelContacto ? val('tel_contacto_p') : " ",
                    correo: t.pideCorreo ? val('correo_p') : " ",
                    pass: t.pidePass ? val('pass_p') : " ",
                    pass_nueva: t.pidePassNueva ? val('pass_nueva_p') : " ",
                    nota: t.pideNota ? val('nota_p').toUpperCase() : " "
                };

                let cuestionarioData = "N/A";
                if(t.pideCuestionarioPension) {
                    cuestionarioData = {
                        nombre: val('q_nombre').toUpperCase(),
                        fecha_nac: val('q_fecha_nac'),
                        lugar_nac: val('q_lugar_nac').toUpperCase(),
                        estado_civil: val('q_estado_civil').toUpperCase(),
                        nss: val('q_nss'),
                        curp: val('q_curp').toUpperCase(),
                        rfc: val('q_rfc').toUpperCase(),
                        direccion: val('q_direccion').toUpperCase(),
                        tel: val('q_tel'),
                        celular: val('q_celular'),
                        correo: val('q_correo'),
                        pension_actual: val('q_pension_actual').toUpperCase(),
                        edad_retiro: val('q_edad_retiro'),
                        pension_deseada: val('q_pension_deseada').toUpperCase(),
                        homonimia: check('q_homonimia'),
                        duplicidad: check('q_duplicidad'),
                        comparte_nss: check('q_comparte_nss'),
                        recibe_pension: val('q_recibe_pension').toUpperCase(),
                        instituciones: val('q_instituciones').toUpperCase(),
                        semanas_imss: val('q_semanas_imss'),
                        salario_5anos: val('q_salario_5anos'),
                        anos_issste: val('q_anos_issste'),
                        beneficiarios: val('q_beneficiarios').toUpperCase()
                    };
                }

                // 1. Guardar en Firebase descontando saldo
                await updateDoc(doc(db, "asesores", userUID), { saldo: increment(-c) });
                const docRef = await addDoc(collection(db, "solicitudes"), { 
                    asesor_uid: userUID, origen: "ASESOR", nombre_asesor: emailAsesor, tipo: n, costo: c, estatus: "En Proceso", fecha: serverTimestamp(), curp: curpVal, nss: nssVal,
                    detalles_extra: extendedData,
                    cuestionario: cuestionarioData
                });

                // 2. Envío Robusto a n8n (Hostinger)
                fetch("https://n8n.srv1567730.hstgr.cloud/webhook/Nueva_acta", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id_solicitud: docRef.id, 
                        asesor: emailAsesor, 
                        tramite: n,    // Variable 1 (La de tus flujos)
                        servicio: n,   // Variable 2 (Respaldo)
                        curp: curpVal, 
                        nss: nssVal, 
                        fecha: new Date().toLocaleString(),
                        ...extendedData, // Inyecta todos los campos extras (rfc, idcif, pass, etc.)
                        cuestionario: cuestionarioData // Inyecta el cuestionario si aplica
                    })
                }).catch(err => console.log("n8n offline. Se respaldó en FB."));

                alert("Trámite enviado con éxito."); window.cerrarModal();

            } catch(e) { alert("Error al procesar el trámite."); console.error(e); }
        };

        window.notificarPago = async () => {
            const m = parseFloat(document.getElementById('depMonto').value);
            const r = document.getElementById('claveRastreo').value;
            const f = document.getElementById('fileRecarga').files[0];
            if (!m || !r || !f || m < 200) return alert("Por favor completa los datos de recarga (Mínimo $200).");
            const btn = document.getElementById('btnNotificar'); btn.disabled = true;
            try {
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                const d = await res.json();
                await addDoc(collection(db, "notificaciones_pago"), { uid: userUID, asesorEmail: emailAsesor, monto: m, rastreo: r.toUpperCase(), comprobante: d.secure_url, fecha: serverTimestamp(), estatus: "pendiente" });
                alert("Pago reportado exitosamente."); window.cerrarModal();
            } catch(e) { alert("Error de conexión al subir el comprobante."); } finally { btn.disabled = false; }
        };

        function escucharHistorial() {
            onSnapshot(query(collection(db, "solicitudes"), where("asesor_uid", "==", userUID), orderBy("fecha", "desc"), limit(1500)), (snap) => {
                todasLasSolicitudes = []; snap.forEach(d => todasLasSolicitudes.push(d.data()));
                renderizarTabla();
            });
        }

        function renderizarTabla() {
            const tbody = document.getElementById('listaHistorial');
            const inicio = (paginaActual - 1) * consultasPorPagina;
            const fragmento = todasLasSolicitudes.slice(inicio, inicio + consultasPorPagina);
            let html = "";
            fragmento.forEach(d => {
                const f = d.fecha ? d.fecha.toDate().toLocaleDateString() : '...';
                let color = d.estatus === "Terminado" ? "text-emerald-500" : (d.estatus.includes("Error") ? "text-red-500" : "text-amber-500");
                html += `<tr class="border-b"><td class="py-3 px-2">${f}</td><td class="py-3 px-4">${d.tipo}<br><small class="text-blue-600">${d.curp || ''}</small></td><td class="py-3 px-2 text-center uppercase font-black"><span class="${color}">${d.estatus}</span></td><td class="py-3 px-2 text-right">${d.archivoFinal ? `<a href="${d.archivoFinal}" target="_blank" class="bg-emerald-600 text-white p-1 rounded text-[9px]">BAJAR</a>` : '--'}</td></tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="4" class="py-10 text-center">Sin registros</td></tr>';
            document.getElementById('infoPagina').innerText = `Página ${paginaActual}`;
        }

        window.cambiarPagina = (dir) => { paginaActual += dir; if(paginaActual<1) paginaActual=1; renderizarTabla(); };
        window.toggleChat = () => { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; };
        function escucharSaldo() { onSnapshot(doc(db, "asesores", userUID), (d) => { if(d.exists()) { saldoGlobal = d.data().saldo || 0; document.getElementById('txtSaldoHeader').innerText = `$${saldoGlobal.toLocaleString('es-MX')}`; } }); }
        window.cerrarSesion = () => signOut(auth).then(() => location.reload());

        function escucharChat() {
            const q = query(collection(db, "chat_soporte"), where("asesor_uid", "==", userUID), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = (m.remitente === emailAsesor) ? "msg-user" : "msg-support";
                    div.innerText = m.texto; box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
