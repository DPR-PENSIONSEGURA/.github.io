<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría | Panel Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-image: url('https://images.unsplash.com/photo-1533134486753-c833f074868f?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; color: #1E293B; scroll-behavior: smooth; }
        .header-glass { background: rgba(255, 255, 255, 0.9); border-bottom: 2px solid #D4AF37; backdrop-filter: blur(10px); }
        .green-gradient { background: linear-gradient(135deg, #8FCE00 0%, #10B981 100%); }
        .category-card { background: white; border: 1px solid #D4AF37; transition: all 0.3s ease; cursor: pointer; border-radius: 1.5rem; }
        .category-card:hover { border-color: #8FCE00; transform: translateY(-3px); }
        .input-light { background: #FFFFFF; border: 2px solid #E2E8F0; padding: 12px; border-radius: 15px; width: 100%; outline: none; font-weight: 600; font-size: 11px; }
        .input-light:focus { border-color: #D4AF37; }
        .orange-btn { background: #F97316; color: white; transition: all 0.3s ease; cursor: pointer; }
        
        /* CHAT WIDGET CON MENÚ DE AYUDA */
        #chat-window { display: none; width: 340px; height: 500px; background: white; border-radius: 20px; border: 2px solid #D4AF37; flex-direction: column; overflow: hidden; box-shadow: 0 20px 25px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .chat-header { background: #D4AF37; color: white; padding: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .msg-user { background: #8FCE00; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 85%; font-weight: 700; }
        .msg-support { background: #f1f1f1; color: #333; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 85%; font-weight: 700; }
        
        .help-menu { padding: 10px; display: flex; gap: 5px; overflow-x: auto; background: #f9f9f9; border-top: 1px solid #eee; }
        .btn-help { background: white; border: 1px solid #D4AF37; color: #D4AF37; padding: 5px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="avisoBaneo" class="fixed inset-0 bg-red-900/90 backdrop-blur-md hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl border-4 border-red-600">
            <h2 class="text-xl font-black text-red-600 mb-4 uppercase italic">Aviso de Seguridad</h2>
            <p class="text-[11px] font-bold text-slate-700 uppercase mb-6">Cuentas con recargas ficticias serán baneadas.</p>
            <button onclick="window.cerrarAvisoBaneo()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase italic">Aceptar</button>
        </div>
    </div>

    <header class="sticky top-0 z-40 header-glass">
        <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="green-gradient w-9 h-9 rounded-xl flex items-center justify-center font-black text-white shadow-lg text-lg italic">DP</div>
                <h1 class="font-black uppercase tracking-tighter text-lg text-slate-800">DPR <span class="text-emerald-600 italic">Consultoría</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="abrirModal('modalSaldo')" class="bg-white px-4 py-2 rounded-full border-2 border-emerald-500 flex items-center gap-2">
                    <span id="txtSaldoHeader" class="font-black text-emerald-600 text-xs">$0.00</span>
                </button>
                <button onclick="window.cerrarSesion()" class="text-[9px] font-black uppercase text-slate-400">Salir</button>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 id="tituloSeccion" class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 italic">Panel de Servicios</h2>
            <button id="btnVolver" onclick="window.resetearPanel()" class="hidden text-[9px] font-black uppercase bg-slate-800 text-white px-4 py-2 rounded-full hover:bg-orange-600">⬅️ Volver</button>
        </div>

        <div id="gridCategorias" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12">
            <button onclick="window.mostrarTramites('IMSS')" class="category-card p-5 text-center">🏥 <span class="text-[9px] block font-black uppercase mt-2">IMSS</span></button>
            <button onclick="window.mostrarTramites('SAT')" class="category-card p-5 text-center">⚖️ <span class="text-[9px] block font-black uppercase mt-2">SAT</span></button>
            <button onclick="window.mostrarTramites('DOC')" class="category-card p-5 text-center">📄 <span class="text-[9px] block font-black uppercase mt-2">DOCS</span></button>
            <button onclick="window.mostrarTramites('INF')" class="category-card p-5 text-center">🏠 <span class="text-[9px] block font-black uppercase mt-2">INFONAVIT</span></button>
            <button onclick="window.mostrarTramites('PENSIONES')" class="category-card p-5 text-center">📈 <span class="text-[9px] block font-black uppercase mt-2">PENSIONES</span></button>
            <button onclick="window.mostrarTramites('AFORE')" class="category-card p-5 text-center">💰 <span class="text-[9px] block font-black uppercase mt-2">AFORE</span></button>
        </div>

        <div id="listaServicios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12 hidden"></div>

        <section class="bg-white/90 rounded-[2.5rem] border border-slate-200 p-6 shadow-xl mt-12">
            <h2 class="text-lg font-black text-slate-800 uppercase italic mb-6">Historial de Solicitudes</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="text-[9px] font-black uppercase text-slate-400 border-b italic"><th class="pb-4 px-2">Fecha</th><th class="pb-4 px-4">Información</th><th class="pb-4 px-2 text-center">Estatus</th><th class="pb-4 px-2 text-right">Acción</th></tr></thead>
                    <tbody id="listaHistorial" class="text-xs font-bold italic">
                        <tr><td colspan="4" class="py-20 text-center opacity-30 font-black uppercase">Sincronizando...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 100;">
        <div id="chat-window">
            <div class="chat-header flex justify-between">
                <span>💬 Asistencia DPR</span>
                <button onclick="window.toggleChat()">×</button>
            </div>
            <div id="chat-messages"></div>
            <div class="help-menu">
                <button onclick="window.enviarPreguntaRapida('🕒 Horarios')" class="btn-help">🕒 HORARIOS</button>
                <button onclick="window.enviarPreguntaRapida('💰 Costos')" class="btn-help">💰 COSTOS</button>
                <button onclick="window.enviarPreguntaRapida('💳 Cuentas')" class="btn-help">💳 CUENTAS</button>
            </div>
            <div class="p-3 border-t bg-gray-50 flex gap-2">
                <input type="text" id="chat-input" placeholder="Escribe..." class="input-light flex-1">
                <button id="btn-send-chat" class="bg-emerald-500 text-white p-2 rounded-xl">➤</button>
            </div>
        </div>
        <button onclick="window.toggleChat()" class="green-gradient w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl animate-bounce">🎧</button>
    </div>

    <div id="modalTramite" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 border relative overflow-y-auto max-h-[90vh]">
            <button onclick="window.cerrarModal()" class="absolute top-6 right-8 text-slate-400 text-2xl">×</button>
            <div id="formContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, setDoc, collection, query, where, serverTimestamp, increment, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const CLOUD_NAME = "de5abnhul"; const UPLOAD_PRESET = "dpr_uploads";
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

        // RESTAURACIÓN TOTAL DE TRÁMITES Y VARIABLES
        const TRAMITES = {
            'IMSS': [
                { nombre: 'SEMANAS COTIZADAS', precio: 25, nss: true, curp: true },
                { nombre: 'SINDO ULTIMO RETIRO', precio: 45, nss: true },
                { nombre: 'SINDO ALFANUMÉRICO', precio: 55, nss: true, pideExtras: true },
                { nombre: 'SINDO VIGENCIA', precio: 95, nss: true },
                { nombre: 'SINDO COMPLETO', precio: 135, nss: true },
                { nombre: 'Tarjeta NSS', precio: 20, nss: true, curp: true },
                { nombre: 'Inscripción Modalidad 10', precio: 200, special: 'MOD10', nss: true, rfc: true, pideIneFrente: true, pideNombre: true },
                { nombre: 'Alta Mensual', precio: 600, nss: true, curp: true, pideNombre: true },
                { nombre: 'Alta para Desempleo con aportaciones', precio: 650, nss: true, curp: true, pideNombre: true },
                { nombre: 'Alta para Desempleo con linea de captura', precio: 170, nss: true, curp: true, pideNombre: true }
            ],
            'SAT': [
                { nombre: 'RFC Clon', precio: 27, curp: true },
                { nombre: 'RFC Verificable', precio: 110, curp: true },
                { nombre: 'RFC Original', precio: 180, curp: true },
                { nombre: 'Localización de IDcif', precio: 60, rfc: true },
                { nombre: 'RFC con IDcif', precio: 27, rfc: true, idcif: true }
            ],
            'DOC': [
                { nombre: 'Recibo CFE', precio: 10, pideCFE: true },
                { nombre: 'Buró de Crédito', precio: 170, curp: true, pideIneFrente: true },
                { nombre: 'CURP Certificada', precio: 4, curp: true },
                { nombre: 'Acta de Nacimiento', precio: 11, curp: true },
                { nombre: 'Acta de Matrimonio', precio: 11, curp: true },
                { nombre: 'Acta de Divorcio', precio: 11, curp: true },
                { nombre: 'Acta de Defunción', precio: 11, curp: true },
                { nombre: 'Vigencia de Derechos', precio: 24, curp: true, nss: true }
            ],
            'INF': [
                { nombre: 'Localización de Contraseña', precio: 150, nss: true, pideFecha: true },
                { nombre: 'Reseteo Cuenta', precio: 150, nss: true, pideFecha: true },
                { nombre: 'Precalificación Mejoravit', precio: 100, nss: true, pideFecha: true, eligePlazo: true },
                { nombre: 'Precalificación Linea II', precio: 100, nss: true, pideFecha: true },
                { nombre: 'Histórico Infonavit', precio: 150, nss: true, pideFecha: true }
            ],
            'AFORE': [
                { nombre: 'Registro a Distancia', precio: 250, special: 'REGISTRO', pidePass: true },
                { nombre: 'Retiro Desempleo a Distancia', precio: 60, special: 'RETIRO', pidePass: true },
                { nombre: 'Cambiar Contraseña AFORE Web', precio: 30, curp: true, pidePass: true, pideFotoCli: true },
                { nombre: 'Resumen de Afore', precio: 10, curp: true },
                { nombre: 'ECTA: Sura', precio: 750, nss: true, curp: true },
                { nombre: 'ECTA: Profuturo', precio: 500, nss: true, curp: true },
                { nombre: 'ECTA: Banorte', precio: 600, nss: true, curp: true },
                { nombre: 'ECTA: Azteca', precio: 350, nss: true, curp: true },
                { nombre: 'ECTA: Coppel', precio: 350, nss: true, curp: true }
            ],
            'PENSIONES': [
                { nombre: 'Análisis rápido de pensión', precio: 200, curp: true, nss: true }
            ]
        };

        let userUID = "", emailAsesor = "";
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                userUID = user.uid; emailAsesor = user.email; 
                marcarPresencia("online"); escucharSaldo(); escucharHistorial(); escucharChat();
            } else { window.location.href = "login/index.html"; }
        });

        // RESTAURACIÓN DE MODALES DINÁMICOS (CON TODAS LAS VARIABLES)
        // --- FUNCIONES DE CONTROL DE INTERFAZ (Faltantes) ---

window.abrirModal = (id) => { document.getElementById(id).classList.remove('hidden'); };
window.cerrarModal = () => { document.getElementById('modalTramite').classList.add('hidden'); };

window.resetearPanel = () => {
    document.getElementById('gridCategorias').classList.remove('hidden');
    document.getElementById('listaServicios').classList.add('hidden');
    document.getElementById('btnVolver').classList.add('hidden');
    document.getElementById('tituloSeccion').innerText = "Panel de Servicios";
};

window.cerrarAvisoBaneo = () => { document.getElementById('avisoBaneo').classList.add('hidden'); };

window.cerrarSesion = () => {
    signOut(auth).then(() => { window.location.href = "login/index.html"; });
};

// --- FUNCIONES DE BASE DE DATOS (Faltantes) ---

function escucharSaldo() {
    onSnapshot(doc(db, "asesores", userUID), (doc) => {
        if (doc.exists()) {
            const saldo = doc.data().saldo || 0;
            document.getElementById('txtSaldoHeader').innerText = `$${saldo.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
        }
    });
}

async function marcarPresencia(estado) {
    // Esta función es opcional, sirve para saber si el asesor está activo
    await setDoc(doc(db, "presencia", userUID), {
        email: emailAsesor,
        status: estado,
        ultima_vez: serverTimestamp()
    }, { merge: true });
}
        window.mostrarTramites = (cat) => {
            document.getElementById('gridCategorias').classList.add('hidden');
            document.getElementById('listaServicios').classList.remove('hidden');
            document.getElementById('btnVolver').classList.remove('hidden');
            document.getElementById('tituloSeccion').innerText = "Servicios: " + cat;
            const lista = document.getElementById('listaServicios');
            let html = '';
            TRAMITES[cat].forEach(t => {
                html += `<div onclick="window.prepararTramite('${t.nombre}', ${t.precio}, '${t.special || ''}', ${t.nss || false}, ${t.curp || false}, ${t.pideNombre || false}, ${t.pideFecha || false}, ${t.rfc || false}, ${t.idcif || false}, ${t.pideIneFrente || false}, ${t.pidePass || false}, ${t.pideFotoCli || false}, ${t.pideCFE || false}, ${t.eligePlazo || false}, ${t.pideExtras || false})" class="category-card p-5 text-center"><p class="font-black text-[9px] uppercase">${t.nombre}</p><p class="text-emerald-600 font-black text-[8px] mt-1">$${t.precio}.00</p></div>`;
            });
            lista.innerHTML = html;
        };

        window.prepararTramite = (nombre, costo, special, pideNss, pideCurp, pideNombre, pideFecha, pideRfc, pideIdcif, pideIneFrente, pidePass, pideFotoCli, pideCFE, eligePlazo, pideExtras) => {
            const content = document.getElementById('formContent');
            let fields = '';
            let precioFinal = costo;

            // Descuentos VIP
            const vip = ["prestamoefectivo.tramites@gmail.com", "kingmc019@gmail.com", "symconsultoria2.2024@gmail.com", "symconsultoria3.2024@gmail.com", "symconsultoria2024@gmail.com", "ompesa86@gmail.com", "symconsultoria4.2024@gmail.com", "cris19330@outlook.com","draperrapmorelia@gmail.com", "gestoriayserviciosgonzalez@gmail.com", "inburpriego@gmail.com"];
            if (vip.includes(emailAsesor) && nombre === 'SEMANAS COTIZADAS') precioFinal = 19;
            const ultra = ["fgarcia.g195@gmail.com", "consultoriadpr@gmail.com"];
            if (ultra.includes(emailAsesor) && nombre === 'SEMANAS COTIZADAS') precioFinal = 18;

            if(pideNombre) fields += `<input type="text" id="nombre_cliente" placeholder="NOMBRE COMPLETO" class="input-light mb-4 uppercase">`;
            if(pideCurp || special === 'RETIRO' || special === 'REGISTRO' || special === 'MOD10') fields += `<input type="text" id="curp_p" placeholder="CURP" class="input-light mb-4 uppercase tracking-widest">`;
            if(pideNss) fields += `<input type="text" id="nss_p" placeholder="NSS" class="input-light mb-4">`;
            if(pideExtras) fields += `<textarea id="notas_p" placeholder="DATO EXTRAS" class="input-light mb-4 uppercase" rows="2"></textarea>`;
            if(pidePass) fields += `<input type="text" id="pass_afore" placeholder="CONTRASEÑA AFORE" class="input-light mb-4">`;
            if(pideCFE) fields += `<input type="number" id="num_servicio" placeholder="NÚMERO DE SERVICIO" class="input-light mb-4">`;
            if(pideRfc) fields += `<input type="text" id="rfc_p" placeholder="RFC" class="input-light mb-4 uppercase">`;
            if(pideIdcif) fields += `<input type="text" id="idcif_p" placeholder="IDCIF" class="input-light mb-4 uppercase">`;
            if(pideFecha) fields += `<label class="text-[8px] ml-2 text-slate-400">Fecha Nac:</label><input type="date" id="fecha_p" class="input-light mb-4">`;

            if(pideIneFrente || pideFotoCli || special === 'RETIRO' || special === 'REGISTRO') {
                fields += `<div class="text-left mb-4"><label class="text-[8px] text-slate-400 uppercase">Foto/INE:</label><input type="file" id="file_ine_f" class="w-full text-[10px]"></div>`;
            }

            content.innerHTML = `<h2 class="text-lg font-black text-emerald-600 mb-6 uppercase italic">${nombre}</h2>${fields}<button onclick="window.confirmarCompra('${nombre}', ${precioFinal}, '${special}')" class="w-full orange-btn py-4 rounded-2xl font-black uppercase text-xs">Pagar $${precioFinal}.00</button>`;
            window.abrirModal('modalTramite');
        };

        const subirArchivo = async (id) => {
            const el = document.getElementById(id);
            if (el && el.files[0]) {
                const fd = new FormData(); fd.append('file', el.files[0]); fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                const d = await res.json(); return d.secure_url;
            } return null;
        };

        window.confirmarCompra = async (n, c, special) => {
            const btn = document.querySelector("#modalTramite button:last-child");
            btn.disabled = true; btn.innerText = "PROCESANDO...";
            
            try {
                const infoExtra = {};
                if(document.getElementById('nombre_cliente')) infoExtra.cliente_nombre = document.getElementById('nombre_cliente').value.toUpperCase();
                if(document.getElementById('curp_p')) infoExtra.curp = document.getElementById('curp_p').value.toUpperCase();
                if(document.getElementById('nss_p')) infoExtra.nss = document.getElementById('nss_p').value;
                if(document.getElementById('rfc_p')) infoExtra.rfc = document.getElementById('rfc_p').value.toUpperCase();
                if(document.getElementById('fecha_p')) infoExtra.fecha_nacimiento = document.getElementById('fecha_p').value;
                if(document.getElementById('file_ine_f')) infoExtra.file_ine_f = await subirArchivo('file_ine_f');

                await updateDoc(doc(db, "asesores", userUID), { saldo: increment(-c) });
                await addDoc(collection(db, "solicitudes"), { 
                    asesor_uid: userUID, origen: "ASESOR", nombre_asesor: emailAsesor, tipo: n, costo: c, estatus: "En Proceso", fecha: serverTimestamp(), ...infoExtra 
                });
                
                // Envío a n8n
                fetch("https://n8n.srv1567730.hstgr.cloud/webhook/Nueva_acta", { method: "POST", mode: 'no-cors', body: JSON.stringify({ asesor: emailAsesor, tramite: n, ...infoExtra }) });

                alert("Trámite enviado."); window.cerrarModal();
            } catch(e) { alert("Error."); btn.disabled = false; }
        };

        // LÓGICA DE BOT Y CHAT
        window.enviarPreguntaRapida = (opcion) => {
            let r = "";
            if(opcion === 'QUIERO ASESORIA PERSONALIZADA PARA UNA PENSIÓN') r = "En DPR somos especialistas en temas financieros y de pensión, el costo de el análisis detallado es de $3,000, adjunta aqui el nss, curp, teléfono de contacto, y si tiene alguna duda en específico que quiera resolver, un asesor se comunicará en breve con usted";
            if(opcion === '💰 Tengo un problema con mi cobro') r = "Adjunta los datos de la solicitud que tiene error, un asesor se comunicará en breve.";
            if(opcion === 'Quiero asesoria para un PPR') r = " Con gusto!, el costo de la asesoría con proyección financiera es de $1000, los datos que necesitamos son: nss, curp, nombre completo, recursos en el afore al dia de hoy, capacidad de inversión mensual, percepción monrtaria mensual, dudas especificas a resolver en la asesoría, un asesor se comunicará en breve";
            responderComoBot(opcion, r);
        };

        async function responderComoBot(preg, resp) {
            const exp = new Date(); exp.setDate(exp.getDate() + 15);
            await addDoc(collection(db, "chat_soporte"), { texto: preg, remitente: emailAsesor, asesor_uid: userUID, timestamp: serverTimestamp(), expiraEn: exp });
            setTimeout(async () => {
                await addDoc(collection(db, "chat_soporte"), { texto: resp, remitente: "Asistente DPR", asesor_uid: userUID, timestamp: serverTimestamp(), expiraEn: exp });
            }, 1000);
        }

        window.toggleChat = () => { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; };
        document.getElementById('btn-send-chat').onclick = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const exp = new Date(); exp.setDate(exp.getDate() + 15);
            await addDoc(collection(db, "chat_soporte"), { texto: input.value, remitente: emailAsesor, asesor_uid: userUID, timestamp: serverTimestamp(), expiraEn: exp });
            if (!localStorage.getItem('bot_saludado')) {
                setTimeout(() => responderComoBot("Bot", "¡Hola! Un asistente se conectará pronto. ¿En qué ayudamos?"), 1000);
                localStorage.setItem('bot_saludado', 'true');
            }
            input.value = "";
        };

        function escucharChat() {
            const q = query(collection(db, "chat_soporte"), where("asesor_uid", "==", userUID), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = (m.remitente === emailAsesor) ? "msg-user" : "msg-support";
                    div.innerText = m.texto; box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
// --- FUNCIÓN PARA ESCUCHAR EL HISTORIAL Y RENDERIZAR EL BOTÓN ---
const escucharHistorial = () => {
    const q = query(
        collection(db, "solicitudes"), 
        where("asesor_uid", "==", userUID),
        orderBy("fecha", "desc"),
        limit(20)
    );

    onSnapshot(q, (snapshot) => {
        const tbody = document.getElementById('listaHistorial');
        let html = '';

        if (snapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center opacity-30 font-black uppercase">Sin solicitudes aún</td></tr>';
            return;
        }

        snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;
    const fecha = data.fecha ? new Date(data.fecha.seconds * 1000).toLocaleDateString() : '...';
    
    // Lógica de colores para el estatus
    let colorStatus = "text-amber-500";
    if(data.estatus === "Terminado") colorStatus = "text-emerald-500";
    // Corregimos para que también detecte tus mensajes de Error/Reembolso en rojo
    if(data.estatus.includes("Error") || data.estatus.includes("REEMBOLSO")) colorStatus = "text-red-500";

    html += `
        <tr class="border-b border-slate-100">
            <td class="py-4 px-2 text-[10px] text-slate-400">${fecha}</td>
            <td class="py-4 px-4">
                <div class="text-[10px] text-slate-800 uppercase font-black">${data.tipo}</div>
                <div class="text-[9px] text-slate-400 font-normal uppercase">${data.curp || data.nss || 'S/N'}</div>
            </td>
            <td class="py-4 px-2 text-center">
                <span class="${colorStatus} text-[9px] uppercase font-black">${data.estatus}</span>
            </td>
            <td class="py-4 px-2 text-right">
                ${data.estatus === "Terminado" && data.archivoFinal // <--- CAMBIO AQUÍ
                    ? `<a href="${data.archivoFinal}" target="_blank" class="bg-emerald-100 text-emerald-600 p-2 rounded-lg inline-flex items-center gap-1 hover:bg-emerald-600 hover:text-white transition-all shadow-sm">
                         <span class="text-[9px] font-black uppercase">Descargar</span>
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                         </svg>
                       </a>`
                    : `<span class="opacity-20 grayscale cursor-not-allowed">⌛</span>`
                }
            </td>
        </tr>
    `;
});
