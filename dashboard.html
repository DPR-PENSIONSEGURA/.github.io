<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría | Panel Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #E2E8F0; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #F1D299 50%, #B88A44 100%); }
        .category-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; cursor: pointer; }
        .category-card:hover { border-color: #C5A059; background: rgbargba(237, 232, 208, 1); }
        .input-dark { background: #1E293B; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .gold-text { color: #C5A059; }
        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-flex; animation: marquee 25s linear infinite; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-40 bg-slate-900/90 border-b border-slate-800 backdrop-blur-md">
        <div class="max-w-7xl mx-auto p-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="gold-gradient w-10 h-10 rounded-xl flex items-center justify-center font-black text-slate-900">DP</div>
                <h1 class="font-black uppercase tracking-tighter text-xl text-white">DPR <span class="gold-text italic">Consultoría</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="abrirModal('modalSaldo')" class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700 flex items-center gap-2">
                    <span id="txtSaldoHeader" class="font-black text-white">...</span>
                </button>
                <a href="finanzas.html" class="text-[9px] font-black uppercase text-blue-400 border border-blue-400/30 px-3 py-1.5 rounded-full hover:bg-blue-400 hover:text-white transition">
    📈 Mis Finanzas
</a>
                <button onclick="window.cerrarSesion()" class="text-[10px] font-black uppercase text-red-500">Salir</button>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <h2 class="text-sm font-black uppercase tracking-[0.3em] text-slate-500 mb-6">Servicios</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12">
            <button onclick="mostrarTramites('IMSS')" class="category-card p-4 rounded-2xl text-center">🏥 <span class="text-[10px] block font-black uppercase">IMSS</span></button>
            <button onclick="mostrarTramites('SAT')" class="category-card p-4 rounded-2xl text-center">⚖️ <span class="text-[10px] block font-black uppercase">SAT</span></button>
            <button onclick="mostrarTramites('DOC')" class="category-card p-4 rounded-2xl text-center">📄 <span class="text-[10px] block font-black uppercase">DOCUMENTOS</span></button>
            <button onclick="mostrarTramites('INF')" class="category-card p-4 rounded-2xl text-center">🏠 <span class="text-[10px] block font-black uppercase">INFONAVIT</span></button>
            <button onclick="window.mostrarSeccionAfore()" class="category-card p-4 rounded-2xl text-center border-blue-500/40">💰 <span class="text-[10px] block font-black uppercase text-blue-400 font-bold">AFORE</span></button>
        </div>

        <div id="seccionAfore" class="hidden bg-slate-800/40 p-8 rounded-[2.5rem] border border-blue-500/20 mb-12 animate-fade">
            <h2 class="text-xl font-black uppercase mb-6 italic border-l-4 border-blue-600 pl-4 gold-text">Estado de Cuenta Afore</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <select id="selectAfore" onchange="window.actualizarPrecioAfore()" class="input-dark">
                    <option value="">-- Seleccionar Afore --</option>
                    <option value="Sura">Sura ($750)</option>
                    <option value="Coppel">Coppel ($350)</option>
                </select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nssAfore" maxlength="11" placeholder="NSS" class="input-dark">
                    <input type="text" id="curpAfore" placeholder="CURP" class="input-dark uppercase">
                </div>
            </div>
            <div class="mt-8 flex justify-between items-center">
                <p id="txtPrecioAfore" class="text-3xl font-black gold-text">$0.00</p>
                <button onclick="window.pagarEstadoCuenta()" class="bg-white text-slate-900 px-10 py-4 rounded-2xl font-black uppercase italic">Pagar</button>
            </div>
        </div>

        <div id="listaServicios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12 hidden animate-fade"></div>

        <section class="bg-slate-900/50 rounded-[2.5rem] border border-slate-800 p-6 shadow-2xl">
            <h2 class="text-xl font-black text-white uppercase italic mb-6">Mis Solicitudes</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] font-black uppercase text-slate-500 border-b border-slate-800">
                            <th class="pb-4">Fecha</th><th class="pb-4">Servicio</th><th class="pb-4 text-center">Estatus</th><th class="pb-4 text-right">Resultado</th>
                        </tr>
                    </thead>
                    <tbody id="listaHistorial" class="text-xs font-medium"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalTramite" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-lg rounded-[3rem] p-8 border border-slate-800 shadow-2xl overflow-y-auto max-h-[90vh] relative">
            <button onclick="cerrarModal()" class="absolute top-6 right-8 text-slate-500 text-2xl">×</button>
            <div id="formContent"></div>
        </div>
    </div>

    <div id="modalSaldo" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-[3rem] p-10 relative border border-slate-800 text-center">
            <button onclick="cerrarModal()" class="absolute top-6 right-8 text-slate-500 text-2xl">×</button>
            <h2 class="text-xl font-black text-white uppercase mb-6">Recargar Saldo</h2>
            <div class="bg-blue-600/10 border-2 border-blue-500/30 p-6 rounded-[2rem] mb-8">
                <p class="text-xl font-black text-white">4915 6630 4036 4896</p>
                <p class="text-[10px] uppercase opacity-70">Banorte | Diana Puente</p>
            </div>
            <div class="space-y-3">
                <input type="number" id="depMonto" placeholder="Monto" class="input-dark text-center font-black">
                <input type="file" id="fileRecarga" class="block w-full text-[10px]">
                <button onclick="notificarPago()" id="btnNotificar" class="w-full gold-gradient py-4 rounded-2xl font-black uppercase text-slate-900 mt-4 shadow-lg">Informar Pago</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, collection, query, where, serverTimestamp, increment, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM",
            authDomain: "pensionsegura-9c817.firebaseapp.com",
            projectId: "pensionsegura-9c817"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const CLOUD_NAME = "de5abnhul"; 
        const UPLOAD_PRESET = "dpr_uploads";
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

        let saldoGlobal = 0, userUID = "", emailAsesor = "";
        const PRECIOS_AFORE = { "Sura": 750, "Coppel": 350 };

        const TRAMITES = {
            'IMSS': [
                { id: 'SC', nombre: 'Semanas Cotizadas', precio: 25, nss: true, curp: true },
                { id: 'TARJETA NSS', nombre: 'TARJETA NSS', precio: 15, nss: true },
                { id: 'M10', nombre: 'Inscripción a Modalidad 10', precio: 200, nss: true, curp: true },
               ,
                
            ],
            'SAT': [
                    { id: 'RFC CLON', nombre: 'RFC Clon', precio: 35, curp: true },
                   { id: 'RFC VERIFICABLE ', nombre: 'RFC VERIFICABLE', precio: 140, curp: true },
                    { id: 'RFC', nombre: 'RFC ORIGINAL', precio: 230, curp: true },
         { id: 'RFC IDCIF', nombre: 'RFC CON IDCIF', precio: 40, rfc: true, idcif: true },
                   ],
            'DOC': [
                    { id: 'CURP', nombre: 'CURP Certificada', precio: 4, curp: true },
                   { id: 'ACTA DE NACIMIENTO', nombre: 'ACTA DE NACIMIENTO', precio: 15, nss: true },
                    { id: 'ACTA DE MATRIMONIO', nombre: 'ACTA DE MATRIMONIO', precio: 15, nss: true },
                { id: 'ACTA DE DIVORCIO', nombre: 'ACTA DE DEFUNCIÓN', precio: 15, nss: true },
                    
                   ],
            'INF': [{ id: 'RESET', nombre: 'RESETEO DE CUENTA INFONAVIT', precio: 150, nss: true },
                    {id: 'HIST', nombre: 'HISTÓRICO INFONAVIT', precio: 150, nss: true },
          {id: 'PRECAM', nombre: 'PRECALIFICACIÓN MEJORAVIT', precio: 120, nss: true },
                     {id: 'PRECAl', nombre: 'PRECALIFICACIÓN LINEA II', precio: 120, nss: true },
                    
                   ]

              'AFORE': [
            { id: 'RETIRO', nombre: 'RETIRO DESEMPLEO', precio: 60, special: 'RETIRO' },
                { id: 'REGISTRO', nombre: 'REGISTRO DISTANCIA', precio: 80, special: 'REGISTRO' },
             { id: 'RESUMEN', nombre: 'RESUMEN DE AFORE', precio: 10, curp: true },
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { userUID = user.uid; emailAsesor = user.email; escucharSaldo(); escucharHistorial(); }
            else { window.location.href = "login/index.html"; }
        });

        function escucharSaldo() {
            onSnapshot(doc(db, "asesores", userUID), (d) => {
                if (d.exists()) {
                    saldoGlobal = d.data().saldo || 0;
                    document.getElementById('txtSaldoHeader').innerText = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(saldoGlobal);
                }
            });
        }

        window.mostrarSeccionAfore = () => {
            document.getElementById('seccionAfore').classList.toggle('hidden');
            document.getElementById('listaServicios').classList.add('hidden');
        };

        window.actualizarPrecioAfore = () => {
            const afore = document.getElementById('selectAfore').value;
            document.getElementById('txtPrecioAfore').innerText = `$${PRECIOS_AFORE[afore] || 0}.00`;
        };

        window.pagarEstadoCuenta = async () => {
            const afore = document.getElementById('selectAfore').value;
            const nss = document.getElementById('nssAfore').value;
            const curp = document.getElementById('curpAfore').value;
            if (!afore || nss.length < 11 || curp.length < 10) return alert("Datos incompletos.");
            const costo = PRECIOS_AFORE[afore];
            if (saldoGlobal < costo) return alert("Saldo insuficiente.");
            
            await updateDoc(doc(db, "asesores", userUID), { saldo: increment(-costo) });
            await addDoc(collection(db, "solicitudes"), {
                asesor_uid: userUID, origen: "ASESOR", nombre: emailAsesor,
                tipo: `ECTA: ${afore}`, curp: curp.toUpperCase(), nss, costo, estatus: "En Proceso", fecha: serverTimestamp()
            });
            alert("Enviado.");
            document.getElementById('seccionAfore').classList.add('hidden');
        };

        window.mostrarTramites = (cat) => {
            document.getElementById('seccionAfore').classList.add('hidden');
            const listado = document.getElementById('listaServicios');
            listado.classList.remove('hidden');
            let html = '';
            TRAMITES[cat].forEach(t => {
                html += `<div onclick="window.prepararTramite('${t.nombre}', ${t.precio}, '${t.nss || false}', '${t.curp || false}', '${t.special || ''}')" class="category-card p-5 rounded-2xl border border-slate-700">
                    <p class="font-black text-xs uppercase text-white">${t.nombre}</p>
                    <p class="gold-text font-black text-[9px] mt-1">$${t.precio}.00</p>
                </div>`;
            });
            listado.innerHTML = html;
        };

        window.prepararTramite = (nombre, costo, pideNss, pideCurp, special) => {
            const content = document.getElementById('formContent');
            let fields = `<input type="text" id="curp_p" placeholder="CURP" class="input-dark uppercase font-bold mb-4 w-full">`;
            
            if (special === 'RETIRO' || special === 'REGISTRO') {
                fields += `
                <input type="text" id="nss_p" placeholder="NSS (11 DÍGITOS)" class="input-dark mb-4 w-full">
                <label class="text-[9px] uppercase ml-2 text-slate-500">INE Frente</label><input type="file" id="file_ine_f" class="block w-full mb-3 text-[10px]">
                <label class="text-[9px] uppercase ml-2 text-slate-500">INE Reverso</label><input type="file" id="file_ine_r" class="block w-full mb-3 text-[10px]">
                <label class="text-[9px] uppercase ml-2 text-slate-500">Foto Cliente</label><input type="file" id="file_selfie" class="block w-full mb-3 text-[10px]">
                ${special === 'RETIRO' ? '<label class="text-[9px] uppercase ml-2 text-slate-500">Edo. Cuenta</label><input type="file" id="file_edocta" class="block w-full text-[10px]">' : '<textarea id="extra_p" placeholder="Nota..." class="input-dark mb-4 h-20 text-xs"></textarea>'}`;
            } else if (pideNss) {
                fields += `<input type="text" id="nss_p" placeholder="NSS" class="input-dark mb-4 w-full">`;
            }

            content.innerHTML = `<h2 class="text-xl font-black gold-text mb-6 uppercase">${nombre}</h2>${fields}
                <button onclick="window.confirmarCompra('${nombre}', ${costo}, '${special}')" class="w-full gold-gradient py-4 rounded-2xl text-slate-900 font-black uppercase">Pagar $${costo}</button>`;
            abrirModal('modalTramite');
        };

        window.confirmarCompra = async (n, c, special) => {
            if (saldoGlobal < c) return alert("Saldo insuficiente.");
            const curpVal = document.getElementById('curp_p')?.value || "";
            if(!curpVal) return alert("CURP requerida.");

            const btn = document.querySelector("#modalTramite button:last-child");
            const oldT = btn.innerText; btn.disabled = true;

            try {
                let docs = {};
                if (special === 'RETIRO' || special === 'REGISTRO') {
                    const flds = [
                        { k: 'file_ine_f', f: document.getElementById('file_ine_f').files[0], l: 'INE F' },
                        { k: 'file_ine_r', f: document.getElementById('file_ine_r').files[0], l: 'INE R' },
                        { k: 'file_selfie', f: document.getElementById('file_selfie').files[0], l: 'FOTO' },
                        { k: 'file_edocta', f: document.getElementById('file_edocta')?.files[0], l: 'EDO' }
                    ];
                    for (let item of flds) {
                        if (item.f) {
                            btn.innerText = `SUBIENDO: ${item.l}...`;
                            const fd = new FormData(); fd.append('file', item.f); fd.append('upload_preset', UPLOAD_PRESET);
                            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                            const data = await res.json();
                            docs[item.k] = data.secure_url;
                        }
                    }
                }

                await updateDoc(doc(db, "asesores", userUID), { saldo: increment(-c) });
                await addDoc(collection(db, "solicitudes"), {
                    asesor_uid: userUID, origen: "ASESOR", nombre: emailAsesor,
                    tipo: n, costo: c, curp: curpVal.toUpperCase(),
                    nss: document.getElementById('nss_p')?.value || "N/A",
                    extra: document.getElementById('extra_p')?.value || "",
                    ...docs, estatus: "En Proceso", fecha: serverTimestamp()
                });
                alert("Enviado."); cerrarModal();
            } catch(e) { alert("Error."); }
            finally { btn.disabled = false; btn.innerText = oldT; }
        };

        function escucharHistorial() {
            const q = query(collection(db, "solicitudes"), where("asesor_uid", "==", userUID), orderBy("fecha", "desc"), limit(25));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('listaHistorial');
                lista.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    let color = d.estatus === 'Terminado' ? "text-green-500" : (d.estatus.includes('ERROR') ? "text-red-500" : "text-yellow-500");
                    let misArchivos = "";
                    if(d.file_ine_f) misArchivos += `<button onclick="window.open('${d.file_ine_f}')" class="bg-white/10 px-2 py-0.5 rounded mr-1 text-[8px]">DOCS 📥</button>`;
                    
                    lista.innerHTML += `<tr class="border-b border-slate-800 animate-fade">
                        <td class="py-4 text-slate-500 font-bold">${d.fecha?.toDate().toLocaleDateString() || 'Hoy'}</td>
                        <td class="py-4"><div class="font-black uppercase tracking-tighter text-white">${d.tipo}</div><div class="text-[9px] text-blue-400 font-bold tracking-widest mt-1">CURP: ${d.curp || 'N/A'}</div><div class="mt-2">${misArchivos}</div></td>
                        <td class="py-4 text-center font-black uppercase text-[10px] ${color}">${d.estatus}</td>
                        <td class="py-4 text-right">${d.archivoFinal ? `<a href="${d.archivoFinal}" target="_blank" class="gold-text font-black underline italic">VER</a>` : '--'}</td>
                    </tr>`;
                });
            }, (error) => {
                // Aquí cae el error si falta el índice.
                console.error("Error historial:", error);
            });
        }

        window.notificarPago = async () => {
            const m = parseFloat(document.getElementById('depMonto').value);
            const f = document.getElementById('fileRecarga').files[0];
            if (!m || !f) return alert("Faltan datos.");
            const btn = document.getElementById('btnNotificar'); btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
            const data = await res.json();
            await addDoc(collection(db, "notificaciones_pago"), { uid: userUID, asesorEmail: emailAsesor, monto: m, comprobante: data.secure_url, fecha: serverTimestamp(), estatus: "pendiente" });
            alert("Reportado."); cerrarModal(); btn.innerText = "Informar Pago"; btn.disabled = false;
        };

        window.abrirModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.cerrarModal = () => { document.getElementById('modalTramite').classList.add('hidden'); document.getElementById('modalSaldo').classList.add('hidden'); };
        window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "login/index.html");
    </script>
</body>
</html>
