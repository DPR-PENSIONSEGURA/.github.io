<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría | Panel Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-image: url('https://images.unsplash.com/photo-1533134486753-c833f074868f?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; color: #1E293B; scroll-behavior: smooth; }
        .header-glass { background: rgba(255, 255, 255, 0.9); border-bottom: 2px solid #D4AF37; backdrop-filter: blur(10px); }
        .green-gradient { background: linear-gradient(135deg, #8FCE00 0%, #10B981 100%); }
        .category-card { background: white; border: 1px solid #D4AF37; transition: all 0.3s ease; cursor: pointer; border-radius: 1.5rem; }
        .category-card:hover { border-color: #8FCE00; transform: translateY(-3px); }
        .input-light { background: #FFFFFF; border: 2px solid #E2E8F0; padding: 12px; border-radius: 15px; width: 100%; outline: none; font-weight: 600; font-size: 11px; }
        .input-light:focus { border-color: #D4AF37; }
        .orange-btn { background: #F97316; color: white; transition: all 0.3s ease; cursor: pointer; }
        
        #chat-window { display: none; width: 340px; height: 500px; background: white; border-radius: 20px; border: 2px solid #D4AF37; flex-direction: column; overflow: hidden; box-shadow: 0 20px 25px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .chat-header { background: #D4AF37; color: white; padding: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .msg-user { background: #8FCE00; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 85%; font-weight: 700; }
        .msg-support { background: #f1f1f1; color: #333; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 85%; font-weight: 700; }
        .help-menu { padding: 10px; display: flex; gap: 5px; overflow-x: auto; background: #f9f9f9; border-top: 1px solid #eee; }
        .btn-help { background: white; border: 1px solid #D4AF37; color: #D4AF37; padding: 5px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; white-space: nowrap; }
        .nav-pag { background: #1e293b; color: white; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-40 header-glass">
        <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="green-gradient w-9 h-9 rounded-xl flex items-center justify-center font-black text-white shadow-lg text-lg italic">DP</div>
                <h1 class="font-black uppercase tracking-tighter text-lg text-slate-800">DPR <span class="text-emerald-600 italic">Consultoría</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="window.abrirModal('modalSaldo')" class="bg-white px-4 py-2 rounded-full border-2 border-emerald-500 flex items-center gap-2">
                    <span id="txtSaldoHeader" class="font-black text-emerald-600 text-xs">$0.00</span>
                </button>
                <button onclick="window.cerrarSesion()" class="text-[9px] font-black uppercase text-slate-400">Salir</button>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 id="tituloSeccion" class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 italic">Panel de Servicios</h2>
            <button id="btnVolver" onclick="window.resetearPanel()" class="hidden text-[9px] font-black uppercase bg-slate-800 text-white px-4 py-2 rounded-full">⬅️ Volver</button>
        </div>

        <div id="gridCategorias" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12">
            <button onclick="window.mostrarTramites('IMSS')" class="category-card p-5 text-center">🏥 <span class="text-[9px] block font-black uppercase mt-2">IMSS</span></button>
            <button onclick="window.mostrarTramites('SAT')" class="category-card p-5 text-center">⚖️ <span class="text-[9px] block font-black uppercase mt-2">SAT</span></button>
            <button onclick="window.mostrarTramites('DOC')" class="category-card p-5 text-center">📄 <span class="text-[9px] block font-black uppercase mt-2">DOCS</span></button>
            <button onclick="window.mostrarTramites('INF')" class="category-card p-5 text-center">🏠 <span class="text-[9px] block font-black uppercase mt-2">INFONAVIT</span></button>
            <button onclick="window.mostrarTramites('PENSIONES')" class="category-card p-5 text-center">📈 <span class="text-[9px] block font-black uppercase mt-2">PENSIONES</span></button>
            <button onclick="window.mostrarTramites('AFORE')" class="category-card p-5 text-center">💰 <span class="text-[9px] block font-black uppercase mt-2">AFORE</span></button>
        </div>

        <div id="listaServicios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12 hidden"></div>

        <section class="bg-white/90 rounded-[2.5rem] p-6 shadow-xl border border-slate-200 mt-12">
            <h2 class="text-lg font-black text-slate-800 uppercase italic mb-6">Historial de Solicitudes</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="text-[9px] font-black uppercase text-slate-400 border-b italic"><th class="pb-4 px-2">Fecha</th><th class="pb-4 px-4">Información</th><th class="pb-4 px-2 text-center">Estatus</th><th class="pb-4 px-2 text-right">Acción</th></tr></thead>
                    <tbody id="listaHistorial" class="text-xs font-bold italic">
                        <tr><td colspan="4" class="py-10 text-center opacity-30 font-black uppercase">Sincronizando historial...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-6 flex justify-center items-center gap-4 border-t pt-4">
                <button onclick="window.cambiarPagina(-1)" class="nav-pag">Anterior</button>
                <span id="infoPagina" class="text-[10px] font-black text-slate-400 uppercase">Página 1</span>
                <button onclick="window.cambiarPagina(1)" class="nav-pag">Siguiente</button>
            </div>
        </section>
    </main>

    <div id="modalSaldo" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 relative text-center border shadow-2xl">
            <button onclick="window.cerrarModal()" class="absolute top-6 right-8 text-slate-400 text-2xl">×</button>
            <h2 class="text-lg font-black text-slate-800 uppercase mb-4 italic">Recargar Saldo</h2>
            <div class="bg-emerald-50 border-2 border-emerald-500/20 p-4 rounded-2xl mb-4 text-center">
                <p class="font-black text-emerald-600 text-[9px] uppercase">BANORTE | DIANA PUENTE RODRÍGUEZ</p>
                <p class="text-base font-black text-emerald-700 tracking-widest">4915 6630 4036 4896</p>
            </div>
            <input type="number" id="depMonto" placeholder="MONTO MÍN $200" class="input-light text-center mb-3">
            <input type="text" id="claveRastreo" placeholder="CLAVE DE RASTREO" class="input-light text-center mb-3 uppercase">
            <input type="file" id="fileRecarga" class="block w-full text-[9px] mb-4">
            <button onclick="window.notificarPago()" id="btnNotificar" class="w-full bg-[#F97316] py-4 rounded-2xl font-black text-white uppercase shadow-lg text-xs">Informar Pago</button>
        </div>
    </div>

    <div id="modalTramite" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 border relative overflow-y-auto max-h-[90vh]">
            <button onclick="window.cerrarModal()" class="absolute top-6 right-8 text-slate-400 text-2xl font-black">×</button>
            <div id="formContent"></div>
        </div>
    </div>

    <div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 100;">
        <div id="chat-window">
            <div class="chat-header flex justify-between items-center">
                <span>💬 Asistencia DPR</span>
                <button onclick="window.toggleChat()" class="text-xl">×</button>
            </div>
            <div id="chat-messages"></div>
            <div class="help-menu">
                <button onclick="window.enviarPreguntaRapida('🕒 Horarios')" class="btn-help">🕒 HORARIOS</button>
                <button onclick="window.enviarPreguntaRapida('💰 Costos')" class="btn-help">💰 COSTOS</button>
                <button onclick="window.enviarPreguntaRapida('💳 Cuentas')" class="btn-help">💳 CUENTAS</button>
            </div>
            <div class="p-3 border-t bg-gray-50 flex gap-2">
                <input type="text" id="chat-input" placeholder="Escribe..." class="input-light flex-1">
                <button id="btn-send-chat" class="bg-emerald-500 text-white p-2 rounded-xl">➤</button>
            </div>
        </div>
        <button onclick="window.toggleChat()" class="green-gradient w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl animate-bounce">🎧</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, setDoc, collection, query, where, serverTimestamp, increment, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const CLOUD_NAME = "de5abnhul"; const UPLOAD_PRESET = "dpr_uploads";
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

        let saldoGlobal = 0, userUID = "", emailAsesor = "", paginaActual = 1;
        let todasLasSolicitudes = [];
        const consultasPorPagina = 30;

        const TRAMITES = {
            'IMSS': [
                { nombre: 'SEMANAS COTIZADAS', precio: 25, nss: true, curp: true },
                { nombre: 'SINDO ULTIMO RETIRO', precio: 45, nss: true },
                { nombre: 'SINDO ALFANUMÉRICO', precio: 55, nss: true },
                { nombre: 'SINDO VIGENCIA', precio: 95, nss: true },
                { nombre: 'SINDO COMPLETO', precio: 135, nss: true },
                { nombre: 'Tarjeta NSS', precio: 20, nss: true, curp: true },
                { nombre: 'Inscripción Modalidad 10', precio: 200, nss: true, rfc: true, pideNombre: true },
                { nombre: 'Alta Mensual', precio: 600, nss: true, curp: true, pideNombre: true },
                { nombre: 'Alta para Desempleo con aportaciones', precio: 650, nss: true, curp: true, pideNombre: true }
            ],
            'SAT': [
                { nombre: 'RFC Clon', precio: 25, curp: true },
                { nombre: 'RFC Verificable', precio: 110, curp: true },
                { nombre: 'RFC con IDCIF', precio: 20, curp: true },
                { nombre: 'RFC Original', precio: 180, curp: true },
                { nombre: 'Localización de IDcif', precio: 60, rfc: true }
            ],
            'DOC': [
                { nombre: 'Recibo CFE', precio: 10 },
                { nombre: 'Buró de Crédito', precio: 170, curp: true },
                { nombre: 'CURP Certificada', precio: 4, curp: true },
                { nombre: 'Acta de Nacimiento', precio: 11, curp: true },
                { nombre: 'Acta de Defuncion', precio: 11, curp: true },
                { nombre: 'Acta de Matrimonio', precio: 11, curp: true },
                { nombre: 'Acta de Divorcio', precio: 11, curp: true }
            ],
            'INF': [
                { nombre: 'Localización de Contraseña', precio: 120, nss: true },
                { nombre: 'Histórico Infonavit', precio: 150, nss: true },
                { nombre: 'Reseteo MiCuentaInfonavit', precio: 120, nss: true }
            ],
            'AFORE': [
                { nombre: 'Registro a Distancia', precio: 250 },
                { nombre: 'Retiro Desempleo a Distancia', precio: 60 },
                { nombre: 'Cambiar Contraseña AFORE Web', precio: 30, curp: true },
                { nombre: 'Estado de cuenta Azteca', precio: 500, nss: true },
                { nombre: 'Estado de cuenta Coppel', precio: 500, nss: true },
                { nombre: 'Estado de cuenta Profuturo', precio: 500, nss: true },
                { nombre: 'Estado de cuenta Invercap', precio: 1400, nss: true },
                { nombre: 'Estado de cuenta SURA', precio: 800, nss: true },
                { nombre: 'Estado de cuenta BANORTE', precio: 500, nss: true },
                { nombre: 'Estado de cuenta Principal', precio: 500, nss: true },
                { nombre: 'Estado de cuenta Banamex', precio: 1200, nss: true }
            ],
            'PENSIONES': [
                { nombre: 'Análisis rápido de pensión', precio: 200, curp: true, nss: true },
                { nombre: 'Análisis Detallado de pensión', precio: 3000, curp: true, nss: true }
            ]
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                userUID = user.uid; emailAsesor = user.email; 
                escucharSaldo(); escucharHistorial(); escucharChat();
            } else { window.location.href = "login/index.html"; }
        });

        window.abrirModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.cerrarModal = () => document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));

        window.mostrarTramites = (cat) => {
            document.getElementById('gridCategorias').classList.add('hidden');
            document.getElementById('listaServicios').classList.remove('hidden');
            document.getElementById('btnVolver').classList.remove('hidden');
            document.getElementById('tituloSeccion').innerText = "Trámites: " + cat;
            const lista = document.getElementById('listaServicios');
            let html = '';
            TRAMITES[cat].forEach(t => {
                html += `<div onclick="window.prepararTramite('${t.nombre}', ${t.precio})" class="category-card p-5 text-center transition hover:scale-105 shadow-sm"><p class="font-black text-[9px] uppercase">${t.nombre}</p><p class="text-emerald-600 font-black text-[8px] mt-1">$${t.precio}.00</p></div>`;
            });
            lista.innerHTML = html;
        };

        window.resetearPanel = () => {
            document.getElementById('gridCategorias').classList.remove('hidden');
            document.getElementById('listaServicios').classList.add('hidden');
            document.getElementById('btnVolver').classList.add('hidden');
            document.getElementById('tituloSeccion').innerText = "Panel de Servicios";
        };

        window.prepararTramite = (nombre, costo) => {
            const content = document.getElementById('formContent');
            let precioFinal = costo;

            const correosVip = ["prestamoefectivo.tramites@gmail.com", "kingmc019@gmail.com", "symconsultoria2.2024@gmail.com", "symconsultoria3.2024@gmail.com", "symconsultoria2024@gmail.com", "ompesa86@gmail.com", "symconsultoria4.2024@gmail.com", "cris19330@outlook.com", "draperrapmorelia@gmail.com", "gestoriayserviciosgonzalez@gmail.com", "inburpriego@gmail.com"];
            const correosUltraVip = ["fgarcia.g195@gmail.com", "consultoriadpr@gmail.com"];

            if (nombre === 'SEMANAS COTIZADAS') {
                if (correosUltraVip.includes(emailAsesor)) precioFinal = 18;
                else if (correosVip.includes(emailAsesor)) precioFinal = 19;
            }

            content.innerHTML = `
                <h2 class="text-lg font-black text-emerald-600 mb-6 uppercase italic">${nombre}</h2>
                <input type="text" id="curp_p" placeholder="CURP" class="input-light mb-4 uppercase">
                <input type="text" id="nss_p" placeholder="NSS" class="input-light mb-4">
                <button onclick="window.confirmarCompra('${nombre}', ${precioFinal})" class="w-full orange-btn py-4 rounded-2xl font-black uppercase text-xs">Pagar $${precioFinal}.00</button>
            `;
            window.abrirModal('modalTramite');
        };

        window.confirmarCompra = async (n, c) => {
            if (saldoGlobal < c) return alert("Saldo insuficiente.");
            try {
                const curp = document.getElementById('curp_p').value.toUpperCase();
                const nss = document.getElementById('nss_p').value;
                await updateDoc(doc(db, "asesores", userUID), { saldo: increment(-c) });
                const docRef = await addDoc(collection(db, "solicitudes"), { 
                    asesor_uid: userUID, origen: "ASESOR", nombre_asesor: emailAsesor, tipo: n, costo: c, estatus: "En Proceso", fecha: serverTimestamp(), curp, nss
                });

                fetch("https://342356.appsneubox.com/webhook/Nueva_acta", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_solicitud: docRef.id, asesor: emailAsesor, servicio: n, curp, nss })
                });

                alert("Enviado."); window.cerrarModal();
            } catch(e) { alert("Error."); }
        };

        window.notificarPago = async () => {
            const m = parseFloat(document.getElementById('depMonto').value);
            const r = document.getElementById('claveRastreo').value;
            const f = document.getElementById('fileRecarga').files[0];
            if (!m || !r || !f || m < 200) return alert("Completa los datos.");
            const btn = document.getElementById('btnNotificar'); btn.disabled = true;
            try {
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                const d = await res.json();
                await addDoc(collection(db, "notificaciones_pago"), { uid: userUID, asesorEmail: emailAsesor, monto: m, rastreo: r.toUpperCase(), comprobante: d.secure_url, fecha: serverTimestamp(), estatus: "pendiente" });
                alert("Pago reportado."); window.cerrarModal();
            } catch(e) { alert("Error."); } finally { btn.disabled = false; }
        };

        function escucharHistorial() {
            onSnapshot(query(collection(db, "solicitudes"), where("asesor_uid", "==", userUID), orderBy("fecha", "desc"), limit(500)), (snap) => {
                todasLasSolicitudes = []; snap.forEach(d => todasLasSolicitudes.push(d.data()));
                renderizarTabla();
            });
        }

        function renderizarTabla() {
            const tbody = document.getElementById('listaHistorial');
            const inicio = (paginaActual - 1) * consultasPorPagina;
            const fragmento = todasLasSolicitudes.slice(inicio, inicio + consultasPorPagina);
            let html = "";
            fragmento.forEach(d => {
                const f = d.fecha ? d.fecha.toDate().toLocaleDateString() : '...';
                html += `<tr class="border-b"><td class="py-3 px-2">${f}</td><td class="py-3 px-4">${d.tipo}<br><small class="text-blue-600">${d.curp || ''}</small></td><td class="py-3 px-2 text-center uppercase font-black">${d.estatus}</td><td class="py-3 px-2 text-right">${d.archivoFinal ? `<a href="${d.archivoFinal}" target="_blank" class="bg-emerald-600 text-white p-1 rounded text-[9px]">BAJAR</a>` : '--'}</td></tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="4" class="py-10 text-center">Sin registros</td></tr>';
            document.getElementById('infoPagina').innerText = `Página ${paginaActual}`;
        }

        window.cambiarPagina = (dir) => { paginaActual += dir; if(paginaActual<1) paginaActual=1; renderizarTabla(); };
        window.toggleChat = () => { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; };
        function escucharSaldo() { onSnapshot(doc(db, "asesores", userUID), (d) => { if(d.exists()) { saldoGlobal = d.data().saldo || 0; document.getElementById('txtSaldoHeader').innerText = `$${saldoGlobal.toLocaleString('es-MX')}`; } }); }
        window.cerrarSesion = () => signOut(auth).then(() => location.reload());

        function escucharChat() {
            const q = query(collection(db, "chat_soporte"), where("asesor_uid", "==", userUID), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = (m.remitente === emailAsesor) ? "msg-user" : "msg-support";
                    div.innerText = m.texto; box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
