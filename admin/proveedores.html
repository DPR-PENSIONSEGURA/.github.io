<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Gestión de Proveedores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F1F5F9; color: #1E293B; }
        .admin-card { background: white; border: 1px solid #E2E8F0; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .admin-card:hover { border-color: #F97316; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        .bg-pending { background: #FEF3C7; color: #92400E; }
        .bg-approved { background: #D1FAE5; color: #065F46; }
        .bg-rejected { background: #FEE2E2; color: #991B1B; }
    </style>
</head>
<body>

    <header class="bg-white border-b p-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-slate-800 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-white shadow-lg text-xl">AD</div>
                <div>
                    <h1 class="font-black uppercase tracking-tighter text-xl">Gestión de <span class="text-orange-600 italic">Proveedores</span></h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em]">DPR Consultoría Executive</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="countPropuestas" class="text-[10px] font-black bg-orange-100 text-orange-700 px-4 py-2 rounded-full uppercase">...</div>
                <a href="../index.html" class="text-[10px] font-black uppercase text-slate-400 hover:text-slate-800 transition border-l pl-4">Cerrar Admin</a>
            </div>
        </div>
    </header>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="contenedorPropuestas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center opacity-40 font-black uppercase tracking-widest italic animate-pulse">
                Sincronizando base de datos de proveedores...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function escucharPropuestas() {
            const q = query(collection(db, "propuestas_proveedores"), orderBy("fecha", "desc"));
            
            onSnapshot(q, (snap) => {
                const contenedor = document.getElementById('contenedorPropuestas');
                document.getElementById('countPropuestas').innerText = `${snap.size} PROPUESTAS RECIBIDAS`;
                
                if (snap.empty) {
                    contenedor.innerHTML = `<div class="col-span-full text-center py-20 font-black uppercase text-slate-300 italic border-4 border-dashed rounded-[3rem]">No hay propuestas de servicios por el momento</div>`;
                    return;
                }

                let html = '';
                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    const id = docSnap.id;
                    const fecha = p.fecha?.toDate().toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' }) || 'Hoy';
                    
                    let badgeClass = p.estatus === 'Aceptada' ? 'bg-approved' : (p.estatus === 'Rechazada' ? 'bg-rejected' : 'bg-pending');

                    html += `
                        <div class="admin-card rounded-[2.5rem] p-8 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-6">
                                    <span class="status-badge ${badgeClass}">${p.estatus}</span>
                                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-tighter">${fecha}</span>
                                </div>
                                <h3 class="font-black text-lg uppercase text-slate-800 leading-tight mb-3 italic tracking-tighter">${p.servicio}</h3>
                                <p class="text-[11px] font-bold text-slate-400 mb-6 uppercase leading-relaxed line-clamp-3">${p.descripcion}</p>
                                
                                <div class="bg-emerald-50 rounded-3xl p-5 mb-6 border border-emerald-100">
                                    <div class="flex justify-between items-end">
                                        <div>
                                            <p class="text-[8px] font-black text-emerald-600 uppercase mb-1">Costo Sugerido</p>
                                            <p class="text-2xl font-black text-emerald-700">$${p.costo.toLocaleString('es-MX')}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Enviado por</p>
                                            <p class="text-[9px] font-black text-slate-600 truncate max-w-[120px]">${p.asesor_email.split('@')[0]}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="window.gestionarPropuesta('${id}', 'Aceptada', '${p.servicio}', ${p.costo})" class="bg-slate-900 text-white text-[10px] font-black uppercase py-4 rounded-2xl hover:bg-orange-600 transition shadow-lg">Aceptar</button>
                                    <button onclick="window.gestionarPropuesta('${id}', 'Rechazada')" class="bg-white border border-slate-200 text-slate-400 text-[10px] font-black uppercase py-4 rounded-2xl hover:bg-red-50 hover:text-red-500 transition">Rechazar</button>
                                </div>
                                <button onclick="window.borrarPermanente('${id}')" class="w-full text-[8px] font-black uppercase text-slate-300 hover:text-red-600 transition py-2">Eliminar del registro</button>
                            </div>
                        </div>
                    `;
                });
                contenedor.innerHTML = html;
            });
        }

        window.gestionarPropuesta = async (id, estatus, nombre = '', costo = 0) => {
            try {
                await updateDoc(doc(db, "propuestas_proveedores", id), { estatus: estatus });
                if(estatus === 'Aceptada') {
                    alert(`✅ PROPUESTA ACEPTADA\n\nCopia este código para tu lista de trámites:\n{ nombre: '${nombre}', precio: ${costo}, curp: true }`);
                }
            } catch (e) { alert("Error al procesar"); }
        };

        window.borrarPermanente = async (id) => {
            if(confirm("¿Eliminar propuesta definitivamente?")) {
                await deleteDoc(doc(db, "propuestas_proveedores", id));
            }
        };

        escucharPropuestas();
    </script>
</body>
</html>
