<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control de Asesores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 1.5rem; border-bottom: 4px solid #e2e8f0; }
        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">Control de <span class="text-blue-600">Asesores</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Resumen Financiero Individual</p>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="bg-slate-800 text-white px-6 py-3 rounded-2xl font-black uppercase italic text-[11px] shadow-lg">⬅️ Volver al Panel</a>
            </div>
        </header>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-10 border border-blue-100">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="inputBusqueda" placeholder="ESCRIBE EL CORREO DEL ASESOR..." class="flex-1 p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 font-bold uppercase text-sm">
                <button onclick="buscarAsesor()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700 transition-all">Buscar Asesor</button>
            </div>
        </div>

        <div id="resultadoBusqueda" class="hidden animate-fade">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
                <div class="stat-card border-blue-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Saldo Disponible</p>
                    <p id="resSaldo" class="text-3xl font-black text-blue-600">$0.00</p>
                </div>
                <div class="stat-card border-emerald-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Recargado</p>
                    <p id="resAgregado" class="text-3xl font-black text-emerald-600">$0.00</p>
                </div>
                <div class="stat-card border-orange-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Gastado</p>
                    <p id="resGastado" class="text-3xl font-black text-orange-600">$0.00</p>
                </div>
                <div class="stat-card border-purple-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Devoluciones</p>
                    <p id="resDevolucion" class="text-3xl font-black text-purple-600">$0.00</p>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100">
                    <h3 class="font-black uppercase italic text-slate-700">Historial de Trámites Solicitados</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900 text-white text-[10px] uppercase font-black italic">
                            <tr>
                                <th class="p-4">Fecha</th>
                                <th class="p-4">Servicio</th>
                                <th class="p-4">Cliente</th>
                                <th class="p-4">Costo</th>
                                <th class="p-4 text-center">Estatus</th>
                            </tr>
                        </thead>
                        <tbody id="tablaHistorialAsesor" class="text-xs font-medium"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden py-20 text-center font-black uppercase text-slate-400 italic animate-pulse">Buscando información en Firebase...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.buscarAsesor = async () => {
            const email = document.getElementById('inputBusqueda').value.trim().toLowerCase();
            if(!email) return alert("Ingresa un correo");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('resultadoBusqueda').classList.add('hidden');

            try {
                let saldoActual = 0, totalAgregado = 0, totalGastado = 0, totalDevuelto = 0;
                let uidAsesor = "";

                // 1. Buscar Saldo Actual y UID
                const qAsesor = query(collection(db, "asesores"), where("email", "==", email));
                const snapAsesor = await getDocs(qAsesor);
                
                if(snapAsesor.empty) {
                    // Si no lo encuentra por email directo, intentamos buscar en la colección por el nombre_asesor de los trámites
                    const qAlt = query(collection(db, "solicitudes"), where("nombre_asesor", "==", email));
                    const snapAlt = await getDocs(qAlt);
                    if(snapAlt.empty) {
                        alert("Asesor no encontrado");
                        document.getElementById('loader').classList.add('hidden');
                        return;
                    }
                    // Si lo encuentra en trámites pero no en asesores, el saldo será 0 o N/A
                } else {
                    const dataA = snapAsesor.docs[0].data();
                    saldoActual = dataA.saldo || 0;
                    uidAsesor = snapAsesor.docs[0].id;
                }

                // 2. Calcular Saldo Agregado (Recargas aprobadas)
                const qPagos = query(collection(db, "notificaciones_pago"), where("asesorEmail", "==", email), where("estatus", "==", "aprobado"));
                const snapPagos = await getDocs(qPagos);
                snapPagos.forEach(p => totalAgregado += Number(p.data().monto));

                // 3. Obtener Solicitudes y Calcular Gastos/Devoluciones
                const qSols = query(collection(db, "solicitudes"), where("nombre_asesor", "==", email), orderBy("fecha", "desc"));
                const snapSols = await getDocs(qSols);
                
                const tabla = document.getElementById('tablaHistorialAsesor');
                tabla.innerHTML = "";

                snapSols.forEach(docSnap => {
                    const s = docSnap.data();
                    if(s.tipo === "RECARGA ASESOR") return;

                    const costo = Number(s.costo || 0);
                    const esError = s.estatus === "Error de Datos" || s.estatus.includes("ERROR");

                    if(esError) {
                        totalDevuelto += costo;
                    } else {
                        totalGastado += costo;
                    }

                    const fecha = s.fecha?.toDate().toLocaleDateString() || '---';
                    const colorEstatus = s.estatus === 'Terminado' ? 'text-emerald-600' : (esError ? 'text-red-500' : 'text-orange-500');

                    tabla.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-4 text-slate-400 font-bold">${fecha}</td>
                            <td class="p-4 font-black text-slate-700 uppercase">${s.tipo}</td>
                            <td class="p-4">
                                <div class="font-bold text-slate-900 uppercase">${s.cliente_nombre || 'S/N'}</div>
                                <div class="text-[9px] text-slate-400 font-black tracking-tighter">CURP: ${s.curp || '---'}</div>
                            </td>
                            <td class="p-4 font-black text-slate-700">$${costo}</td>
                            <td class="p-4 text-center font-black uppercase text-[10px] ${colorEstatus}">${s.estatus}</td>
                        </tr>`;
                });

                // Inyectar Resultados en las tarjetas
                const fmt = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v);
                document.getElementById('resSaldo').innerText = fmt(saldoActual);
                document.getElementById('resAgregado').innerText = fmt(totalAgregado);
                document.getElementById('resGastado').innerText = fmt(totalGastado);
                document.getElementById('resDevolucion').innerText = fmt(totalDevuelto);

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resultadoBusqueda').classList.remove('hidden');

            } catch(e) {
                console.error(e);
                alert("Error al obtener la información");
                document.getElementById('loader').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
