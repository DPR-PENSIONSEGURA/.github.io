<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}
.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
button {
  padding: 10px;
  background: #00C896;
  color: white;
  border: none;
  border-radius: 5px;
}
input {
  padding: 8px;
  margin: 5px;
}
</style>

</head>

<body style="display:none;">

<h1>👑 Panel Administrador</h1>

<!-- 👥 ASESORES -->
<div class="card">
  <h2>Asesores Conectados</h2>
  <div id="asesoresActivos"></div>
</div>

<!-- 📦 PRODUCTOS -->
<div class="card">
  <h2>Productos</h2>

  <input id="prodNombre" placeholder="Nombre producto">
  <input id="prodPrecio" placeholder="Precio">
  <input id="prodCosto" placeholder="Costo">

  <button onclick="agregarProducto()">Guardar</button>

  <div id="listaProductos"></div>
</div>

<!-- 📄 PDF -->
<div class="card">
  <h2>Corte</h2>
  <button onclick="generarPDF()">Descargar PDF</button>
</div>

<!-- 🔥 FIREBASE + LÓGICA -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIGURA AQUÍ
const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 PROTECCIÓN ADMIN
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("No logueado");
    window.location.href = "index.html";
    return;
  }

  const ref = doc(db, "USUARIOSDPR", user.uid);
  const snap = await getDoc(ref);

  if (!snap.exists() || snap.data().rol !== "admin") {
    alert("No eres admin");
    window.location.href = "crm.html";
    return;
  }

  document.body.style.display = "block";

  cargarAsesores();
  cargarProductos();
});

// 👥 ASESORES
async function cargarAsesores() {
  const cont = document.getElementById("asesoresActivos");
  const snap = await getDocs(collection(db, "activos"));

  let html = "";
  snap.forEach(doc => {
    const d = doc.data();
    html += `<div class="card">${d.email}</div>`;
  });

  cont.innerHTML = html;
}

// 📦 PRODUCTOS
window.agregarProducto = async function() {
  const nombre = document.getElementById("prodNombre").value;
  const precio = parseFloat(document.getElementById("prodPrecio").value);
  const costo = parseFloat(document.getElementById("prodCosto").value);

  await addDoc(collection(db, "productos"), {
    nombre,
    precio,
    costo,
    utilidad: precio - costo
  });

  alert("Producto guardado");
  cargarProductos();
};

async function cargarProductos() {
  const cont = document.getElementById("listaProductos");
  const snap = await getDocs(collection(db, "productos"));

  let html = "";
  snap.forEach(doc => {
    const p = doc.data();
    html += `
      <div class="card">
        <b>${p.nombre}</b><br>
        Precio: $${p.precio}<br>
        Costo: $${p.costo}<br>
        Utilidad: $${p.utilidad}
      </div>
    `;
  });

  cont.innerHTML = html;
}

// 📄 PDF
window.generarPDF = async function() {
  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  script.onload = async () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const snap = await getDocs(collection(db, "productos"));

    let y = 10;
    pdf.text("Corte General", 10, y);
    y += 10;

    snap.forEach(doc => {
      const p = doc.data();
      pdf.text(`${p.nombre} - $${p.utilidad}`, 10, y);
      y += 10;
    });

    pdf.save("corte.pdf");
  };
  document.body.appendChild(script);
};

</script>

</body>
</html>
