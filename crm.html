<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR CRM | Panel de Mensajes Blindado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* BLINDAJE VISUAL: Oculta todo el cuerpo hasta que la clave sea correcta */
        body { display: none; background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        .sidebar { background: white; border-right: 2px solid #e2e8f0; height: calc(100vh - 100px); overflow-y: auto; }
        .chat-area { background: #fff; height: calc(100vh - 100px); display: flex; flex-direction: column; }
        .prospect-card { transition: all 0.2s ease; cursor: pointer; position: relative; border-bottom: 1px solid #f1f5f9; }
        .prospect-card:hover { background-color: #fdf2f2; }
        .prospect-card.active { background-color: #fff7ed; border-left: 4px solid #D4AF37; }
        .dot-notify { position: absolute; top: 15px; right: 15px; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 5px rgba(239, 68, 68, 0.5); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg-support { align-self: flex-end; background: #8FCE00; color: white; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 70%; font-weight: 600; font-size: 13px; }
        .msg-prospect { align-self: flex-start; background: white; border: 1px solid #e2e8f0; padding: 10px 15px; border-radius: 15px 15px 15px 0; max-width: 70%; font-weight: 600; font-size: 13px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-2 border-[#D4AF37]">
        <div class="p-4 bg-white border-b-2 border-orange-100 flex justify-between items-center">
            <div>
                <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Atención a Clientes</p>
                <h1 id="txtChateandoCon" class="text-sm font-black text-slate-700 uppercase">Selecciona un chat activo</h1>
            </div>
            <button onclick="window.location.href='https://pensionsegura.org'" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold text-xs uppercase">Salir</button>
        </div>

        <div class="grid grid-cols-12">
            <div class="col-span-4 sidebar p-2">
                <h2 class="text-[11px] font-black text-slate-400 uppercase p-3 tracking-widest border-b mb-2">Mensajes Recibidos</h2>
                <div id="listaChatsActivos"></div>
            </div>

            <div class="col-span-8 chat-area">
                <div id="contenedorMensajes" class="messages-container"></div>
                <div class="p-4 border-t bg-slate-50 flex gap-3">
                    <input type="text" id="inputRespuesta" placeholder="Escribe aquí..." class="flex-1 p-4 rounded-2xl border-2 border-slate-200 outline-none font-bold text-sm">
                    <button id="btnEnviar" class="bg-[#8FCE00] text-white px-8 py-4 rounded-2xl font-black uppercase text-xs">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================================
        // AQUÍ ES DONDE SE DECLARAN LAS CONTRASEÑAS (BLINDADO)
        // ==========================================================
        const PASS_DIANA = "Sashimi$";
        const PASS_ASISTENTE = "DPR2026";

        const vPass = prompt("Contraseña de Acceso CRM:");

        if (vPass === PASS_DIANA || vPass === PASS_ASISTENTE) {
            document.body.style.display = "block"; // Muestra el CRM
            cargarChatsActivos(); // Arranca la carga de datos
        } else {
            alert("Acceso denegado");
            window.location.href = "https://pensionsegura.org";
        }
        // ==========================================================

        let chatSeleccionado = "";

        function cargarChatsActivos() {
            onSnapshot(query(collection(db, "chat_soporte"), orderBy("timestamp", "desc")), (snapshot) => {
                const mapChats = new Map();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (!mapChats.has(data.asesor_uid)) {
                        mapChats.set(data.asesor_uid, {
                            uid: data.asesor_uid,
                            email: data.remitente !== "Asistente DPR" ? data.remitente : "Usuario",
                            ultimoMsg: data.texto,
                            quienEnvio: data.remitente
                        });
                    }
                });

                const listaHTML = document.getElementById('listaChatsActivos');
                listaHTML.innerHTML = "";
                mapChats.forEach(chat => {
                    const esNuevo = chat.quienEnvio !== "Asistente DPR";
                    const div = document.createElement('div');
                    div.className = `prospect-card p-4 rounded-2xl mb-2 ${chatSeleccionado === chat.uid ? 'active' : ''}`;
                    div.onclick = () => abrirChat(chat.uid, chat.email);
                    div.innerHTML = `
                        ${esNuevo ? '<div class="dot-notify"></div>' : ''}
                        <p class="text-[11px] font-black text-slate-700 truncate uppercase">${chat.email}</p>
                        <p class="text-[9px] font-bold text-slate-400 truncate mt-1">${chat.ultimoMsg}</p>
                    `;
                    listaHTML.appendChild(div);
                });
            });
        }

        function abrirChat(uid, email) {
            chatSeleccionado = uid;
            document.getElementById('txtChateandoCon').innerText = `Chateando con: ${email}`;
            onSnapshot(query(collection(db, "chat_soporte"), where("asesor_uid", "==", uid), orderBy("timestamp", "asc")), (snapshot) => {
                const container = document.getElementById('contenedorMensajes');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = (m.remitente === "Asistente DPR") ? "msg-support" : "msg-prospect";
                    div.innerText = m.texto;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('btnEnviar').onclick = async () => {
            const input = document.getElementById('inputRespuesta');
            if (!input.value || !chatSeleccionado) return;
            await addDoc(collection(db, "chat_soporte"), {
                asesor_uid: chatSeleccionado,
                remitente: "Asistente DPR",
                texto: input.value,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };
    </script>
</body>
</html>
