name: Patch VIP precios dashboard

on:
  push:
    paths:
      - '.github/workflows/patch-vip-precios.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-vip-precios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Patch dashboard VIP precios
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('dashboard.html')
          text = path.read_text(encoding='utf-8')

          vip_block = '''

        // ==============================
        // DPR: PRECIOS VIP POR ASESOR
        // ==============================
        const VIP_SEMANAS_15 = [
            "leslymar.6807@gmail.com",
            // "SEGUNDO_CORREO@gmail.com"
        ];

        function obtenerPrecioTramite(t) {
            const email = String(emailAsesor || "").trim().toLowerCase();
            const nombre = String(t?.nombre || "").trim().toUpperCase();

            if (nombre === "SEMANAS COTIZADAS" && VIP_SEMANAS_15.includes(email)) {
                return 15;
            }

            return Number(t.precio || 0);
        }
'''

          anchor = '        let saldoGlobal = 0, userUID = "", emailAsesor = "";'
          if 'const VIP_SEMANAS_15' not in text:
              text = text.replace(anchor, anchor + vip_block)

          old_span = '<span class="bg-emerald-50 text-emerald-700 border border-emerald-100 px-3 py-1 rounded-full font-black text-[10px]">$${t.precio}</span>'
          new_span = '<span class="bg-emerald-50 text-emerald-700 border border-emerald-100 px-3 py-1 rounded-full font-black text-[10px]">$${obtenerPrecioTramite(t)}</span>'
          text = text.replace(old_span, new_span)

          text = text.replace('            let pFinal = t.precio;', '            let pFinal = obtenerPrecioTramite(t);')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "DPR Bot"
          git config user.email "consultoriadpr@gmail.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Agregar precio VIP de semanas cotizadas"
            git push
          fi
