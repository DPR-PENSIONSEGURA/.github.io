<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría - CRM Privado</title>
    
    <style>
        /* DISEÑO PROFESIONAL: MÁRMOL, DORADO Y VERDE */
        :root {
            --accent-gold: #D4AF37;
            --accent-green: #8FCE00;
            --text-dark: #1A4D1A;
            --white-marble: #fdfdfd;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f0f0;
            /* Si tienes una imagen de mármol, asegúrate que se llame marble.jpg */
            background-image: url('marble.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-dark);
        }

        #login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            border: 2px solid var(--accent-gold);
            backdrop-filter: blur(10px);
        }

        h2 { color: var(--accent-gold); margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            box-sizing: border-box;
            background: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-green);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #7fba00; transform: translateY(-1px); }

        /* PANEL PRINCIPAL */
        #crm-main {
            display: none;
            width: 96%;
            height: 92vh;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            border: 1px solid var(--accent-gold);
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .header {
            padding: 15px 25px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        .layout { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 280px; border-right: 1px solid #eee; padding: 20px; background: #fafafa; }

        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; background: white; }

        #messages { flex: 1; border: 1px solid #eee; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }

        #admin-box {
            background: #fff9eb;
            padding: 15px;
            border-top: 2px solid var(--accent-gold);
            display: none;
        }

        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>DPR CONSULTORÍA</h2>
        <p>Gestión de Asesorías</p>
        <input type="password" id="pass-field" placeholder="Contraseña de acceso">
        <button id="btn-login">ENTRAR AL CRM</button>
    </div>

    <div id="crm-main">
        <div class="header">
            <strong style="color: var(--accent-gold);">PANEL DE CONTROL DPR</strong>
            <button id="btn-logout" style="width: auto; background: #e74c3c; padding: 5px 15px;">Cerrar Sesión</button>
        </div>
        
        <div class="layout">
            <div class="sidebar">
                <h4 style="color: var(--accent-gold);">Prospectos Activos</h4>
                <div id="contact-list">Cargando lista...</div>
            </div>
            <div class="chat-area">
                <div id="messages"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="msg-input" placeholder="Escribe la asesoría aquí..." style="margin-bottom: 0;">
                    <button id="btn-send" style="width: 120px;">ENVIAR</button>
                </div>
            </div>
        </div>

        <div id="admin-box">
            <h4 style="margin: 0 0 10px 0; color: var(--accent-gold);">🔒 Caja Fuerte (Admin)</h4>
            <div id="online-status">Monitoreando personal...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, addDoc, collection, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TUS CREDENCIALES INTEGRADAS
        const firebaseConfig = { 
            apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", 
            authDomain: "pensionsegura-9c817.firebaseapp.com", 
            projectId: "pensionsegura-9c817" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIGURACIÓN DE ACCESO
        const PASS_GESTOR = "dpr2026"; 
        const PASS_ADMIN = "diana_admin"; 

        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const btnSend = document.getElementById('btn-send');

        // FUNCIÓN DE ENTRADA
        async function intentarAcceso() {
            const pass = document.getElementById('pass-field').value;
            if (pass === PASS_ADMIN || pass === PASS_GESTOR) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('crm-main').style.display = 'flex';

                if (pass === PASS_ADMIN) {
                    document.getElementById('admin-box').style.display = 'block';
                }

                await marcarPresencia("online");
                iniciarEscuchaPresencia();
                iniciarEscuchaChats();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        // MARCAR ESTADO (Online/Offline)
        async function marcarPresencia(status) {
            try {
                const userRef = doc(db, "usuarios", "gestor_1");
                await setDoc(userRef, {
                    nombre: "Gestor DPR",
                    status: status,
                    lastSeen: serverTimestamp()
                }, { merge: true });
            } catch (e) { console.error("Error de presencia:", e); }
        }

        // VER QUIÉN ESTÁ EN LÍNEA (Caja Fuerte)
        function iniciarEscuchaPresencia() {
            onSnapshot(collection(db, "usuarios"), (snapshot) => {
                const statusDiv = document.getElementById('online-status');
                statusDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const color = data.status === "online" ? "#2ecc71" : "#e74c3c";
                    statusDiv.innerHTML += `<p><span class="status-dot" style="background:${color}"></span> ${data.nombre}: <strong>${data.status}</strong></p>`;
                });
            });
        }

        // CARGAR CHATS EN TIEMPO REAL
        function iniciarEscuchaChats() {
            const q = query(collection(db, "chat_soporte"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const msgDiv = document.getElementById('messages');
                msgDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const m = doc.data();
                    const p = document.createElement('p');
                    p.innerHTML = `<strong>${m.remitente}:</strong> ${m.texto}`;
                    msgDiv.appendChild(p);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }

        // ENVIAR MENSAJE CON TTL DE 15 DÍAS
        async function enviarMensaje() {
            const input = document.getElementById('msg-input');
            if (!input.value) return;

            const expira = new Date();
            expira.setDate(expira.getDate() + 15);

            await addDoc(collection(db, "chat_soporte"), {
                texto: input.value,
                remitente: "Asistente",
                timestamp: serverTimestamp(),
                expiraEn: expira // Este es el campo para la regla TTL de Firebase
            });
            input.value = "";
        }

        // EVENTOS
        btnLogin.addEventListener('click', intentarAcceso);
        btnSend.addEventListener('click', enviarMensaje);
        btnLogout.addEventListener('click', () => {
            marcarPresencia("offline");
            location.reload();
        });

        // Offline al cerrar pestaña
        window.addEventListener('beforeunload', () => marcarPresencia("offline"));

    </script>
</body>
</html>
