<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría - CRM Privado</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        /* 2. DISEÑO PROFESIONAL (CSS) */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #2ecc71;
            --admin-color: #3498db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
            border: 1px solid #333;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); }

        #crm-main {
            display: none;
            width: 95%;
            height: 90vh;
            background: var(--card-bg);
            border-radius: 10px;
            flex-direction: column;
        }

        .header {
            padding: 15px;
            background: #252525;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .layout { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 250px; border-right: 1px solid #333; padding: 10px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; }

        #messages { flex: 1; background: #181818; border-radius: 8px; margin-bottom: 15px; padding: 15px; overflow-y: auto; }

        #admin-box {
            background: #252525;
            padding: 15px;
            border-top: 2px solid var(--admin-color);
            display: none;
        }

        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: white;">DPR Consultoría</h2>
        <p>Sistema de Gestión</p>
        <input type="password" id="pass-field" placeholder="Contraseña de acceso">
        <button onclick="intentarAcceso()">Entrar al CRM</button>
    </div>

    <div id="crm-main">
        <div class="header">
            <strong>DPR - Gestión de Clientes</strong>
            <button onclick="cerrarSesion()" style="width: auto; padding: 5px 15px; background: #e74c3c;">Salir</button>
        </div>
        
        <div class="layout">
            <div class="sidebar">
                <h3>Prospectos</h3>
                <div id="contact-list">Cargando...</div>
            </div>
            <div class="chat-area">
                <div id="messages"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="msg-input" placeholder="Responder asesoría...">
                    <button onclick="enviarMensaje()" style="width: 100px;">Enviar</button>
                </div>
            </div>
        </div>

        <div id="admin-box">
            <h4><span style="color: #3498db;">🔒</span> Caja Fuerte: Estado del Equipo</h4>
            <div id="online-status">Revisando conexión...</div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE ACCESO
        const PASS_GESTOR = "dpr2026"; 
        const PASS_ADMIN = "diana_admin"; 

        // IMPORTANTE: Aquí pegas tu configuración de Firebase
        // Si ya tienes un archivo config.js, el navegador lo leerá.
        // Si no, pega aquí: const firebaseConfig = { ... }; firebase.initializeApp(firebaseConfig);
        // const db = firebase.firestore();

        function intentarAcceso() {
            const pass = document.getElementById('pass-field').value;
            const crmMain = document.getElementById('crm-main');
            const loginBox = document.getElementById('login-container');
            const adminBox = document.getElementById('admin-box');

            if (pass === PASS_ADMIN || pass === PASS_GESTOR) {
                loginBox.style.display = 'none';
                crmMain.style.display = 'flex';

                // Verificación de Admin para la Caja Fuerte
                if (pass === PASS_ADMIN) adminBox.style.display = 'block';

                console.log("Acceso concedido");
                iniciarFunciones();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        function iniciarFunciones() {
            try {
                marcarEstado("online");
                escucharPresencia();
                // Aquí cargarías tus mensajes de Firebase
            } catch (e) {
                console.log("Firebase no configurado aún:", e);
            }
        }

        function marcarEstado(status) {
            if (typeof db !== 'undefined') {
                db.collection("usuarios").doc("gestor_1").set({
                    nombre: "Asistente de Atención",
                    status: status,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            }
        }

        function escucharPresencia() {
            if (typeof db !== 'undefined') {
                db.collection("usuarios").onSnapshot((snapshot) => {
                    const statusDiv = document.getElementById('online-status');
                    statusDiv.innerHTML = "";
                    snapshot.forEach((doc) => {
                        const user = doc.data();
                        const color = user.status === "online" ? "#2ecc71" : "#e74c3c";
                        statusDiv.innerHTML += `<p><span class="status-dot" style="background:${color}"></span> ${user.nombre}: ${user.status}</p>`;
                    });
                });
            }
        }

        function enviarMensaje() {
            const txt = document.getElementById('msg-input').value;
            if(!txt) return;
            
            const expira = new Date();
            expira.setDate(expira.getDate() + 15); // TTL de 15 días

            console.log("Mensaje enviado con caducidad de 15 días:", txt);
            document.getElementById('msg-input').value = "";
            // Lógica de guardado en Firebase aquí
        }

        function cerrarSesion() {
            marcarEstado("offline");
            location.reload();
        }

        window.addEventListener('beforeunload', () => marcarEstado("offline"));
    </script>
</body>
</html>
