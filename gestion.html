<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría - CRM Privado</title>
    
    <style>
        /* CONFIGURACIÓN DE COLORES Y FONDO */
        :root {
            --accent-gold: #D4AF37;
            --accent-green: #8FCE00;
            --text-dark: #1A4D1A;
            /* Link de imagen de mármol premium */
            --marble-url: url('https://images.unsplash.com/photo-1533134486753-c833f074868f?q=80&w=2070&auto=format&fit=crop');
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f0f0;
            background-image: var(--marble-url);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-dark);
            overflow: hidden;
            position: relative;
        }

        /* ANIMACIÓN DE BRILLO ELEGANTE */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.3) 50%, 
                rgba(255,255,255,0) 100%
            );
            transform: skewX(-25deg);
            animation: shine 6s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* CONTENEDOR DE LOGIN */
        #login-container {
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            border: 2px solid var(--accent-gold);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        h2 { 
            color: var(--accent-gold); 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 0.9rem;
            margin-bottom: 25px;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            box-sizing: border-box;
            background: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        button:hover { 
            background-color: #7fba00; 
            box-shadow: 0 5px 15px rgba(143, 206, 0, 0.4);
        }

        /* PANEL PRINCIPAL */
        #crm-main {
            display: none;
            width: 96%;
            height: 92vh;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            border: 1px solid var(--accent-gold);
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .header {
            padding: 15px 25px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        .layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; border-right: 1px solid #eee; padding: 20px; background: #fdfdfd; }
        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; background: white; }
        #messages { flex: 1; border: 1px solid #eee; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 15px; background: #fff; }

        #admin-box {
            background: #fffdf7;
            padding: 15px;
            border-top: 2px solid var(--accent-gold);
            display: none;
        }

        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>DPR CONSULTORÍA</h2>
        <p class="subtitle">Gestión Administrativa</p>
        <input type="password" id="pass-field" placeholder="Contraseña de acceso">
        <button id="btn-login">ENTRAR AL CRM</button>
    </div>

    <div id="crm-main">
        <div class="header">
            <strong style="color: var(--accent-gold);">PANEL DE CONTROL PROFESIONAL</strong>
            <button id="btn-logout" style="width: auto; background: #e74c3c; padding: 8px 15px; font-size: 0.8rem;">Cerrar Sesión</button>
        </div>
        
        <div class="layout">
            <div class="sidebar">
                <h4 style="color: var(--accent-gold); border-bottom: 1px solid #ddd; padding-bottom: 10px;">Prospectos Activos</h4>
                <div id="contact-list" style="font-size: 0.9rem; color: #666;">Esperando interacción...</div>
            </div>
            <div class="chat-area">
                <div id="messages"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="msg-input" placeholder="Escribe la respuesta aquí..." style="margin-bottom: 0;">
                    <button id="btn-send" style="width: 120px;">ENVIAR</button>
                </div>
            </div>
        </div>

        <div id="admin-box">
            <h4 style="margin: 0 0 10px 0; color: var(--accent-gold); font-size: 0.9rem;">🔒 Caja Fuerte (Estado del Equipo)</h4>
            <div id="online-status" style="font-size: 0.85rem;">Monitoreando...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, addDoc, collection, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TUS CREDENCIALES
        const firebaseConfig = { 
            apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", 
            authDomain: "pensionsegura-9c817.firebaseapp.com", 
            projectId: "pensionsegura-9c817" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PASS_GESTOR = "dpr2026"; 
        const PASS_ADMIN = "diana_admin"; 

        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const btnSend = document.getElementById('btn-send');

        async function intentarAcceso() {
            const pass = document.getElementById('pass-field').value;
            if (pass === PASS_ADMIN || pass === PASS_GESTOR) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('crm-main').style.display = 'flex';
                if (pass === PASS_ADMIN) document.getElementById('admin-box').style.display = 'block';

                await marcarPresencia("online");
                iniciarEscuchaPresencia();
                iniciarEscuchaChats();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        async function marcarPresencia(status) {
            try {
                const userRef = doc(db, "usuarios", "gestor_1");
                await setDoc(userRef, { nombre: "Gestor DPR", status: status, lastSeen: serverTimestamp() }, { merge: true });
            } catch (e) { console.error(e); }
        }

        function iniciarEscuchaPresencia() {
            onSnapshot(collection(db, "usuarios"), (snapshot) => {
                const statusDiv = document.getElementById('online-status');
                statusDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const color = data.status === "online" ? "#2ecc71" : "#e74c3c";
                    statusDiv.innerHTML += `<p><span class="status-dot" style="background:${color}"></span> ${data.nombre}: <strong>${data.status}</strong></p>`;
                });
            });
        }

        function iniciarEscuchaChats() {
            const q = query(collection(db, "chat_soporte"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const msgDiv = document.getElementById('messages');
                msgDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const m = doc.data();
                    const p = document.createElement('p');
                    p.style.margin = "5px 0";
                    p.innerHTML = `<small>${m.remitente}:</small> <br>${m.texto}`;
                    msgDiv.appendChild(p);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }

        async function enviarMensaje() {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            const expira = new Date();
            expira.setDate(expira.getDate() + 15);

            await addDoc(collection(db, "chat_soporte"), {
                texto: input.value,
                remitente: "Asistente",
                timestamp: serverTimestamp(),
                expiraEn: expira
            });
            input.value = "";
        }

        btnLogin.addEventListener('click', intentarAcceso);
        btnSend.addEventListener('click', enviarMensaje);
        btnLogout.addEventListener('click', () => {
            marcarPresencia("offline");
            location.reload();
        });

        window.addEventListener('beforeunload', () => marcarPresencia("offline"));
    </script>
</body>
</html>
