<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Consultoría - CRM Privado</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="login-container">
        <h2>DPR Consultoría - Acceso</h2>
        <input type="password" id="pass-field" placeholder="Contraseña">
        <button onclick="intentarAcceso()">Entrar al CRM</button>
    </div>

    <div id="crm-main" style="display:none;">
        <header style="display: flex; justify-content: space-between; padding: 10px; background: #2c3e50; color: white;">
            <span>Panel de Gestión - DPR</span>
            <button onclick="cerrarSesion()" style="background: #e74c3c; color: white; border: none; cursor: pointer;">Cerrar Sesión</button>
        </header>
        
        <div id="layout" style="display: flex; height: 80vh;">
            <aside id="sidebar" style="width: 25%; border-right: 1px solid #ccc; overflow-y: auto;">
                <h3 style="padding: 10px;">Chats Recientes</h3>
                <ul id="contact-list" style="list-style: none; padding: 0;"></ul>
            </aside>

            <section id="chat-area" style="width: 75%; display: flex; flex-direction: column;">
                <div id="messages" style="flex-grow: 1; padding: 20px; overflow-y: auto; background: #f9f9f9;">
                    </div>
                <div id="input-box" style="padding: 15px; border-top: 1px solid #ccc;">
                    <input type="text" id="msg-input" style="width: 70%; padding: 10px;" placeholder="Escribe un mensaje...">
                    <button onclick="enviarMensaje()" style="padding: 10px;">Enviar</button>
                    <button onclick="guardarEnExpediente()" style="padding: 10px; background: #f1c40f;">⭐ Guardar en Expediente</button>
                </div>
            </section>
        </div>

        <div id="admin-box" style="display: none; background: #ecf0f1; padding: 15px; border-top: 3px solid #34495e;">
            <h3>Caja Fuerte: Personal en Línea</h3>
            <div id="online-status"></div>
        </div>
    </div>

    <script src="config.js"></script> <script src="app.js"></script>
</body>
</html>
