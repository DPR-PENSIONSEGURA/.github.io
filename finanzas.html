<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR | Mis Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #E2E8F0; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #F1D299 50%, #B88A44 100%); }
        .card-finanza { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s; }
        .card-finanza:hover { background: rgba(255, 255, 255, 0.05); transform: translateX(5px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <a href="dashboard.html" class="text-[10px] font-black uppercase text-slate-500 hover:text-white transition">← Volver al Panel</a>
                <h1 class="text-3xl font-black uppercase italic text-white tracking-tighter mt-2">Mi <span class="text-blue-500">Estado de Cuenta</span></h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-black text-slate-500 uppercase">Saldo Actual</p>
                <p id="txtSaldo" class="text-2xl font-black text-white">...</p>
            </div>
        </header>

        <section class="space-y-4">
            <h2 class="text-sm font-black uppercase tracking-widest text-slate-500 mb-6 italic">Movimientos Recientes</h2>
            
            <div id="contenedorMovimientos" class="space-y-3">
                <p class="text-center py-20 opacity-20 font-black uppercase italic">Cargando transacciones...</p>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM",
            authDomain: "pensionsegura-9c817.firebaseapp.com",
            projectId: "pensionsegura-9c817"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                cargarSaldo(user.uid);
                cargarMovimientos(user.uid);
            } else {
                window.location.href = "login/index.html";
            }
        });

        function cargarSaldo(uid) {
            onSnapshot(doc(db, "asesores", uid), (d) => {
                if(d.exists()) {
                    document.getElementById('txtSaldo').innerText = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(d.data().saldo || 0);
                }
            });
        }

        async function cargarMovimientos(uid) {
            const contenedor = document.getElementById('contenedorMovimientos');
            
            // Escuchar solicitudes (Pagos y Reembolsos)
            const q = query(collection(db, "solicitudes"), where("asesor_uid", "==", uid), orderBy("fecha", "desc"), limit(40));
            
            onSnapshot(q, (snap) => {
                contenedor.innerHTML = "";
                if(snap.empty) {
                    contenedor.innerHTML = '<p class="text-center py-20 opacity-20 font-bold uppercase">No hay movimientos registrados</p>';
                    return;
                }

                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const fecha = m.fecha?.toDate().toLocaleString('es-MX', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) || 'Reciente';
                    
                    let icono = "📉";
                    let titulo = m.tipo;
                    let montoClass = "text-red-400";
                    let prefijo = "-";
                    let detalle = `CURP: ${m.curp}`;

                    // Detectar si es un reembolso (Error)
                    if(m.estatus.includes("ERROR")) {
                        icono = "↩️";
                        titulo = `REEMBOLSO: ${m.tipo}`;
                        montoClass = "text-green-400";
                        prefijo = "+";
                        detalle = `Motivo: ${m.estatus}`;
                    } else if (m.estatus === "Terminado") {
                        icono = "✅";
                    }

                    contenedor.innerHTML += `
                        <div class="card-finanza p-5 rounded-[1.5rem] flex justify-between items-center animate-fade">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-xl">${icono}</div>
                                <div>
                                    <p class="text-[10px] font-black uppercase text-slate-500 tracking-tighter">${fecha}</p>
                                    <h3 class="font-black text-white uppercase text-xs tracking-tight">${titulo}</h3>
                                    <p class="text-[9px] font-bold text-slate-500 uppercase">${detalle}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black ${montoClass}">${prefijo}${new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(m.costo || 0)}</p>
                                <p class="text-[8px] font-black text-slate-600 uppercase tracking-widest">${m.origen || 'SISTEMA'}</p>
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
