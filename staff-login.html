<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso interno Novyra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: Inter, Arial, sans-serif; }</style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl p-8 border border-slate-200">
    <div class="text-center mb-8">
      <div class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center font-black text-white shadow-lg italic text-2xl mx-auto mb-4">DP</div>
      <h1 class="text-2xl font-black uppercase italic text-slate-800 tracking-tighter">Acceso interno</h1>
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">NOVYRA SERVICES Executive</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-[11px] font-black uppercase text-slate-500 mb-2">Usuario</label>
        <input id="staffUser" type="text" placeholder="admin o usuario del operador"
          class="w-full p-4 rounded-2xl border border-slate-300 outline-none focus:border-blue-600 font-bold">
      </div>

      <div>
        <label class="block text-[11px] font-black uppercase text-slate-500 mb-2">Contraseña</label>
        <input id="staffPass" type="password" placeholder="Tu contraseña"
          class="w-full p-4 rounded-2xl border border-slate-300 outline-none focus:border-blue-600 font-bold">
      </div>

      <button id="btnLogin"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg transition">
        Entrar
      </button>

      <p id="staffError" class="text-red-600 text-sm font-bold text-center hidden"></p>
    </div>
  </div>

  <script type="module">
    const ADMIN_API_BASE = "https://api-326bly7kmq-uc.a.run.app";

    const userInput = document.getElementById('staffUser');
    const passInput = document.getElementById('staffPass');
    const btnLogin = document.getElementById('btnLogin');
    const errorBox = document.getElementById('staffError');

    function mostrarError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    async function loginInterno() {
      const username = userInput.value.trim();
      const password = passInput.value.trim();
      errorBox.classList.add('hidden');

      if (!username || !password) {
        mostrarError('Escribe usuario y contraseña.');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Validando...';

      try {
        const res = await fetch(`${ADMIN_API_BASE}/api/v1/admin/panel/staff-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) {
          throw new Error(data.message || 'Usuario o contraseña incorrectos.');
        }

        localStorage.setItem('staffSession', JSON.stringify(data.staff));
        sessionStorage.setItem('dpr_staff_token', data.token);
        window.location.href = 'admin.html';
      } catch (error) {
        mostrarError(error.message || 'No se pudo iniciar sesión.');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    }

    btnLogin.addEventListener('click', loginInterno);
    passInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginInterno();
    });
  </script>
</body>
</html>
