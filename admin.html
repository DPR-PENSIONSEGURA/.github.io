<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control Maestro Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .card-stat { transition: all 0.3s ease; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .badge-portal { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .nav-pag { background: #1e293b; color: white; padding: 6px 14px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .nav-pag:disabled { opacity: 0.3; cursor: not-allowed; }
        /* Estilo para el botón de pendientes */
        .btn-filter { background: #F97316; color: white; padding: 10px 20px; border-radius: 15px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: all 0.3s; }
        .btn-filter:hover { background: #EA580C; transform: scale(1.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-white shadow-lg italic text-xl">DP</div>
                <div>
                    <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">Panel <span class="text-blue-600">Admin</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">DPR Consultoría Executive</p>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full lg:w-auto">
                <div class="card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-orange-500 text-center">
                    <p class="text-[8px] font-black uppercase text-slate-400">Visitas Hoy</p>
                    <p id="txtVisitas" class="text-xl font-black text-slate-800">0</p>
                </div>
                <div class="card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-purple-600 text-center">
                    <p class="text-[8px] font-black uppercase text-slate-400">Asesores</p>
                    <p id="txtAsesores" class="text-xl font-black text-slate-800">0</p>
                </div>
                <div class="card-stat bg-emerald-600 text-white p-4 rounded-3xl shadow-lg border-b-4 border-emerald-800 text-center">
                    <p class="text-[8px] font-black uppercase opacity-70">Venta Hoy</p>
                    <p id="gananciaHoy" class="text-xl font-black">$0.00</p>
                </div>
                <div class="card-stat bg-blue-600 text-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-800 text-center">
                    <p class="text-[8px] font-black uppercase opacity-70">Pendientes</p>
                    <p id="contadorPendientes" class="text-xl font-black">0</p>
                </div>
            </div>
        </header>

        <div class="flex flex-wrap gap-3 mb-12">
            <a href="admin/asesores" class="bg-purple-600 hover:bg-purple-700 text-white font-black uppercase italic text-[11px] px-6 py-4 rounded-2xl shadow-xl transition-all">👥 Control Asesores</a>
            <a href="admin/corte.html" class="bg-slate-800 text-white px-6 py-4 rounded-2xl font-black uppercase italic text-[11px] shadow-lg transition-all hover:bg-slate-900">📦 Corte e Inventario</a>
            <button onclick="window.enviarCorteWhatsApp()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-black uppercase italic text-[11px] px-6 py-4 rounded-2xl shadow-xl transition-all">📱 WhatsApp Corte</button>
        </div>

        <section class="mb-12">
            <h2 class="text-xl font-black uppercase italic mb-6 text-slate-700 border-l-4 border-emerald-500 pl-4">Aprobación de Saldo</h2>
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900 text-white text-[10px] uppercase font-black">
                            <tr>
                                <th class="p-5">Asesor (Email)</th>
                                <th class="p-5">Monto</th>
                                <th class="p-5">Comprobante</th>
                                <th class="p-5 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaRecargas"></tbody>
                    </table>
                </div>
            </div>
        </section>
        
        <section>
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-black uppercase italic text-slate-700 border-l-4 border-blue-600 pl-4">Solicitudes</h2>
                    <button onclick="window.filtrarSoloPendientes()" class="btn-filter shadow-lg">🟠 Solo Pendientes</button>
                    <div class="flex gap-2">
                        <button id="btnPrev" class="nav-pag" disabled>Anterior</button>
                        <button id="btnNext" class="nav-pag">Siguiente</button>
                    </div>
                </div>
                <input type="text" id="buscador" onkeyup="window.buscarGlobal()" placeholder="BUSCAR TRÁMITE O CURP..." class="w-full md:w-80 p-3 rounded-2xl border border-slate-300 shadow-sm text-[10px] font-bold outline-none uppercase">
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900 text-white text-[10px] uppercase font-black italic">
                            <tr>
                                <th class="p-4">Origen</th>
                                <th class="p-4">Trámite</th>
                                <th class="p-4">Asesor / Cliente / Datos</th>
                                <th class="p-4 text-center">Estatus</th>
                                <th class="p-4 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaSolicitudes" class="text-xs font-medium"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="modalSubir" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-4 uppercase italic">Subir Resultado</h2>
            <p id="txtFolio" class="text-blue-600 font-bold mb-6 text-[10px] uppercase"></p>
            <input type="file" id="inputArchivo" class="block w-full text-xs mb-6 border p-2 rounded-lg">
            <button id="btnGuardar" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg">Subir y Terminar</button>
            <button onclick="window.cerrarModal()" class="mt-4 text-slate-400 font-black text-[10px] uppercase italic">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, increment, getDoc, limit, serverTimestamp, startAfter, limitToLast, endBefore, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CLOUD_NAME = "de5abnhul"; 
        const UPLOAD_PRESET = "dpr_uploads";
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

        let firstDoc = null, lastDoc = null, pageNumber = 1;
        const PAGE_SIZE = 20; 
        let idTramiteActual = "";
        window.solicitudesCache = {};

        const hoyStr = new Date().toISOString().split('T')[0];
        onSnapshot(doc(db, "visitas_diarias", hoyStr), (d) => { document.getElementById('txtVisitas').innerText = d.exists() ? d.data().contador : 0; });
        onSnapshot(collection(db, "asesores"), (snap) => { document.getElementById('txtAsesores').innerText = snap.size; });
        
        onSnapshot(collection(db, "solicitudes"), (snap) => {
            let totalHoy = 0, pendientes = 0, hoy = new Date().toLocaleDateString();
            snap.forEach(d => {
                const s = d.data();
                window.solicitudesCache[d.id] = s;
                if(s.estatus === 'En Proceso') pendientes++;
                if(s.fecha?.toDate().toLocaleDateString() === hoy && !s.estatus.includes('Error')) totalHoy += Number(s.costo || 0);
            });
            document.getElementById('contadorPendientes').innerText = pendientes;
            document.getElementById('gananciaHoy').innerText = `$${totalHoy.toFixed(2)}`;
        });

        onSnapshot(query(collection(db, "notificaciones_pago"), where("estatus", "in", ["pendiente", "PENDIENTE"])), (snap) => {
            const t = document.getElementById('tablaRecargas'); t.innerHTML = "";
            if (snap.empty) { t.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-300 font-bold uppercase text-[10px]">No hay recargas pendientes</td></tr>'; return; }
            snap.forEach(d => {
                const r = d.data();
                t.innerHTML += `<tr class="border-b"><td class="p-5 font-bold text-slate-700 text-[11px]">${r.asesorEmail}</td><td class="p-5 font-black text-emerald-600">$${r.monto}</td><td class="p-5"><button onclick="window.open('${r.comprobante}')" class="text-blue-600 underline font-black text-[9px] uppercase">PAGO 📥</button></td><td class="p-5 text-center flex justify-center gap-2"><button onclick="window.validarRecarga('${d.id}', '${r.uid}', ${r.monto}, 'aprobado')" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-black text-[9px] hover:bg-emerald-600 transition">APROBAR</button><button onclick="window.validarRecarga('${d.id}', '${r.uid}', ${r.monto}, 'rechazado')" class="bg-red-500 text-white px-4 py-2 rounded-xl font-black text-[9px] hover:bg-red-600 transition">RECHAZAR</button></td></tr>`;
            });
        });

        window.validarRecarga = async (docId, uid, monto, est) => {
            if (est === 'aprobado') {
                try { await updateDoc(doc(db, "asesores", uid), { saldo: increment(Number(monto)) }); await updateDoc(doc(db, "notificaciones_pago", docId), { estatus: "aprobado" }); alert("✅ Recarga aprobada."); } catch (e) { alert("Error al aprobar."); }
            } else { if(confirm("¿Rechazar reporte?")) await deleteDoc(doc(db, "notificaciones_pago", docId)); }
        };

        // --- FUNCIÓN DE BÚSQUEDA GLOBAL ---
        window.buscarGlobal = async () => {
            const bus = document.getElementById('buscador').value.toUpperCase();
            if (bus.length < 1) return cargarSolicitudes();
            const q = query(collection(db, "solicitudes"), orderBy("fecha", "desc"), limit(200));
            const snap = await getDocs(q);
            renderizarTablaPersonalizada(snap.docs.filter(d => JSON.stringify(d.data()).toUpperCase().includes(bus)));
        };

        // --- FUNCIÓN DE SOLO PENDIENTES ---
        window.filtrarSoloPendientes = async () => {
            const q = query(collection(db, "solicitudes"), where("estatus", "==", "En Proceso"), orderBy("fecha", "desc"), limit(100));
            const snap = await getDocs(q);
            renderizarTablaPersonalizada(snap.docs);
        };

        async function cargarSolicitudes(comando = 'next') {
            const baseQuery = collection(db, "solicitudes");
            let q;
            if (comando === 'next' && lastDoc) q = query(baseQuery, orderBy("fecha", "desc"), startAfter(lastDoc), limit(PAGE_SIZE));
            else if (comando === 'prev' && firstDoc) q = query(baseQuery, orderBy("fecha", "desc"), endBefore(firstDoc), limitToLast(PAGE_SIZE));
            else q = query(baseQuery, orderBy("fecha", "desc"), limit(PAGE_SIZE));
            const snap = await getDocs(q);
            if (snap.empty) return;
            firstDoc = snap.docs[0];
            lastDoc = snap.docs[snap.docs.length - 1];
            renderizarTablaPersonalizada(snap.docs);
            document.getElementById('btnPrev').disabled = (pageNumber === 1);
        }

        function renderizarTablaPersonalizada(docsArray) {
            const tabla = document.getElementById('tablaSolicitudes'); tabla.innerHTML = "";
            docsArray.forEach(docSnap => {
                const s = typeof docSnap.data === 'function' ? docSnap.data() : docSnap;
                const id = docSnap.id;
                const fStr = s.fecha?.toDate().toLocaleString('es-MX', {hour:'2-digit', minute:'2-digit'}) || '...';
                
                let detallesHtml = "";
                const curpVal = s.curp || s.curp_p || "";
                const nssVal = s.nss || s.nss_p || "";
                const rfcVal = s.rfc || s.rfc_p || "";
                const idcifVal = s.idcif || s.idcif_p || "";
                const passNuevaVal = s.pass_nueva || "";
                const cfeVal = s.num_servicio || "";
                const fechaNacVal = s.fecha_nacimiento || s.fecha_p || "";
                const plazoVal = s.plazo_mejoravit || "";

                if(curpVal && curpVal !== "N/A") detallesHtml += `<div class="text-[9px] text-blue-600 font-black uppercase">CURP: ${curpVal}</div>`;
                if(nssVal && nssVal !== "N/A") detallesHtml += `<div class="text-[9px] text-slate-500 font-black uppercase">NSS: ${nssVal}</div>`;
                if(plazoVal) detallesHtml += `<div class="text-[9px] text-emerald-600 font-black uppercase bg-emerald-50 px-1 rounded inline-block">PLAZO: ${plazoVal}</div>`;
                if(rfcVal && rfcVal !== "N/A") detallesHtml += `<div class="text-[9px] text-emerald-600 font-black uppercase">RFC: ${rfcVal}</div>`;
                if(idcifVal) detallesHtml += `<div class="text-[9px] text-purple-600 font-black uppercase bg-purple-50 px-1 rounded inline-block ml-1">IDCIF: ${idcifVal}</div>`;
                if(cfeVal) detallesHtml += `<div class="text-[9px] text-blue-800 font-black uppercase bg-blue-50 px-1 rounded inline-block">CFE: ${cfeVal}</div>`;
                if(passNuevaVal) detallesHtml += `<div class="text-[9px] text-orange-600 font-black uppercase bg-orange-50 px-1 rounded inline-block">NUEVA PASS: ${passNuevaVal}</div>`;
                if(fechaNacVal) detallesHtml += `<div class="text-[9px] text-orange-600 font-black uppercase border border-orange-100 px-1 rounded inline-block">FECHA NAC: ${fechaNacVal}</div>`;
                if(s.pass_afore) detallesHtml += `<div class="text-[9px] text-red-600 font-black uppercase bg-red-50 px-1 rounded inline-block mt-0.5">PASS: ${s.pass_afore}</div>`;

                let btnDescargas = '';
                const fotos = [{l:'INE F',u:s.file_ine_f}, {l:'INE R',u:s.file_ine_r}, {l:'FOTO',u:s.file_selfie}, {l:'EDO CTA',u:s.file_edocta}];
                fotos.forEach(f => { if(f.u) btnDescargas += `<button onclick="window.open('${f.u}')" class="bg-purple-600 text-white px-2 py-0.5 rounded text-[7px] font-black mr-1 uppercase mb-1 italic">${f.l} 📥</button>`; });

                tabla.innerHTML += `<tr class="border-b hover:bg-blue-50 transition"><td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase badge-portal">Portal</span></td><td class="p-4"><div class="font-black text-slate-700 uppercase leading-none mb-1">${s.tipo}</div><div class="text-[8px] text-slate-400 font-bold">${fStr}</div></td><td class="p-4"><div class="font-black text-slate-900 uppercase text-[10px] mb-1">${s.nombre_asesor || 'S/N'}</div>${s.cliente_nombre ? `<div class="text-[9px] font-bold text-slate-500 uppercase border-b border-slate-100 mb-1 pb-0.5">Cliente: ${s.cliente_nombre}</div>` : ''}${detallesHtml}</td><td class="p-4 text-center"><select onchange="window.cambiarEstatus('${id}', this.value)" class="border rounded p-1 font-black text-[9px] uppercase bg-slate-50 outline-none"><option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option><option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option><option value="Error de Datos: LIMITE ALCANZADO" ${s.estatus.includes('LIMITE') ? 'selected' : ''}>❌ LIMITE DE CONSULTAS</option><option value="Error de Datos: NO ENCONTRADO" ${s.estatus.includes('NO ENCONTRADO') ? 'selected' : ''}>❌ NO ENCONTRADO</option><option value="Error de Datos: DATOS INCORRECTOS" ${s.estatus.includes('DATOS INCORRECTOS') ? 'selected' : ''}>❌ ERROR EN NSS O CURP</option><option value="Error de Datos: FOTOS ILEGIBLES" ${s.estatus.includes('ILEGIBLES') ? 'selected' : ''}>❌ FOTOS ILEGIBLES</option><option value="Error de Datos: ERROR AL INVOCAR" ${s.estatus.includes('INVOCAR') ? 'selected' : ''}>❌ ERROR AL INVOCAR SERVICIO</option><option value="Error de Datos: IMSS TARDE" ${s.estatus.includes('IMSS TARDE') ? 'selected' : ''}>❌ ERROR IMSS CONSULTA TARDE</option><option value="Error de Datos: CONTRASEÑA INCORRECTA" ${s.estatus.includes('CONTRASEÑA') ? 'selected' : ''}>❌ CONTRASEÑA INCORRECTA</option><option value="Error de Datos: NO VINCULADO" ${s.estatus.includes('VINCULADO') ? 'selected' : ''}>❌ NSS NO VINCULADO</option><option value="Error de Datos: INCONSISTENCIAS" ${s.estatus.includes('INCONSISTENCIAS') ? 'selected' : ''}>❌ INCONSISTENCIAS / SUBDELEGACIÓN</option></select></td><td class="p-4 text-right"><div class="flex flex-wrap justify-end mb-2">${btnDescargas}</div><button onclick="window.abrirSubida('${id}', '${s.tipo}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black uppercase text-[9px] hover:bg-blue-700 transition shadow-sm">Subir</button></td></tr>`;
            });
        }

        window.cambiarEstatus = async (id, est) => {
            const docRef = doc(db, "solicitudes", id);
            if (est.includes("Error")) {
                const snap = await getDoc(docRef);
                const s = snap.data();
                if (s && s.asesor_uid && s.costo > 0) { await updateDoc(doc(db, "asesores", s.asesor_uid), { saldo: increment(Number(s.costo)) }); alert("⚠️ Reembolsado."); }
            }
            await updateDoc(docRef, { estatus: est });
        };

        window.abrirSubida = (id, tipo) => { idTramiteActual = id; document.getElementById('modalSubir').classList.remove('hidden'); document.getElementById('txtFolio').innerText = "ENTREGA: " + tipo; };
        window.cerrarModal = () => document.getElementById('modalSubir').classList.add('hidden');

        document.getElementById('btnGuardar').onclick = async () => {
            const file = document.getElementById('inputArchivo').files[0];
            if(!file || !idTramiteActual) return alert("Selecciona un archivo.");
            const btn = document.getElementById('btnGuardar'); btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            try {
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                const data = await res.json();
                await updateDoc(doc(db, "solicitudes", idTramiteActual), { archivoFinal: data.secure_url, estatus: "Terminado" });
                alert("✅ Entregado con éxito."); window.cerrarModal(); 
                firstDoc = null; lastDoc = null; pageNumber = 1; cargarSolicitudes();
            } catch(e) { alert("Error al subir."); }
            finally { btn.innerText = "Subir y Terminar"; btn.disabled = false; }
        };

        window.enviarCorteWhatsApp = () => { window.open(`https://wa.me/528131983700?text=*CORTE DPR*%0A💰 *Venta Hoy:* ${document.getElementById('gananciaHoy').innerText}`); };
        document.getElementById('btnNext').onclick = () => { pageNumber++; cargarSolicitudes('next'); };
        document.getElementById('btnPrev').onclick = () => { pageNumber--; cargarSolicitudes('prev'); };

        cargarSolicitudes();
    </script>
</body>
</html>
