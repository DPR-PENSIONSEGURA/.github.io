<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control Maestro Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .badge-manual { background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
        .badge-portal { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">Panel <span class="text-blue-600">DPR Admin</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gestión Central v4.0</p>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full lg:w-auto">
                <div class="bg-orange-500 text-white p-4 rounded-2xl shadow-lg text-center">
                    <p class="text-[8px] font-black uppercase opacity-70">Venta Hoy</p>
                    <p id="gananciaHoy" class="text-xl font-black">$0.00</p>
                </div>
                <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg text-center">
                    <p class="text-[8px] font-black uppercase opacity-70">Pendientes</p>
                    <p id="contadorPendientes" class="text-xl font-black">0</p>
                </div>
            </div>
        </header>

        <section class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between gap-4">
                <h2 class="text-xl font-black uppercase italic text-slate-700">Solicitudes Recientes</h2>
                <input type="text" id="buscador" onkeyup="window.filtrarTabla()" placeholder="BUSCAR POR NOMBRE, CURP, NSS..." class="p-3 rounded-2xl border border-slate-200 text-[10px] font-bold outline-none uppercase w-full md:w-80 shadow-sm">
            </div>
            <div class="overflow-x-auto max-h-[700px]">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900 sticky top-0 text-white text-[10px] uppercase font-black z-10 italic">
                        <tr>
                            <th class="p-4">Origen</th>
                            <th class="p-4">Trámite</th>
                            <th class="p-4">Asesor / Cliente / Datos</th>
                            <th class="p-4 text-center">Estatus</th>
                            <th class="p-4 text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaSolicitudes" class="text-xs font-medium"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="modalSubir" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-4 uppercase italic">Entregar Resultado</h2>
            <p id="txtFolio" class="text-blue-600 font-bold mb-6 text-[10px] uppercase"></p>
            <input type="file" id="inputArchivo" class="block w-full text-xs mb-6 border p-2 rounded-lg">
            <button id="btnGuardar" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg">Subir y Terminar</button>
            <button onclick="window.cerrarModal()" class="mt-4 text-slate-400 font-black text-[10px] uppercase">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment, deleteDoc, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CLOUD_NAME = "de5abnhul"; 
        const UPLOAD_PRESET = "dpr_uploads";
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

        let todasSolicitudes = [], idTramiteActual = "";
        window.solicitudesCache = {};

        onSnapshot(query(collection(db, "solicitudes"), orderBy("fecha", "desc"), limit(100)), (snap) => {
            let totalHoy = 0, pendientes = 0, hoyStr = new Date().toLocaleDateString();
            todasSolicitudes = [];
            snap.forEach(d => {
                const s = d.data();
                if(s.tipo === "RECARGA ASESOR") return;
                window.solicitudesCache[d.id] = s;
                if(s.estatus === 'En Proceso') pendientes++;
                if(s.fecha?.toDate().toLocaleDateString() === hoyStr && !s.estatus.includes('Error')) totalHoy += Number(s.costo || 0);
                todasSolicitudes.push({ ...s, id: d.id });
            });
            document.getElementById('contadorPendientes').innerText = pendientes;
            document.getElementById('gananciaHoy').innerText = `$${totalHoy.toFixed(2)}`;
            renderizarTabla();
        });

        function renderizarTabla() {
            const tabla = document.getElementById('tablaSolicitudes'); tabla.innerHTML = "";
            todasSolicitudes.forEach(s => {
                const fStr = s.fecha?.toDate().toLocaleString() || '...';
                
                // COMPROBACIÓN DE NSS SEGÚN TU DASHBOARD (Busca nss o nss_p)
                const nssFinal = s.nss || s.nss_p || "N/A";
                const curpFinal = s.curp || s.curp_p || "N/A";

                let detallesHtml = `
                    <div class="text-[10px] text-blue-600 font-black uppercase">CURP: ${curpFinal}</div>
                    <div class="text-[10px] text-slate-800 font-black uppercase bg-slate-100 px-1 rounded inline-block mt-1">NSS: ${nssFinal}</div>
                    ${s.rfc ? `<div class="text-[10px] text-emerald-600 font-black">RFC: ${s.rfc}</div>` : ''}
                    ${s.fecha_nacimiento ? `<div class="text-[9px] text-orange-600 font-bold uppercase">NAC: ${s.fecha_nacimiento}</div>` : ''}
                `;

                let btnDescargas = '';
                const fotos = [{l:'INE F',u:s.file_ine_f},{l:'INE R',u:s.file_ine_r},{l:'FOTO',u:s.file_selfie}];
                fotos.forEach(f => { if(f.u) btnDescargas += `<button onclick="window.open('${f.u}')" class="bg-purple-600 text-white px-2 py-1 rounded text-[7px] font-black mr-1 mb-1 italic">${f.l} 📥</button>`; });

                tabla.innerHTML += `
                    <tr class="border-b hover:bg-blue-50 transition">
                        <td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase badge-portal">Portal</span></td>
                        <td class="p-4"><div class="font-black text-slate-700 uppercase">${s.tipo}</div><div class="text-[8px] text-slate-400">${fStr}</div></td>
                        <td class="p-4">
                            <div class="font-black text-slate-900 uppercase text-[10px] mb-1">${s.nombre_asesor || 'S/N'}</div>
                            ${s.cliente_nombre ? `<div class="text-[9px] font-bold text-slate-500 uppercase border-b border-slate-100 mb-1">Cliente: ${s.cliente_nombre}</div>` : ''}
                            ${detallesHtml}
                        </td>
                        <td class="p-4 text-center">
                            <select onchange="window.cambiarEstatus('${s.id}', this.value)" class="border rounded p-1 font-black text-[9px] uppercase bg-slate-50 outline-none">
                                <option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option>
                                <option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option>
                                <option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ ERROR/DEVOLVER</option>
                                <option value="Límite alcanzado" ${s.estatus === 'Límite alcanzado' ? 'selected' : ''}>❌ LÍMITE DE CONSULTAS</option>
                                <option value="No encontrado" ${s.estatus === 'No encontrado' ? 'selected' : ''}>❌ NO ENCONTRADO</option>
                                <option value="Fotos ilegibles" ${s.estatus === 'Fotos ilegibles' ? 'selected' : ''}>❌ FOTOS ILEGIBLES</option>
                                <option value="Error IMSS" ${s.estatus === 'Error IMSS' ? 'selected' : ''}>❌ ERROR IMSS TARDE</option>
                            </select>
                        </td>
                        <td class="p-4 text-right">
                             <div class="flex flex-wrap justify-end mb-2">${btnDescargas}</div>
                             <button onclick="window.abrirSubida('${s.id}', '${s.tipo}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black uppercase text-[9px] shadow-sm hover:bg-blue-700">Subir</button>
                             <button onclick="window.eliminarSolicitud('${s.id}')" class="text-slate-200 hover:text-red-500 ml-2">✕</button>
                        </td>
                    </tr>`;
            });
        }

        window.cambiarEstatus = async (id, est) => {
            if (est.includes("Error") || est.includes("alcanzado") || est.includes("encontrado") || est.includes("ilegibles")) {
                const s = window.solicitudesCache[id];
                if (s && s.asesor_uid && s.costo > 0) {
                    await updateDoc(doc(db, "asesores", s.asesor_uid), { saldo: increment(Number(s.costo)) });
                    alert("⚠️ SALDO REEMBOLSADO AL ASESOR.");
                }
            }
            await updateDoc(doc(db, "solicitudes", id), { estatus: est });
        };

        window.abrirSubida = (id, tipo) => { idTramiteActual = id; document.getElementById('txtFolio').innerText = "ENTREGA: " + tipo; document.getElementById('modalSubir').classList.remove('hidden'); };
        window.cerrarModal = () => document.getElementById('modalSubir').classList.add('hidden');

        document.getElementById('btnGuardar').onclick = async () => {
            const file = document.getElementById('inputArchivo').files[0];
            if(!file) return alert("Selecciona archivo.");
            const btn = document.getElementById('btnGuardar'); btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            try {
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                const data = await res.json();
                await updateDoc(doc(db, "solicitudes", idTramiteActual), { archivoFinal: data.secure_url, estatus: "Terminado" });
                window.cerrarModal(); alert("Entregado con éxito.");
            } catch(e) { alert("Error al subir."); }
            btn.innerText = "Subir y Terminar"; btn.disabled = false;
        };

        window.filtrarTabla = () => {
            const bus = document.getElementById('buscador').value.toUpperCase();
            const filas = document.querySelectorAll('#tablaSolicitudes tr');
            filas.forEach(f => f.style.display = f.innerText.toUpperCase().includes(bus) ? "" : "none");
        };

        window.eliminarSolicitud = async (id) => { if (confirm("¿Eliminar trámite?")) await deleteDoc(doc(db, "solicitudes", id)); };
    </script>
</body>
</html>
