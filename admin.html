<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control Maestro Sincronizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .card-stat { transition: transform 0.2s ease; }
        .card-stat:hover { transform: translateY(-5px); }
        .badge-manual { background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
        .badge-portal { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .filter-btn { padding: 6px 14px; border-radius: 9999px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: all 0.3s; }
        .filter-active { background: #1e293b; color: white; }
        .filter-inactive { background: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">Panel <span class="text-blue-600">DPR Admin</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gestión de Trámites y Saldo</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-full">
                <div class="card-stat bg-emerald-600 text-white p-5 rounded-[2rem] shadow-xl">
                    <div><p class="text-[9px] font-black uppercase opacity-70">Venta Hoy</p><p id="gananciaHoy" class="text-2xl font-black">$0.00</p></div>
                </div>
                <div class="card-stat bg-blue-600 text-white p-5 rounded-[2rem] shadow-xl">
                    <div><p class="text-[9px] font-black uppercase opacity-70">Pendientes</p><p id="contadorPendientes" class="text-2xl font-black">0</p></div>
                </div>
            </div>
            <a href="admin/corte.html" class="bg-slate-800 text-white px-6 py-3 rounded-2xl font-black uppercase italic text-[11px] shadow-lg">📦 Corte e Inventario</a>
        </header>

        <section class="mb-12">
            <h2 class="text-xl font-black uppercase italic mb-6 text-slate-700 border-l-4 border-emerald-500 pl-4">Aprobación de Saldo</h2>
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900 text-white text-[10px] uppercase font-black">
                            <tr><th class="p-5">Asesor (Email)</th><th class="p-5">Monto</th><th class="p-5">Comprobante</th><th class="p-5 text-center">Acciones</th></tr>
                        </thead>
                        <tbody id="tablaRecargas"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section>
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-xl font-black uppercase italic text-slate-700 border-l-4 border-blue-600 pl-4">Solicitudes Recibidas</h2>
                <div class="flex gap-1 bg-slate-200 p-1 rounded-full scale-90">
                    <button onclick="window.cambiarFiltro('TODAS')" id="filterTODAS" class="filter-btn filter-active">Todas</button>
                    <button onclick="window.cambiarFiltro('MANUAL')" id="filterMANUAL" class="filter-btn filter-inactive">Venta Manual</button>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto max-h-[700px]">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900 sticky top-0 text-white text-[10px] uppercase font-black z-10">
                            <tr>
                                <th class="p-4">Origen</th>
                                <th class="p-4">Trámite</th>
                                <th class="p-4">Asesor / Cliente / Datos</th>
                                <th class="p-4 text-center">Estatus</th>
                                <th class="p-4 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaSolicitudes" class="text-xs font-medium"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, increment, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let filtroActual = "TODAS", todasSolicitudes = [];

        // --- RECARGAS (Email del asesor) ---
        onSnapshot(query(collection(db, "notificaciones_pago"), where("estatus", "==", "pendiente")), (snap) => {
            const t = document.getElementById('tablaRecargas'); t.innerHTML = "";
            snap.forEach(d => {
                const r = d.data();
                t.innerHTML += `<tr class="border-b">
                    <td class="p-5 font-bold">${r.asesorEmail}</td>
                    <td class="p-5 font-black text-emerald-600">$${r.monto}</td>
                    <td class="p-5"><button onclick="window.open('${r.comprobante}')" class="text-blue-600 underline font-black text-[9px]">PAGO 📥</button></td>
                    <td class="p-5 text-center flex justify-center gap-2">
                        <button onclick="window.validarRecarga('${d.id}', '${r.uid}', ${r.monto}, 'aprobado')" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-black text-[9px]">APROBAR</button>
                    </td></tr>`;
            });
        });

        window.validarRecarga = async (docId, uid, monto, est) => {
            await updateDoc(doc(db, "asesores", uid), { saldo: increment(Number(monto)) });
            await updateDoc(doc(db, "notificaciones_pago", docId), { estatus: "aprobado" });
        };

        // --- SOLICITUDES (Sincronización con nombre_asesor y cliente_nombre) ---
        onSnapshot(query(collection(db, "solicitudes"), orderBy("fecha", "desc"), limit(100)), (snap) => {
            let totalHoy = 0, pendientes = 0, hoyStr = new Date().toLocaleDateString();
            todasSolicitudes = [];

            snap.forEach(d => {
                const s = d.data();
                if(s.tipo === "RECARGA ASESOR") return;
                if(s.estatus === 'En Proceso') pendientes++;
                if(s.fecha?.toDate().toLocaleDateString() === hoyStr && s.estatus !== 'Error de Datos') totalHoy += Number(s.costo || 0);
                todasSolicitudes.push({ ...s, id: d.id });
            });

            document.getElementById('contadorPendientes').innerText = pendientes;
            document.getElementById('gananciaHoy').innerText = `$${totalHoy.toFixed(2)}`;
            renderizarTabla();
        });

        function renderizarTabla() {
            const tabla = document.getElementById('tablaSolicitudes');
            tabla.innerHTML = "";
            const filtradas = todasSolicitudes.filter(s => {
                const esManual = s.metodo === "Manual" || s.origen === "MANUAL";
                if(filtroActual === "TODAS") return true;
                if(filtroActual === "MANUAL") return esManual;
            });

            filtradas.forEach(s => {
                const esManual = s.metodo === "Manual" || s.origen === "MANUAL";
                
                // Muestra RFC, IDCIF, CURP o NSS según lo que traiga el documento
                let datosHtml = "";
                if(s.curp && s.curp !== "N/A") datosHtml += `<div class="text-[10px] text-blue-600 font-black">CURP: ${s.curp}</div>`;
                if(s.rfc) datosHtml += `<div class="text-[10px] text-emerald-600 font-black">RFC: ${s.rfc}</div>`;
                if(s.idcif) datosHtml += `<div class="text-[10px] text-purple-600 font-black">IDCIF: ${s.idcif}</div>`;
                if(s.nss && s.nss !== "N/A") datosHtml += `<div class="text-[10px] text-slate-500 font-bold">NSS: ${s.nss}</div>`;

                tabla.innerHTML += `
                    <tr class="border-b hover:bg-blue-50 transition">
                        <td class="p-4"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${esManual ? 'badge-manual' : 'badge-portal'}">${esManual ? 'Manual' : 'Portal'}</span></td>
                        <td class="p-4"><div class="font-black text-slate-700 uppercase">${s.tipo}</div><div class="text-[8px] text-slate-400">${s.fecha?.toDate().toLocaleString() || '...'}</div></td>
                        <td class="p-4">
                            <div class="font-black text-slate-900 uppercase text-[10px] mb-1">ASESOR: ${s.nombre_asesor || 'S/N'}</div>
                            ${s.cliente_nombre ? `<div class="text-[9px] font-bold text-slate-500 uppercase border-b mb-1 pb-1">CLIENTE: ${s.cliente_nombre}</div>` : ''}
                            ${datosHtml}
                        </td>
                        <td class="p-4 text-center">
                            <select onchange="window.cambiarEstatus('${s.id}', this.value)" class="border rounded p-1 font-black text-[9px] uppercase bg-slate-50">
                                <option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option>
                                <option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option>
                                <option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ ERROR</option>
                                <option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ LIMITE DE CONSULTAS ALCANZADO</option>
                                <option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ DOCUMENTO INEXISTENTE O NO ENCONTRADO</option>
                                <option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ ERROR EN NSS O CURP</option>
<option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ FOTOS ILEGIBLES</option>
<option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ ERROR AL INVOCAR EL SERVICIO</option>
<option value="Error de Datos" ${s.estatus === 'Error de Datos' ? 'selected' : ''}>❌ ERROR EN IMSS CONSULTA MÁS TARDE</option>
                                
                            </select>
                        </td>
                        <td class="p-4 text-right">
                             <button onclick="window.subirArchivo('${s.id}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black uppercase text-[9px]">Entregar</button>
                        </td>
                    </tr>`;
            });
        }

        window.cambiarFiltro = (f) => {
            filtroActual = f;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.replace('filter-active', 'filter-inactive'));
            document.getElementById('filter' + f).classList.replace('filter-inactive', 'filter-active');
            renderizarTabla();
        };

        window.cambiarEstatus = async (id, est) => { await updateDoc(doc(db, "solicitudes", id), { estatus: est }); };

        window.subirArchivo = async (id) => {
            const url = prompt("Pega el enlace del resultado (PDF/Imagen):");
            if(url) await updateDoc(doc(db, "solicitudes", id), { archivoFinal: url, estatus: "Terminado" });
        };
    </script>
</body>
</html>
