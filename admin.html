<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPR Admin | Control Maestro Seguro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; visibility: hidden; }

.btn-descarga { 
    background: #9333ea; 
    color: white; 
    padding: 10px; 
    border-radius: 12px; 
    font-size: 9px; 
    font-weight: 900; 
    text-transform: uppercase; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 5px; 
    transition: all 0.2s ease; 
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    border: none;
    cursor: pointer;
}
.btn-descarga:hover { background: #7e22ce; transform: scale(1.05); }

.card-stat { transition: all 0.3s ease; border-bottom: 4px solid rgba(0,0,0,0.1); }
.nav-pag { background: #1e293b; color: white; padding: 6px 14px; border-radius: 10px; font-size: 10px; font-weight: 900; }
select.nav-select { background: #fff; border: 2px solid #1e293b; padding: 5px 10px; border-radius: 10px; font-size: 10px; font-weight: 900; }
.seccion-contenido { transition: all 0.3s ease; overflow: hidden; max-height: 20000px; opacity: 1; }
.seccion-cerrada { max-height: 0 !important; opacity: 0; padding: 0 !important; margin: 0 !important; }
.btn-blue { background: #2563eb; color: white; padding: 8px 12px; border-radius: 10px; font-size: 9px; font-weight: 900; }
</style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">

<header class="flex justify-between mb-10">
<h1 class="text-2xl font-black">Panel Admin</h1>
<button onclick="window.abrirCajaFuerte()">🔒</button>
</header>

<table class="w-full text-xs">
<tbody id="tablaSolicitudes"></tbody>
</table>

</div>

<!-- MODAL -->
<div id="modalDetalles" class="hidden fixed inset-0 bg-black/80 flex justify-center items-center">
<div class="bg-white p-6 rounded-xl w-full max-w-2xl">
<div id="contenedorDetalles"></div>
<div id="contenedorCuestionario" class="hidden">
<div id="gridCuestionario"></div>
</div>
<div id="contenedorFotos"></div>
<button onclick="window.cerrarModales()">Cerrar</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment, getDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSy...", projectId: "pensionsegura-9c817" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
const PASS_DIANA = "Sashimi$";
const vPass = prompt("Contraseña Admin:");

if(vPass === PASS_DIANA || vPass === "DPR2026"){
    document.body.style.visibility = "visible";
}else{
    window.location.href="https://pensionsegura.org";
}

/* VARIABLES */
let todasLasSoliCargadas = [];

/* CARGA */
onSnapshot(query(collection(db, "solicitudes"), orderBy("fecha","desc"), limit(500)), (snap)=>{
    todasLasSoliCargadas = [];
    snap.forEach(d=> todasLasSoliCargadas.push({id:d.id,...d.data()}));
    render();
});

function render(){
    const tabla = document.getElementById("tablaSolicitudes");
    tabla.innerHTML = "";

    todasLasSoliCargadas.forEach(s=>{
        tabla.innerHTML += `
        <tr>
            <td>${s.tipo}</td>
            <td>${s.nombre_asesor || ""}</td>
            <td>
                <select onchange="window.cambiarEstatus('${s.id}',this.value)">
                    <option ${s.estatus==="En Proceso"?"selected":""}>En Proceso</option>
                    <option ${s.estatus==="Terminado"?"selected":""}>Terminado</option>
                    <option ${(s.estatus||"").includes("ERR")?"selected":""}>ERR</option>
                </select>
            </td>
            <td>
                <button onclick='window.verDetalles(${JSON.stringify(s)})'>Ver</button>
            </td>
        </tr>`;
    });
}

/* VER DETALLES (ARREGLADO) */
window.verDetalles = (data)=>{
    const cont = document.getElementById("contenedorDetalles");
    cont.innerHTML = "";

    const campos = [
        {l:"Asesor",v:data.nombre_asesor},
        {l:"CURP",v:data.curp},
        {l:"NSS",v:data.nss}
    ];

    campos.forEach(c=>{
        if(c.v){
            cont.innerHTML += `<div><b>${c.l}:</b> ${c.v}</div>`;
        }
    });

    /* CUESTIONARIO */
    const boxQ = document.getElementById('contenedorCuestionario');
    const gridQ = document.getElementById('gridCuestionario');

    if(data.cuestionario){
        boxQ.classList.remove('hidden');
        gridQ.innerHTML="";
        Object.entries(data.cuestionario).forEach(([k,v])=>{
            gridQ.innerHTML += `<div>${k}: ${v}</div>`;
        });
    }else{
        boxQ.classList.add('hidden');
    }

    /* ARCHIVOS */
    const contFotos = document.getElementById('contenedorFotos');
    contFotos.innerHTML="";

    const f = data.detalles_extra || {};

    const fotos = [
        data.file_ine_f || f.file_ine_f,
        data.file_ine_r || f.file_ine_r,
        data.file_selfie || f.file_selfie
    ];

    fotos.forEach(u=>{
        if(u){
            contFotos.innerHTML += `<button onclick="window.open('${u}')">Archivo</button>`;
        }
    });

    document.getElementById("modalDetalles").classList.remove("hidden");
};

window.cerrarModales = ()=>{
    document.getElementById("modalDetalles").classList.add("hidden");
};

window.cambiarEstatus = async (id,val)=>{
    const ref = doc(db,"solicitudes",id);
    await updateDoc(ref,{estatus:val});
};

window.abrirCajaFuerte = ()=>{
    if(prompt("Clave Maestra")==="Sashimi$"){
        alert("Acceso concedido");
    }else{
        alert("Denegado");
    }
};
</script>

</body>
</html>
