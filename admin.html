<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | EMERGENCIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: none; }
        .card-stat { border-bottom: 4px solid rgba(0,0,0,0.1); }
        .nav-pag { background: #1e293b; color: white; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; }
        select { background: #fff; border: 1px solid #cbd5e1; padding: 5px; border-radius: 8px; font-size: 10px; }
        .seccion-cerrada { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="overlayProgreso" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[200] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
            <div class="animate-spin text-4xl mb-4">⚙️</div>
            <h2 class="text-xl font-black text-blue-600 uppercase italic mb-2">Cancelación en Curso</h2>
            <p id="txtProgreso" class="text-sm font-bold text-slate-500 mb-6">Iniciando proceso...</p>
            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                <div id="barraProgreso" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p class="text-[9px] font-black text-red-500 mt-6 uppercase tracking-widest">No cierres esta ventana hasta terminar</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-white italic text-xl">DP</div>
                <h1 class="text-2xl font-black uppercase italic">Panel <span class="text-blue-600">Admin</span></h1>
            </div>
            <div class="flex gap-3">
                <div class="bg-white p-4 rounded-3xl shadow-sm border-b-4 border-orange-500 text-center">
                    <p id="contadorPendientes" class="text-xl font-black">0</p>
                    <p class="text-[8px] font-black text-slate-400 uppercase">En Proceso</p>
                </div>
                <button onclick="window.abrirCajaFuerte()" class="bg-slate-800 text-white p-4 rounded-3xl shadow-lg border-b-4 border-slate-900 text-xl">🔒</button>
            </div>
        </header>

        <section class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
            <div class="p-6 border-b flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-2">
                    <button class="nav-pag" onclick="window.cambiarPag(-1)"> < </button>
                    <span id="txtPagina" class="text-[10px] font-black px-4">PÁGINA 1</span>
                    <button class="nav-pag" onclick="window.cambiarPag(1)"> > </button>
                </div>
                <input type="text" id="buscador" onkeyup="window.buscarGlobal()" placeholder="BUSCAR CURP O ASESOR..." class="p-3 rounded-2xl border text-[10px] font-bold uppercase w-64 shadow-sm outline-none focus:border-blue-600">
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-900 text-white text-[10px] uppercase font-black">
                        <tr><th class="p-4">Origen</th><th class="p-4">Trámite</th><th class="p-4">Datos / Asesor</th><th class="p-4 text-center">Estatus</th><th class="p-4 text-right">Acción</th></tr>
                    </thead>
                    <tbody id="tablaSolicitudes" class="text-[11px]">
                        <tr><td colspan="5" class="p-20 text-center font-black uppercase opacity-20">Cargando base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="modalDetalles" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <button onclick="window.cerrarModalDetalles()" class="absolute top-6 right-8 text-slate-400 text-3xl font-black">&times;</button>
            <h2 class="text-2xl font-black text-blue-600 uppercase italic mb-6 border-b pb-4 text-center">Expediente</h2>
            <div id="contenedorDetalles" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment, getDoc, limit, serverTimestamp, getDocs, Timestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // SEGURIDAD
        if(prompt("DPR SECURITY\nContraseña:") !== "Sashimi$") window.location.href="https://pensionsegura.org";
        else document.body.style.display="block";

        let paginaActual = 1; const LIMITE = 25; 
        let solicitudesRaw = []; 

        // CARGA INICIAL ULTRA-LIGERA
        onSnapshot(query(collection(db, "solicitudes"), orderBy("fecha", "desc"), limit(300)), (snap) => {
            solicitudesRaw = [];
            snap.forEach(d => solicitudesRaw.push({ id: d.id, ...d.data() }));
            renderizarTabla();
            document.getElementById('contadorPendientes').innerText = solicitudesRaw.filter(s => s.estatus === "En Proceso").length;
        });

        function renderizarTabla() {
            const tabla = document.getElementById('tablaSolicitudes');
            tabla.innerHTML = "";
            const inicio = (paginaActual - 1) * LIMITE;
            const items = solicitudesRaw.slice(inicio, inicio + LIMITE);

            items.forEach((s, idx) => {
                const f = s.fecha?.toDate().toLocaleString('es-MX', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) || '...';
                let info = `<div class="font-black text-slate-800 uppercase truncate w-40">${s.nombre_asesor || 'S/N'}</div>`;
                if(s.curp) info += `<div class="text-[9px] text-blue-600 font-bold">CURP: ${s.curp}</div>`;
                if(s.nss) info += `<div class="text-[9px] text-slate-500 font-bold">NSS: ${s.nss}</div>`;
                if(s.sueldo_mensual) info += `<div class="text-[9px] text-orange-600 font-black">SUELDO: $${s.sueldo_mensual}</div>`;

                tabla.innerHTML += `<tr class="border-b hover:bg-slate-50">
                    <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded-full font-black text-[8px] uppercase">${s.origen || 'Portal'}</span></td>
                    <td class="p-4"><b>${s.tipo}</b><br><span class="text-[8px] text-slate-400 font-bold italic">${f}</span></td>
                    <td class="p-4">${info}</td>
                    <td class="p-4 text-center">
                        <select onchange="window.cambiarEstatus('${s.id}', this.value)" class="text-[9px] font-black border bg-white">
                            <option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option>
                            <option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option>
                            <option value="Error: DATOS INCORRECTOS" ${s.estatus.includes('DATOS') ? 'selected' : ''}>❌ REEMBOLSO: DATOS</option>
                        </select>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="window.verDetalles(${inicio + idx})" class="bg-blue-100 text-blue-600 p-2 rounded-lg text-lg">👁️</button>
                    </td>
                </tr>`;
            });
            document.getElementById('txtPagina').innerText = `PÁGINA ${paginaActual}`;
        }

        window.cambiarPag = (dir) => { paginaActual += dir; if(paginaActual < 1) paginaActual = 1; renderizarTabla(); };
        window.cerrarModalDetalles = () => document.getElementById('modalDetalles').classList.add('hidden');

        window.verDetalles = (idx) => {
            const s = solicitudesRaw[idx];
            const cont = document.getElementById('contenedorDetalles');
            cont.innerHTML = "";
            const campos = [
                {l:"Asesor", v:s.nombre_asesor}, {l:"Cliente", v:s.cliente_nombre}, {l:"Trámite", v:s.tipo},
                {l:"CURP", v:s.curp}, {l:"NSS", v:s.nss}, {l:"RFC", v:s.rfc}, {l:"IDCIF", v:s.idcif},
                {l:"Sueldo", v:s.sueldo_mensual}, {l:"Correo Respaldo", v:s.correo_respaldo}, {l:"Notas", v:s.notas}
            ];
            campos.forEach(c => { if(c.v) cont.innerHTML += `<div class="bg-slate-50 p-3 rounded-2xl border"><p class="text-[8px] text-slate-400 font-black uppercase">${c.l}</p><p class="text-[11px] font-bold text-slate-800 uppercase">${c.v}</p></div>`; });
            document.getElementById('modalDetalles').classList.remove('hidden');
        };

        window.cambiarEstatus = async (id, est) => {
            const ref = doc(db, "solicitudes", id);
            if(est.includes("Error")) {
                const s = (await getDoc(ref)).data();
                if(!s.reembolsado && s.costo > 0) {
                    await updateDoc(doc(db, "asesores", s.asesor_uid), { saldo: increment(Number(s.costo)) });
                    await updateDoc(ref, { estatus: est, reembolsado: true });
                    alert("Reembolso OK");
                }
            } else { await updateDoc(ref, { estatus: est }); }
        };

        // --- FUNCIÓN DE CANCELACIÓN MASIVA ANTI-ERROR ---
        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        window.ejecutarCancelacionMasiva = async () => {
            if(!confirm("⚠️ EMERGENCIA DIANA\n\n¿Cancelar TODAS las Semanas Cotizadas desde las 4 PM y devolver el dinero?\n\nEl proceso será uno por uno para no marcar error.")) return;
            
            const hoy = new Date(); hoy.setHours(16,0,0,0);
            const overlay = document.getElementById('overlayProgreso');
            const txt = document.getElementById('txtProgreso');
            const barra = document.getElementById('barraProgreso');

            try {
                const q = query(collection(db, "solicitudes"), 
                    where("tipo", "==", "Semanas Cotizadas"), 
                    where("estatus", "==", "En Proceso"), 
                    where("fecha", ">=", Timestamp.fromDate(hoy))
                );
                
                const snap = await getDocs(q);
                if(snap.empty) return alert("Nada por cancelar.");
                
                overlay.classList.remove('hidden');
                let count = 0;
                const total = snap.docs.length;

                for(const docSnap of snap.docs) {
                    const d = docSnap.data();
                    count++;
                    txt.innerText = `Procesando: ${count} de ${total}`;
                    barra.style.width = `${(count/total)*100}%`;

                    try {
                        // 1. Reembolsar si no se ha hecho
                        if(d.asesor_uid && !d.reembolsado) {
                            await updateDoc(doc(db, "asesores", d.asesor_uid), { saldo: increment(Number(d.costo)) });
                        }
                        // 2. Marcar como error
                        await updateDoc(doc(db, "solicitudes", docSnap.id), { 
                            estatus: "Error: ERROR FATAL EN IMSS", 
                            reembolsado: true 
                        });
                        
                        // 3. ESPERA DE SEGURIDAD (500ms) - Esto es lo que evita el error de conexión
                        await sleep(500);

                    } catch (err) { console.error("Fallo en ID:", docSnap.id); }
                }
                
                alert(`✅ Éxito total: ${count} trámites reembolsados.`);
                overlay.classList.add('hidden');
            } catch(e) { 
                alert("Error de conexión con Firebase. Revisa tu internet."); 
                overlay.classList.add('hidden');
            }
        };

        const btnM = document.createElement("button");
        btnM.innerHTML = "⚠️ CANCELAR 4PM";
        btnM.style = "position:fixed; bottom:20px; right:20px; background:red; color:white; font-weight:black; padding:15px; border-radius:20px; z-index:100; font-size:9px; cursor:pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); border:none;";
        btnM.onclick = window.ejecutarCancelacionMasiva; document.body.appendChild(btnM);

    </script>
</body>
</html>
