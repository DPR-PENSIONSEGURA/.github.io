<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control Maestro Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: none; }
        .card-stat { transition: all 0.3s ease; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .nav-pag { background: #1e293b; color: white; padding: 6px 14px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .btn-filter { background: #F97316; color: white; padding: 10px 20px; border-radius: 15px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: all 0.3s; }
        .btn-sec { background: white; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 12px; font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; transition: all 0.2s; }
        select.nav-select { background: #fff; border: 2px solid #1e293b; color: #1e293b; padding: 5px 10px; border-radius: 10px; font-size: 10px; font-weight: 900; outline: none; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-white shadow-lg italic text-xl">DP</div>
                <div>
                    <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">Panel <span class="text-blue-600">Admin</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">DPR Consultoría Executive</p>
                </div>
            </div>
            <div class="flex gap-4 w-full lg:w-auto">
                <div class="card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-orange-500 text-center flex-1"><p id="txtVisitas" class="text-xl font-black">0</p></div>
                <div class="card-stat bg-blue-600 text-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-800 text-center flex-1"><p id="contadorPendientes" class="text-xl font-black">0</p></div>
                <button onclick="window.abrirCajaFuerte()" class="card-stat bg-slate-800 text-white p-4 rounded-3xl shadow-lg border-b-4 border-slate-900 text-center flex-1"><p class="text-xl font-black">🔒</p></button>
            </div>
        </header>

        <section class="mb-12">
            <h2 class="text-xl font-black uppercase italic mb-6 text-slate-700 border-l-4 border-emerald-500 pl-4">Aprobación de Saldo</h2>
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto"><table class="w-full text-left"><tbody id="tablaRecargas"></tbody></table></div>
            </div>
        </section>
        
        <section>
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-black uppercase italic text-slate-700 border-l-4 border-blue-600 pl-4">Solicitudes</h2>
                    <div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border">
                        <button id="btnPrev" class="nav-pag"> < </button>
                        <select id="selectorPagina" onchange="window.cambiarPaginaDirecto(this.value)" class="nav-select"></select>
                        <button id="btnNext" class="nav-pag"> > </button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="date" id="filtroFecha" onchange="window.buscarPorFecha()" class="p-3 rounded-2xl border text-[10px] font-black uppercase">
                    <input type="text" id="buscador" onkeyup="window.buscarGlobal()" placeholder="BUSCAR CURP O CORREO..." class="p-3 rounded-2xl border text-[10px] font-black uppercase">
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900 text-white text-[10px] uppercase font-black italic">
                            <tr><th class="p-4">Origen</th><th class="p-4">Trámite</th><th class="p-4">Asesor / Datos</th><th class="p-4 text-center">Estatus</th><th class="p-4 text-right">Acción</th></tr>
                        </thead>
                        <tbody id="tablaSolicitudes" class="text-xs font-medium"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="modalDetalles" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <button onclick="document.getElementById('modalDetalles').classList.add('hidden')" class="absolute top-6 right-8 text-slate-400 text-3xl">&times;</button>
            <h2 class="text-2xl font-black text-blue-600 uppercase mb-6 border-b pb-4">Detalles Completos</h2>
            <div id="contenedorDetalles" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-[11px]"></div>
        </div>
    </div>

    <div id="modalSubir" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-4 uppercase">Subir Resultado</h2>
            <input type="file" id="inputArchivo" class="block w-full text-xs mb-6 border p-2 rounded-lg">
            <button id="btnGuardar" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Subir y Terminar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, increment, getDoc, limit, serverTimestamp, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PASS_DIANA = "Sashimi$";
        const PASS_ASISTENTE = "DPR2026";

        const vPass = prompt("Contraseña:");
        if(vPass === PASS_DIANA || vPass === PASS_ASISTENTE) { document.body.style.display="block"; } else { window.location.href="https://pensionsegura.org"; }

        const CLOUD_NAME = "de5abnhul"; const UPLOAD_PRESET = "dpr_uploads";
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

        let currentPage = 1; const PAGE_SIZE = 20; let idTramiteActual = "";

        const selector = document.getElementById('selectorPagina');
        for(let i=1; i<=50; i++) selector.innerHTML += `<option value="${i}">Página ${i}</option>`;
        window.cambiarPaginaDirecto = (p) => { currentPage = parseInt(p); cargarSolicitudes(currentPage); };

        window.cargarSolicitudes = async (pagina = 1) => {
            const baseQuery = collection(db, "solicitudes");
            const q = query(baseQuery, orderBy("fecha", "desc"), limit(PAGE_SIZE * pagina));
            const snap = await getDocs(q);
            const docs = snap.docs.slice((pagina - 1) * PAGE_SIZE, pagina * PAGE_SIZE);
            renderizarTablaPersonalizada(docs);
        };

        function renderizarTablaPersonalizada(docsArray) {
            const tabla = document.getElementById('tablaSolicitudes'); tabla.innerHTML = "";
            docsArray.forEach(docSnap => {
                const s = docSnap.data(); const id = docSnap.id;
                const fStr = s.fecha?.toDate().toLocaleString('es-MX', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) || '...';
                
                // AJUSTE: Eliminamos S/N y mostramos Correo del Asesor
                let infoAsesor = `<div class="font-black text-slate-800 text-[10px] uppercase truncate w-48">${s.nombre_asesor || 'S/E'}</div>`;
                if(s.curp) infoAsesor += `<div class="text-[9px] text-blue-600 font-bold uppercase">CURP: ${s.curp}</div>`;
                if(s.nss) infoAsesor += `<div class="text-[9px] text-slate-500 font-bold uppercase">NSS: ${s.nss}</div>`;

                tabla.innerHTML += `<tr class="border-b hover:bg-blue-50 transition">
                    <td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${s.origen === 'PROVEEDOR' ? 'bg-orange-100 text-orange-700' : 'badge-portal'}">${s.origen || 'Portal'}</span></td>
                    <td class="p-4"><div class="font-black text-slate-700 uppercase leading-none text-[10px] mb-1">${s.tipo}</div><div class="text-[8px] text-slate-400 font-bold">${fStr}</div></td>
                    <td class="p-4">${infoAsesor}</td>
                    <td class="p-4 text-center">
                        <select onchange="window.cambiarEstatus('${id}', this.value)" class="border rounded p-1 font-black text-[9px] uppercase bg-slate-50 outline-none">
                            <option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option>
                            <option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option>
                            <option value="Error: NSS O CURP INCORRECTO" ${s.estatus.includes('NSS O CURP') ? 'selected' : ''}>❌ ERROR DATOS</option>
                            <option value="Error: FOTOS ILEGIBLES" ${s.estatus.includes('ILEGIBLES') ? 'selected' : ''}>❌ FOTOS ILEGIBLES</option>
                            <option value="Error: DOCUMENTO INEXISTENTE" ${s.estatus.includes('INEXISTENTE') ? 'selected' : ''}>❌ NO EXISTE</option>
                            <option value="Error: LIMITE DE CONSULTAS" ${s.estatus.includes('LIMITE') ? 'selected' : ''}>❌ LIMITE ALCANZADO</option>
                        </select>
                    </td>
                    <td class="p-4 text-right space-x-1">
                        <button onclick='window.verDetalles(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="bg-blue-100 text-blue-600 p-2 rounded-lg text-[12px] hover:bg-blue-600 hover:text-white transition">👁️</button>
                        <button onclick="window.abrirSubida('${id}', '${s.tipo}')" class="bg-blue-600 text-white px-3 py-2 rounded-lg font-black text-[9px] uppercase">Subir</button>
                    </td>
                </tr>`;
            });
        }

        window.verDetalles = (data) => {
            const cont = document.getElementById('contenedorDetalles'); cont.innerHTML = "";
            const campos = [{l:"Asesor", v:data.nombre_asesor}, {l:"Cliente", v:data.cliente_nombre}, {l:"Trámite", v:data.tipo}, {l:"CURP", v:data.curp}, {l:"NSS", v:data.nss}, {l:"RFC", v:data.rfc}, {l:"IDCIF", v:data.idcif}, {l:"Ocupación", v:data.ocupacion}, {l:"Notas", v:data.notas}, {l:"Extras", v:data.extras_sindo}];
            campos.forEach(c => { if(c.v) cont.innerHTML += `<div class="bg-slate-50 p-3 rounded-xl border"><p class="text-[8px] text-slate-400 font-black uppercase">${c.l}</p><p class="text-[11px] font-bold text-slate-800 uppercase">${c.v}</p></div>`; });
            const fotos = [{l:"INE F", u:data.file_ine_f}, {l:"INE R", u:data.file_ine_r}, {l:"FOTO", u:data.file_selfie}, {l:"DOMICILIO", u:data.file_comp_domicilio}, {l:"EDO CTA", u:data.file_edocta}];
            let fHtml = `<div class="col-span-full mt-4 grid grid-cols-2 md:grid-cols-3 gap-3">`;
            fotos.forEach(f => { if(f.u) fHtml += `<button onclick="window.open('${f.u}')" class="bg-purple-600 text-white p-2 rounded-xl font-black text-[9px] uppercase italic">${f.l} 📥</button>`; });
            cont.innerHTML += fHtml + `</div>`;
            document.getElementById('modalDetalles').classList.remove('hidden');
        };

        window.cambiarEstatus = async (id, est) => {
            const docRef = doc(db, "solicitudes", id);
            if (est.includes("Error")) {
                const snap = await getDoc(docRef); const s = snap.data();
                if (s?.asesor_uid && s.costo > 0) { 
                    await updateDoc(doc(db, "asesores", s.asesor_uid), { saldo: increment(Number(s.costo)) }); 
                    alert("Reembolso aplicado.");
                }
            }
            await updateDoc(docRef, { estatus: est });
        };

        window.abrirSubida = (id, tipo) => { idTramiteActual = id; document.getElementById('modalSubir').classList.remove('hidden'); };
        
        document.getElementById('btnGuardar').onclick = async () => {
            const file = document.getElementById('inputArchivo').files[0];
            if(!file || !idTramiteActual) return;
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
            const data = await res.json();
            await updateDoc(doc(db, "solicitudes", idTramiteActual), { archivoFinal: data.secure_url, estatus: "Terminado" });
            document.getElementById('modalSubir').classList.add('hidden');
            cargarSolicitudes(currentPage);
        };

        // CONTADORES Y RECARGAS (Mantenemos la lógica de estatus de la unificación anterior)
        onSnapshot(query(collection(db, "notificaciones_pago"), orderBy("fecha", "desc"), limit(15)), (snap) => {
            const t = document.getElementById('tablaRecargas'); t.innerHTML = "";
            snap.forEach(d => {
                const r = d.data(); const id = d.id;
                let bHtml = (r.estatus === 'pendiente') ? `<button onclick="window.validarRecarga('${id}', '${r.uid}', ${r.monto}, 'aprobado')" class="bg-emerald-500 text-white px-2 py-1 rounded font-black text-[8px]">APROBAR</button>` : `<span class="text-[8px] font-black opacity-30">${r.estatus.toUpperCase()}</span>`;
                t.innerHTML += `<tr class="border-b"><td class="p-3 text-[10px]"><b>${r.asesorEmail}</b><br><small>RASTREO: ${r.rastreo || 'N/A'}</small></td><td class="p-3 text-center font-black text-emerald-600">$${r.monto}</td><td class="p-3 text-center"><button onclick="window.open('${r.comprobante}')" class="text-blue-600 underline font-black text-[8px]">VER</button></td><td class="p-3 text-center">${bHtml}</td></tr>`;
            });
        });

        window.validarRecarga = async (docId, uid, monto, est) => {
            await updateDoc(doc(db, "asesores", uid), { saldo: increment(Number(monto)) });
            await updateDoc(doc(db, "notificaciones_pago", docId), { estatus: "aprobado" });
        };

        window.buscarPorFecha = async () => {
            const fi = document.getElementById('filtroFecha').value; if(!fi) return cargarSolicitudes(1);
            const start = new Date(fi + "T00:00:00"); const end = new Date(fi + "T23:59:59");
            const q = query(collection(db, "solicitudes"), where("fecha", ">=", Timestamp.fromDate(start)), where("fecha", "<=", Timestamp.fromDate(end)));
            const snap = await getDocs(q);
            renderizarTablaPersonalizada(snap.docs.sort((a,b) => b.data().fecha - a.data().fecha));
        };

        window.buscarGlobal = async () => {
            const bus = document.getElementById('buscador').value.toUpperCase(); if(bus.length < 1) return cargarSolicitudes(1);
            const snap = await getDocs(query(collection(db, "solicitudes"), limit(300)));
            renderizarTablaPersonalizada(snap.docs.filter(d => JSON.stringify(d.data()).toUpperCase().includes(bus)));
        };

        cargarSolicitudes(1);
    </script>
</body>
</html>
