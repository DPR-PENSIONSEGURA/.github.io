<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPR Admin | Control Maestro Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: none; }
        .card-stat { transition: all 0.3s ease; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .nav-pag { background: #1e293b; color: white; padding: 6px 14px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        select.nav-select { background: #fff; border: 2px solid #1e293b; color: #1e293b; padding: 5px 10px; border-radius: 10px; font-size: 10px; font-weight: 900; outline: none; cursor: pointer; }
        .seccion-contenido { transition: all 0.3s ease-in-out; overflow: hidden; max-height: 5000px; opacity: 1; }
        .seccion-cerrada { max-height: 0 !important; opacity: 0; padding: 0 !important; margin: 0 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-white shadow-lg italic text-xl">DP</div>
                <div>
                    <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">Panel <span class="text-blue-600">Admin</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">DPR Consultoría Executive</p>
                </div>
            </div>
            <div class="flex gap-4 w-full lg:w-auto">
                <div class="card-stat bg-white p-4 rounded-3xl shadow-md border-b-4 border-orange-500 text-center flex-1">
                    <p id="txtVisitas" class="text-xl font-black">0</p>
                </div>
                <div class="card-stat bg-blue-600 text-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-800 text-center flex-1">
                    <p id="contadorPendientes" class="text-xl font-black">0</p>
                </div>
                <button onclick="window.abrirCajaFuerte()" class="card-stat bg-slate-800 text-white p-4 rounded-3xl shadow-lg border-b-4 border-slate-900 text-center flex-1">
                    <p class="text-xl font-black">🔒</p>
                </button>
            </div>
        </header>

        <section>
            <div onclick="window.toggleSeccion('contenidoSolicitudes', 'icoSoli')" class="flex justify-between items-center cursor-pointer bg-slate-200 p-4 rounded-2xl hover:bg-slate-300 transition select-none mb-4">
                <h2 class="text-sm font-black uppercase italic text-slate-700 border-l-4 border-blue-600 pl-4">Solicitudes</h2>
                <div id="icoSoli" class="bg-white w-8 h-8 rounded-full flex items-center justify-center shadow-sm font-black text-slate-400">▼</div>
            </div>

            <div id="contenidoSolicitudes" class="seccion-contenido">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border">
                        <button class="nav-pag" onclick="window.cambiarPaginaPag(-1)"> < </button>
                        <select id="selectorPagina" onchange="window.cambiarPaginaDirecto(this.value)" class="nav-select"></select>
                        <button class="nav-pag" onclick="window.cambiarPaginaPag(1)"> > </button>
                    </div>
                    <input type="text" id="buscador" onkeyup="window.buscarGlobal()" placeholder="BUSCAR CURP, NSS O ASESOR..." class="p-4 rounded-2xl border text-[10px] font-black uppercase w-72 shadow-lg outline-none focus:border-blue-600">
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden text-[9px]">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-900 text-white text-[10px] uppercase font-black italic">
                                <tr><th class="p-4">Origen</th><th class="p-4">Trámite</th><th class="p-4">Información</th><th class="p-4 text-center">Estatus</th><th class="p-4 text-right">Acción</th></tr>
                            </thead>
                            <tbody id="tablaSolicitudes" class="text-xs font-medium"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="modalDetalles" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <button onclick="document.getElementById('modalDetalles').classList.add('hidden')" class="absolute top-6 right-8 text-slate-400 text-3xl font-black">&times;</button>
            <h2 class="text-2xl font-black text-blue-600 uppercase mb-6 border-b pb-4 italic text-center">Expediente DPR</h2>
            <div id="contenedorDetalles" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-[11px]"></div>
        </div>
    </div>

    <div id="modalSubir" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-4 uppercase italic">Subir Resultado Final</h2>
            <input type="file" id="inputArchivo" class="block w-full text-xs mb-6 border p-4 rounded-2xl bg-slate-50">
            <button id="btnGuardar" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700 transition">Subir y Terminar</button>
            <button onclick="document.getElementById('modalSubir').classList.add('hidden')" class="mt-4 text-slate-400 font-black text-[10px] uppercase">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, increment, getDoc, limit, serverTimestamp, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PASS_DIANA = "Sashimi$";
        const vPass = prompt("Contraseña Admin:");
        if(vPass === PASS_DIANA || vPass === "DPR2026") { document.body.style.display="block"; } else { window.location.href="https://pensionsegura.org"; }

        let currentPage = 1; const PAGE_SIZE = 30; 
        let idTramiteActual = "";
        let todasLasSoliCargadas = [];

        // DICCIONARIO DE MENSAJES LARGOS (RESTABLECIDO)
        const LISTA_ERRORES_DPR = {
            "ERR_NSS_CURP": "Error: el curp está mal / mal escrito etc",
            "ERR_INCONSISTENCIAS": "Error: Para inconsistencias puedes acudir a tu subdelegación del IMSS más cercana o hacer el trámite en línea en el siguiente link: https://serviciosdigitales.imss.gob.mx/correcciondatosasegurado-web-ciudadano/wizard/correccionDatosAsegurado/",
            "ERR_FOTOS": "Error: FOTOS ILEGIBLES",
            "ERR_INEXISTENTE": "Error: DOCUMENTO INEXISTENTE O NO ENCONTRADO",
            "ERR_PASS": "Error: CONTRASEÑA INCORRECTA",
            "ERR_LIMITE": "Error: alguien más las consultó intenta más tarde",
            "ERR_IMSS": "Error: ERROR EN IMSS"
        };

        const selector = document.getElementById('selectorPagina');
        for(let i=1; i<=50; i++) selector.innerHTML += `<option value="${i}">Página ${i}</option>`;
        
        window.cambiarPaginaDirecto = (p) => { currentPage = parseInt(p); cargarSolicitudes(currentPage); };
        window.cambiarPaginaPag = (dir) => { let p = currentPage + dir; if(p > 0 && p <= 50) { currentPage = p; selector.value = p; cargarSolicitudes(p); } };
        window.toggleSeccion = (id, ico) => { const c = document.getElementById(id), i = document.getElementById(ico); if(c.classList.contains('seccion-cerrada')){ c.classList.remove('seccion-cerrada'); i.innerText="▼"; } else { c.classList.add('seccion-cerrada'); i.innerText="▶"; } };

        onSnapshot(query(collection(db, "solicitudes"), orderBy("fecha", "desc"), limit(250)), (snap) => {
            todasLasSoliCargadas = [];
            snap.forEach(d => todasLasSoliCargadas.push({ id: d.id, ...d.data() }));
            cargarSolicitudes(currentPage);
            document.getElementById('contadorPendientes').innerText = todasLasSoliCargadas.filter(s => s.estatus === 'En Proceso').length;
        });

        window.cargarSolicitudes = (pagina = 1) => {
            const inicio = (pagina - 1) * PAGE_SIZE;
            renderizarTablaPersonalizada(todasLasSoliCargadas.slice(inicio, inicio + PAGE_SIZE));
        };

        function renderizarTablaPersonalizada(docsArray) {
            const tabla = document.getElementById('tablaSolicitudes'); tabla.innerHTML = "";
            docsArray.forEach(s => {
                const fStr = s.fecha?.toDate().toLocaleString('es-MX', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) || '...';
                
                let info = `<div class="font-black text-slate-800 uppercase truncate w-48">${s.nombre_asesor || 'S/N'}</div>`;
                if(s.curp) info += `<div class="text-[9px] text-blue-600 font-bold uppercase">CURP: ${s.curp}</div>`;
                if(s.nss) info += `<div class="text-[9px] text-slate-500 font-bold uppercase">NSS: ${s.nss}</div>`;
                if(s.pass_afore) info += `<div class="text-[9px] text-red-600 font-black uppercase tracking-tighter">PASS: ${s.pass_afore}</div>`;

                tabla.innerHTML += `<tr class="border-b hover:bg-blue-50 transition">
                    <td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase bg-slate-100">${s.origen || 'Portal'}</span></td>
                    <td class="p-4"><div class="font-black text-slate-700 uppercase text-[10px] mb-1">${s.tipo}</div><div class="text-[8px] text-slate-400 font-bold italic">${fStr}</div></td>
                    <td class="p-4">${info}</td>
                    <td class="p-4 text-center">
                        <select onchange="window.cambiarEstatus('${s.id}', this.value)" class="border rounded p-1 font-black text-[9px] uppercase bg-white shadow-sm outline-none">
                            <option value="En Proceso" ${s.estatus === 'En Proceso' ? 'selected' : ''}>⏳ PROCESO</option>
                            <option value="Terminado" ${s.estatus === 'Terminado' ? 'selected' : ''}>✅ TERMINADO</option>
                            <option value="ERR_NSS_CURP" ${s.estatus.includes('curp está mal') ? 'selected' : ''}>❌ ERR: NSS/CURP</option>
                            <option value="ERR_INCONSISTENCIAS" ${s.estatus.includes('inconsistencias') ? 'selected' : ''}>❌ ERR: INCONSISTENCIAS</option>
                            <option value="ERR_FOTOS" ${s.estatus.includes('FOTOS ILEGIBLES') ? 'selected' : ''}>❌ ERR: FOTOS</option>
                            <option value="ERR_INEXISTENTE" ${s.estatus.includes('INEXISTENTE') ? 'selected' : ''}>❌ ERR: NO EXISTE</option>
                            <option value="ERR_PASS" ${s.estatus.includes('CONTRASEÑA INCORRECTA') ? 'selected' : ''}>❌ ERR: CONTRASEÑA</option>
                            <option value="ERR_LIMITE" ${s.estatus.includes('alguien más las consultó') ? 'selected' : ''}>❌ ERR: LIMITE</option>
                            <option value="ERR_IMSS" ${s.estatus.includes('ERROR EN IMSS') ? 'selected' : ''}>❌ ERR: IMSS</option>
                        </select>
                    </td>
                    <td class="p-4 text-right space-x-1">
                        <button onclick='window.verDetalles(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="bg-blue-100 text-blue-600 p-2 rounded-lg font-black text-[12px]">👁️</button>
                        <button onclick="window.abrirSubida('${s.id}')" class="bg-blue-600 text-white px-3 py-2 rounded-lg font-black text-[9px]">SUBIR</button>
                    </td>
                </tr>`;
            });
        }

        window.cambiarEstatus = async (id, val) => {
            const docRef = doc(db, "solicitudes", id);
            try {
                const snap = await getDoc(docRef), s = snap.data();
                let est = LISTA_ERRORES_DPR[val] || val;

                if (val.startsWith("ERR_") && !s.reembolsado) {
                    await updateDoc(doc(db, "asesores", s.asesor_uid), { saldo: increment(Number(s.costo)) });
                    await updateDoc(docRef, { estatus: est, reembolsado: true });
                    alert(`✅ Reembolso de $${s.costo} aplicado y estatus fijado.`);
                } else { 
                    await updateDoc(docRef, { estatus: est }); 
                }
            } catch (e) { alert("Error al actualizar."); }
        };

        window.verDetalles = (data) => {
            const cont = document.getElementById('contenedorDetalles'); cont.innerHTML = "";
            const campos = [
                {l:"Asesor", v:data.nombre_asesor}, {l:"Cliente", v:data.cliente_nombre}, {l:"Trámite", v:data.tipo},
                {l:"CURP", v:data.curp}, {l:"NSS", v:data.nss}, {l:"RFC", v:data.rfc}, {l:"IDCIF", v:data.idcif},
                {l:"PASS", v:data.pass_afore}, {l:"Sueldo", v:data.sueldo_mensual}, {l:"Notas", v:data.notas}
            ];
            campos.forEach(c => { if(c.v) cont.innerHTML += `<div class="bg-slate-50 p-3 rounded-xl border"><p class="text-[8px] text-slate-400 font-black uppercase">${c.l}</p><p class="text-[11px] font-bold text-slate-800 uppercase">${c.v}</p></div>`; });
            document.getElementById('modalDetalles').classList.remove('hidden');
        };

        window.abrirSubida = (id) => { idTramiteActual = id; document.getElementById('modalSubir').classList.remove('hidden'); };
        
        document.getElementById('btnGuardar').onclick = async () => {
            const f = document.getElementById('inputArchivo').files[0];
            if(!f) return alert("Selecciona archivo");
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', "dpr_uploads");
            const res = await fetch(`https://api.cloudinary.com/v1_1/de5abnhul/auto/upload`, { method: 'POST', body: fd });
            const d = await res.json();
            await updateDoc(doc(db, "solicitudes", idTramiteActual), { archivoFinal: d.secure_url, estatus: "Terminado" });
            document.getElementById('modalSubir').classList.add('hidden');
            alert("Subido con éxito.");
        };

        window.buscarGlobal = () => {
            const bus = document.getElementById('buscador').value.toUpperCase();
            if (bus.length < 1) return cargarSolicitudes(currentPage);
            const filtrados = todasLasSoliCargadas.filter(s => 
                (s.curp && s.curp.includes(bus)) || 
                (s.nss && s.nss.includes(bus)) || 
                (s.nombre_asesor && s.nombre_asesor.toUpperCase().includes(bus))
            );
            renderizarTablaPersonalizada(filtrados);
        };

    </script>
</body>
</html>
