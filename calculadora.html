<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Pro EC0485 | DPR Consultoría</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #F1D299 50%, #B88A44 100%); }
        .card-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-blur: 10px; }
        @media print { .no-print { display: none; } body { background-color: white; color: black; } .card-glass { border: 1px solid #ccc; } }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
    </style>
</head>
<body>

    <div id="pantallaCobro" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-lg rounded-[3rem] p-10 text-center border border-slate-700 shadow-2xl relative overflow-hidden">
            <h2 class="text-2xl font-black text-white uppercase italic mb-2">Herramientas Pro</h2>
            <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] mb-6">✨ Pack Estratégico 2026 ✨</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <button onclick="seleccionarHerramienta('SIMULADOR LEY 73 + EC0485', 60, 'pension')" class="bg-slate-900 p-6 rounded-3xl border-2 border-transparent hover:border-blue-500 transition-all text-left">
                    <p class="text-white font-black text-sm uppercase italic mb-2">Simulador Ley 73 + M40</p>
                    <p class="text-2xl font-black text-white">$60.00</p>
                </button>
                <button onclick="seleccionarHerramienta('CÁLCULO 250 SEMANAS', 25, 'salario')" class="bg-slate-900 p-6 rounded-3xl border-2 border-transparent hover:border-blue-500 transition-all text-left">
                    <p class="text-white font-black text-sm uppercase italic mb-2">Salario Promedio</p>
                    <p class="text-2xl font-black text-white">$25.00</p>
                </button>
            </div>
            <div class="mb-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Mi Saldo: <span id="txtSaldoAsesor" class="text-blue-400">$0.00</span></p>
            </div>
            <button id="btnPagarAcceso" onclick="confirmarCompraHerramienta()" disabled class="w-full gold-gradient py-4 rounded-2xl font-black uppercase italic text-slate-900 opacity-50">Selecciona una opción</button>
        </div>
    </div>

    <div id="root" class="hidden"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [view, setView] = useState(null);
            
            // ESTADOS LEY 73
            const [semanas, setSemanas] = useState(1000);
            const [salarioActual, setSalarioActual] = useState(500);
            const [edad, setEdad] = useState(60);
            const [tieneEsposa, setTieneEsposa] = useState(true);
            const [hijos, setHijos] = useState(0);
            const [mesesSinCotizar, setMesesSinCotizar] = useState(0);

            // ESTADOS M40
            const [usaM40, setUsaM40] = useState(false);
            const [mesesM40, setMesesM40] = useState(12);
            const [salarioM40, setSalarioM40] = useState(2932.75);

            // ESTADOS SALARIO PROMEDIO
            const [filas, setFilas] = useState([{ desde: '', hasta: '', salario: 0 }]);

            useEffect(() => {
                const handleInit = (e) => setView(e.detail);
                window.addEventListener('inicioApp', handleInit);
                return () => window.removeEventListener('inicioApp', handleInit);
            }, []);

            const fmt = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v || 0);

            // CÁLCULO PENSIÓN
            const calculo = useMemo(() => {
                const UMA_2026 = 117.31;
                const PENSION_MINIMA_2026 = 10636.54;
                
                let semsFinales = semanas;
                let salPromedio = salarioActual;

                if (usaM40) {
                    const semsM40 = Math.floor((mesesM40 * 30.4) / 7);
                    semsFinales += semsM40;
                    const semsNuevas = Math.min(250, semsM40);
                    const semsViejas = 250 - semsNuevas;
                    salPromedio = ((salarioM40 * semsNuevas) + (salarioActual * semsViejas)) / 250;
                }

                const relacion = salPromedio / UMA_2026;
                let cBasica = 0.13, iAnual = 0.0245;

                if (relacion <= 1.0) { cBasica = 0.80; iAnual = 0.00563; }
                else if (relacion <= 1.25) { cBasica = 0.7711; iAnual = 0.00814; }
                else if (relacion <= 1.50) { cBasica = 0.5518; iAnual = 0.01178; }
                else if (relacion <= 1.75) { cBasica = 0.4923; iAnual = 0.0143; }
                else if (relacion <= 2.0) { cBasica = 0.4267; iAnual = 0.01615; }
                else if (relacion <= 2.25) { cBasica = 0.3765; iAnual = 0.01756; }
                else if (relacion <= 2.50) { cBasica = 0.3368; iAnual = 0.01868; }

                const cuantiaBAnual = salPromedio * 365 * cBasica;
                const semsExcedentes = Math.max(0, semsFinales - 500);
                const incrementosNum = Math.floor(semsExcedentes / 52);
                const incrementoAnual = salPromedio * 365 * iAnual * incrementosNum;

                const tablaEdad = { 60: 0.75, 61: 0.80, 62: 0.85, 63: 0.90, 64: 0.95, 65: 1.0 };
                const fEdad = tablaEdad[edad] || 1.0;

                let asignacion = (tieneEsposa ? 0.15 : 0.15) + (hijos * 0.10);
                const subTotal = (cuantiaBAnual + incrementoAnual) * fEdad;
                const totalConAsignaciones = subTotal * (1 + asignacion);
                let mensual = (totalConAsignaciones / 12) * 1.11;

                const esMinima = mensual < PENSION_MINIMA_2026;
                mensual = Math.max(mensual, PENSION_MINIMA_2026);

                let necesitaReactivarse = mesesSinCotizar > 12;
                let tiempoReactivacion = "";
                if (mesesSinCotizar > 12 && mesesSinCotizar <= 36) tiempoReactivacion = "Inmediata (Al cotizar)";
                else if (mesesSinCotizar > 36 && mesesSinCotizar <= 72) tiempoReactivacion = "26 Semanas (6 meses)";
                else if (mesesSinCotizar > 72) tiempoReactivacion = "52 Semanas (12 meses)";

                return { mensual, semsFinales, salPromedio, cBasica, iAnual, incrementosNum, porcAsig: asignacion, esMinima, necesitaReactivarse, tiempoReactivacion, cuotaM40: (salarioM40 * 30.4 * 0.14438) };
            }, [semanas, salarioActual, edad, tieneEsposa, hijos, mesesSinCotizar, usaM40, mesesM40, salarioM40]);

            // CÁLCULO SALARIO PROMEDIO
            const resultSalario = useMemo(() => {
                let dTot = 0, sPond = 0;
                filas.forEach(f => {
                    if(f.desde && f.hasta && f.salario > 0) {
                        const d = Math.ceil((new Date(f.hasta) - new Date(f.desde)) / (86400000)) + 1;
                        dTot += d; sPond += (d * f.salario);
                    }
                });
                return { promedio: dTot > 0 ? (sPond / dTot) : 0, sems: (dTot / 7).toFixed(1) };
            }, [filas]);

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    {view === 'pension' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-4 space-y-6 no-print">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl">
                                    <h2 className="text-lg font-black uppercase text-slate-800 mb-6 italic border-l-4 border-blue-600 pl-4">Entrada de Datos</h2>
                                    <div className="space-y-4">
                                        <div><label className="text-[9px] font-black text-slate-400 uppercase">Semanas Cotizadas</label><input type="number" value={semanas} onChange={e => setSemanas(Number(e.target.value))} className="w-full p-3 bg-slate-50 border rounded-xl font-black" /></div>
                                        <div><label className="text-[9px] font-black text-slate-400 uppercase">Salario Diario Promedio</label><input type="number" value={salarioActual} onChange={e => setSalarioActual(Number(e.target.value))} className="w-full p-3 bg-slate-50 border rounded-xl font-black text-blue-600" /></div>
                                        <div><label className="text-[9px] font-black text-slate-400 uppercase">Meses sin Cotizar</label><input type="number" value={mesesSinCotizar} onChange={e => setMesesSinCotizar(Number(e.target.value))} className="w-full p-3 bg-slate-50 border rounded-xl font-black text-orange-600" /></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[9px] font-black text-slate-400 uppercase">Edad Retiro</label><select value={edad} onChange={e => setEdad(Number(e.target.value))} className="w-full p-3 bg-slate-50 border rounded-xl font-black">{[60,61,62,63,64,65].map(e => <option key={e} value={e}>{e} años</option>)}</select></div>
                                            <div><label className="text-[9px] font-black text-slate-400 uppercase">Hijos</label><input type="number" value={hijos} onChange={e => setHijos(Number(e.target.value))} className="w-full p-3 bg-slate-50 border rounded-xl font-black" /></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-emerald-900 p-8 rounded-[2.5rem] text-white">
                                    <div className="flex justify-between items-center mb-4"><h2 className="text-xs font-black uppercase italic text-emerald-400">Escenario Modalidad 40</h2><input type="checkbox" checked={usaM40} onChange={e => setUsaM40(e.target.checked)} className="w-5 h-5" /></div>
                                    {usaM40 && <div className="space-y-4">
                                        <input type="range" min="1" max="60" value={mesesM40} onChange={e => setMesesM40(Number(e.target.value))} className="w-full accent-emerald-400" />
                                        <p className="text-center font-black">{mesesM40} Meses de inversión</p>
                                        <input type="number" value={salarioM40} onChange={e => setSalarioM40(Number(e.target.value))} className="w-full p-3 bg-white/10 rounded-xl text-center font-black" />
                                    </div>}
                                </div>
                            </div>

                            <div className="lg:col-span-8 space-y-6">
                                {calculo.necesitaReactivarse && (
                                    <div className="bg-red-600 p-6 rounded-[2rem] text-white flex items-center justify-between shadow-xl animate-pulse-slow">
                                        <div>
                                            <h3 className="font-black uppercase italic text-lg leading-none mb-1">⚠️ REQUIERE REACTIVACIÓN</h3>
                                            <p className="text-xs font-bold opacity-90 uppercase">El cliente ha perdido vigencia de derechos.</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black uppercase opacity-70">Tiempo necesario:</p>
                                            <p className="text-xl font-black italic">{calculo.tiempoReactivacion}</p>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                                    <p className="text-blue-400 font-black uppercase text-[10px] tracking-widest mb-2">Pensión Mensual Proyectada</p>
                                    <h2 className="text-7xl font-black italic mb-6">{fmt(calculo.mensual)}</h2>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-6 border-t border-white/10 pt-8">
                                        <div><p className="text-[9px] text-slate-500 uppercase font-black">Semanas al Retiro</p><p className="text-xl font-black">{calculo.semsFinales}</p></div>
                                        <div><p className="text-[9px] text-slate-500 uppercase font-black">Promedio Final</p><p className="text-xl font-black text-blue-400">{fmt(calculo.salPromedio)}</p></div>
                                        <div><p className="text-[9px] text-slate-500 uppercase font-black">Incrementos</p><p className="text-xl font-black">{calculo.incrementosNum}</p></div>
                                    </div>
                                    {calculo.esMinima && <span className="text-[10px] bg-blue-600 px-4 py-1 rounded-full font-black uppercase mt-6 inline-block italic">Pensión Mínima Garantizada 2026</span>}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="card-glass p-8 rounded-[2.5rem] text-white">
                                        <h3 className="text-[10px] font-black uppercase text-blue-400 mb-6 tracking-widest border-b border-white/10 pb-2">Memoria de Cálculo (EC0485)</h3>
                                        <div className="space-y-4 text-xs font-bold">
                                            <div className="flex justify-between"><span>% Cuantía Básica:</span><span className="text-blue-300">{(calculo.cBasica * 100).toFixed(2)}%</span></div>
                                            <div className="flex justify-between"><span>% Increm. Anual:</span><span className="text-blue-300">{(calculo.iAnual * 100).toFixed(4)}%</span></div>
                                            <div className="flex justify-between text-emerald-400 font-black"><span>Decreto Fox:</span><span>+11% Aplicado</span></div>
                                            <div className="flex justify-between"><span>Asignación Familiar:</span><span>{((calculo.porcAsig || 0.15) * 100)}%</span></div>
                                        </div>
                                    </div>
                                    <div className="card-glass p-8 rounded-[2.5rem] text-white">
                                        <h3 className="text-[10px] font-black uppercase text-emerald-400 mb-6 tracking-widest border-b border-white/10 pb-2">Análisis Modalidad 40</h3>
                                        <div className="space-y-4 text-xs font-bold">
                                            <div className="flex justify-between"><span>Costo Mensual:</span><span>{fmt(calculo.cuotaM40)}</span></div>
                                            <div className="flex justify-between"><span>Inversión Total:</span><span className="text-emerald-400 text-lg">{fmt(calculo.cuotaM40 * mesesM40)}</span></div>
                                            <p className="text-[9px] italic opacity-40 mt-4 leading-tight">Proyección basada en el incremento patronal de 2026.</p>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="w-full bg-white text-slate-900 py-5 rounded-3xl font-black uppercase italic no-print shadow-2xl hover:scale-105 transition-all">Generar Estudio Técnico PDF</button>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl">
                             <h2 className="text-3xl font-black uppercase italic mb-10">Desglose de Salario Promedio</h2>
                             <div className="space-y-4">
                                {filas.map((f, i) => (
                                    <div key={i} className="grid grid-cols-1 md:grid-cols-3 gap-4 p-6 bg-slate-50 rounded-3xl border">
                                        <div><label className="text-[9px] font-black uppercase text-slate-400 ml-2">Desde</label><input type="date" value={f.desde} onChange={e => { const n = [...filas]; n[i].desde = e.target.value; setFilas(n); }} className="w-full p-3 rounded-xl border font-bold text-xs" /></div>
                                        <div><label className="text-[9px] font-black uppercase text-slate-400 ml-2">Hasta</label><input type="date" value={f.hasta} onChange={e => { const n = [...filas]; n[i].hasta = e.target.value; setFilas(n); }} className="w-full p-3 rounded-xl border font-bold text-xs" /></div>
                                        <div><label className="text-[9px] font-black uppercase text-slate-400 ml-2">Salario Diario</label><input type="number" placeholder="Salario" value={f.salario} onChange={e => { const n = [...filas]; n[i].salario = Number(e.target.value); setFilas(n); }} className="w-full p-3 rounded-xl border font-black text-blue-600 text-sm" /></div>
                                    </div>
                                ))}
                             </div>
                             <button onClick={() => setFilas([...filas, { desde: '', hasta: '', salario: 0 }])} className="w-full mt-4 py-3 border-2 border-dashed rounded-2xl text-slate-400 font-bold uppercase">+ Agregar Periodo</button>
                             <div className="mt-10 bg-slate-900 p-10 rounded-[3rem] text-center text-white">
                                <p className="text-xs font-black uppercase text-blue-400 mb-2">Promedio Resultante (250 Semanas)</p>
                                <p className="text-6xl font-black italic">{fmt(resultSalario.promedio)}</p>
                                <div className="mt-6 text-slate-500 font-bold uppercase text-[10px]">Semanas detectadas: {resultSalario.sems}</div>
                             </div>
                             <button onClick={() => window.location.reload()} className="w-full mt-8 text-slate-400 font-black uppercase text-[10px] italic">⬅️ Volver a Selección</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAEDygVfkQbJgMuEmm_We-OlQFTKzQ1raM", authDomain: "pensionsegura-9c817.firebaseapp.com", projectId: "pensionsegura-9c817" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uID = "", miSaldo = 0;
        onAuthStateChanged(auth, user => {
            if(user) {
                uID = user.uid;
                onSnapshot(doc(db, "asesores", uID), d => {
                    if(d.exists()){
                        miSaldo = d.data().saldo || 0;
                        document.getElementById('txtSaldoAsesor').innerText = `$${miSaldo.toFixed(2)}`;
                    }
                });
            }
        });

        window.seleccionarHerramienta = (nombre, costo, tab) => {
            const btn = document.getElementById('btnPagarAcceso');
            btn.disabled = false; btn.classList.remove('opacity-50'); 
            btn.innerText = `Pagar $${costo}.00 y Acceder`;
            window.herramientaTemp = { nombre, costo, tab };
        };

        window.confirmarCompraHerramienta = async () => {
            const { costo, tab } = window.herramientaTemp;
            if(miSaldo < costo) return alert("Saldo insuficiente");
            try {
                await updateDoc(doc(db, "asesores", uID), { saldo: increment(-costo) });
                document.getElementById('pantallaCobro').classList.add('hidden');
                document.getElementById('root').classList.remove('hidden');
                window.dispatchEvent(new CustomEvent('inicioApp', { detail: tab }));
            } catch(e) {
                alert("Error al procesar el pago.");
            }
        };
    </script>
</body>
</html>
